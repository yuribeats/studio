<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFFECTS RACK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: #0e0e0e;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    color: #ccc;
    user-select: none;
}

.rack {
    display: flex;
    height: 100vh;
    width: 100vw;
}

/* LEFT PANEL — CHANNEL LIST */
.channel-panel {
    width: 160px;
    background: #111;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}
.panel-header {
    padding: 10px 12px;
    font-size: 9px;
    letter-spacing: 3px;
    color: #555;
    border-bottom: 1px solid #222;
}
.channel-list {
    flex: 1;
    overflow-y: auto;
}
.channel-list::-webkit-scrollbar { width: 4px; }
.channel-list::-webkit-scrollbar-thumb { background: #333; }
.ch-item {
    padding: 8px 12px;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: #555;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    gap: 6px;
}
.ch-item.active { color: #fff; background: #1a1a1a; border-left: 2px solid #228B22; }
.ch-item.master-item { color: #cc3300; }
.ch-item.master-item.active { border-left-color: #cc3300; }
.ch-dot {
    width: 4px;
    height: 4px;
    background: #333;
    flex-shrink: 0;
}
.ch-item.active .ch-dot { background: #228B22; }
.ch-item.master-item.active .ch-dot { background: #cc3300; }
.ch-item-count {
    margin-left: auto;
    font-size: 7px;
    color: #333;
}
.ch-item.active .ch-item-count { color: #555; }

/* RIGHT PANEL — PLUGIN BROWSER */
.browser-panel {
    width: 220px;
    background: #111;
    border-left: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}
.browser-header {
    padding: 10px 12px;
    font-size: 9px;
    letter-spacing: 3px;
    color: #555;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 8px;
}
.scan-btn {
    font-size: 7px;
    color: #444;
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 3px 8px;
    letter-spacing: 1px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: auto;
}
.scan-btn:hover { color: #888; border-color: #555; }
.browser-search {
    padding: 6px 12px;
    border-bottom: 1px solid #222;
}
.search-input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #333;
    color: #aaa;
    font-family: Arial, sans-serif;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 5px 8px;
    outline: none;
    letter-spacing: 0.5px;
}
.search-input:focus { border-color: #228B22; }
.browser-filter {
    display: flex;
    gap: 3px;
    padding: 6px 12px;
    border-bottom: 1px solid #222;
}
.filter-btn {
    font-size: 6px;
    color: #444;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 3px 6px;
    letter-spacing: 0.5px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
}
.filter-btn.active { color: #228B22; border-color: #228B22; }
.plugin-list {
    flex: 1;
    overflow-y: auto;
}
.plugin-list::-webkit-scrollbar { width: 4px; }
.plugin-list::-webkit-scrollbar-thumb { background: #333; }
.plugin-item {
    padding: 6px 12px;
    border-bottom: 1px solid #1a1a1a;
}
.plugin-item:hover { background: #1a1a1a; }
.plugin-name {
    font-size: 8px;
    color: #888;
    letter-spacing: 0.5px;
}
.plugin-mfg {
    font-size: 6px;
    color: #444;
    letter-spacing: 0.5px;
    margin-top: 1px;
}
.plugin-item:hover .plugin-name { color: #ccc; }
.no-plugins {
    padding: 20px 12px;
    font-size: 8px;
    color: #333;
    letter-spacing: 1px;
    text-align: center;
}

/* CENTER — INSERT CHAIN */
.chain-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chain-header {
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #888;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #111;
}
.chain-ch-name {
    color: #228B22;
}
.chain-ch-name.master { color: #cc3300; }
.chain-signal {
    font-size: 7px;
    color: #333;
    letter-spacing: 1px;
    margin-left: auto;
}

.chain-slots {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}
.chain-slots::-webkit-scrollbar { width: 4px; }
.chain-slots::-webkit-scrollbar-thumb { background: #333; }

/* INSERT SLOT */
.insert-slot {
    display: flex;
    align-items: center;
    padding: 6px 16px;
    gap: 8px;
    border-bottom: 1px solid #1a1a1a;
    min-height: 36px;
}
.insert-slot:hover { background: #141414; }
.slot-num {
    font-size: 7px;
    color: #333;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
}
.slot-led {
    width: 6px;
    height: 6px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 50%;
    flex-shrink: 0;
}
.slot-led.on {
    background: #228B22;
    border-color: #228B22;
    box-shadow: 0 0 4px rgba(34,139,34,0.5);
}
.slot-name {
    font-size: 9px;
    color: #888;
    letter-spacing: 1px;
    flex: 1;
}
.slot-name.empty {
    color: #333;
    font-style: italic;
    text-transform: none;
}
.slot-bypass {
    font-size: 6px;
    color: #444;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 3px 6px;
    letter-spacing: 0.5px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    flex-shrink: 0;
}
.slot-bypass.active { color: #228B22; border-color: #228B22; }
.slot-remove {
    font-size: 9px;
    color: #333;
    flex-shrink: 0;
    width: 16px;
    text-align: center;
}
.slot-remove:hover { color: #cc3333; }
.slot-move {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex-shrink: 0;
}
.slot-move-btn {
    font-size: 8px;
    color: #333;
    line-height: 1;
}
.slot-move-btn:hover { color: #888; }

/* ADD SLOT */
.add-slot {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    gap: 6px;
    color: #333;
    font-size: 8px;
    letter-spacing: 1px;
    border: 1px dashed #222;
    margin: 4px 16px;
}
.add-slot:hover { color: #555; border-color: #444; }

/* CHAIN FOOTER */
.chain-footer {
    padding: 8px 16px;
    border-top: 1px solid #222;
    background: #111;
    display: flex;
    align-items: center;
    gap: 8px;
}
.chain-footer-text {
    font-size: 6px;
    color: #333;
    letter-spacing: 1.5px;
}
.plugin-count {
    font-size: 7px;
    color: #444;
    margin-left: auto;
}
</style>
</head>
<body>

<div class="rack">
    <!-- CHANNEL LIST -->
    <div class="channel-panel">
        <div class="panel-header">CHANNELS</div>
        <div class="channel-list" id="channelList"></div>
    </div>

    <!-- INSERT CHAIN -->
    <div class="chain-panel">
        <div class="chain-header">
            <span>INSERTS</span>
            <span class="chain-ch-name" id="chainChName">JUNO</span>
            <span class="chain-signal">INPUT > INSERTS > MIXER</span>
        </div>
        <div class="chain-slots" id="chainSlots"></div>
        <div class="chain-footer">
            <span class="chain-footer-text">AU 64-BIT PLUGIN HOST</span>
            <span class="plugin-count" id="pluginCount">0 PLUGINS FOUND</span>
        </div>
    </div>

    <!-- PLUGIN BROWSER -->
    <div class="browser-panel">
        <div class="browser-header">
            <span>PLUGINS</span>
            <div class="scan-btn" id="btnRescan">RESCAN</div>
        </div>
        <div class="browser-search">
            <input class="search-input" id="searchInput" type="text" placeholder="SEARCH..." />
        </div>
        <div class="browser-filter">
            <div class="filter-btn active" data-filter="all">ALL</div>
            <div class="filter-btn" data-filter="effect">EFFECTS</div>
            <div class="filter-btn" data-filter="instrument">INSTRUMENTS</div>
        </div>
        <div class="plugin-list" id="pluginList"></div>
    </div>
</div>

<script>
// ============================================
// STATE
// ============================================
let auPlugins = [];
let activeChannel = 'juno';
let filterType = 'all';
let searchQuery = '';

// Channel insert chains: { channelId: [ {plugin, bypassed}, ... ] }
const inserts = {};

// Base channels — updated dynamically from parent
let channels = [
    { id: 'juno', name: 'JUNO' },
    { id: 'mpc', name: 'MPC' },
    { id: 'cr78', name: '808' },
    { id: 'dx7', name: 'DX7' },
    { id: 'deck', name: 'DECK' },
    { id: 'master', name: 'MASTER', isMaster: true }
];

function ensureInserts() {
    channels.forEach(ch => {
        if (!inserts[ch.id]) inserts[ch.id] = [];
    });
}
ensureInserts();

// ============================================
// CHANNEL LIST
// ============================================
function renderChannels() {
    const container = document.getElementById('channelList');
    container.innerHTML = '';
    channels.forEach(ch => {
        const el = document.createElement('div');
        el.className = 'ch-item' + (ch.id === activeChannel ? ' active' : '') + (ch.isMaster ? ' master-item' : '');
        const count = (inserts[ch.id] || []).length;
        el.innerHTML = '<div class="ch-dot"></div>' + ch.name +
            '<span class="ch-item-count">' + (count > 0 ? count : '') + '</span>';
        el.addEventListener('click', () => {
            activeChannel = ch.id;
            renderChannels();
            renderChain();
        });
        container.appendChild(el);
    });
}

// ============================================
// INSERT CHAIN
// ============================================
function renderChain() {
    const container = document.getElementById('chainSlots');
    container.innerHTML = '';
    const chain = inserts[activeChannel] || [];
    const ch = channels.find(c => c.id === activeChannel);
    const nameEl = document.getElementById('chainChName');
    nameEl.textContent = ch ? ch.name : activeChannel;
    nameEl.className = 'chain-ch-name' + (ch && ch.isMaster ? ' master' : '');

    chain.forEach((slot, idx) => {
        const el = document.createElement('div');
        el.className = 'insert-slot';
        el.innerHTML =
            '<span class="slot-num">' + (idx + 1) + '</span>' +
            '<div class="slot-led' + (!slot.bypassed ? ' on' : '') + '"></div>' +
            '<span class="slot-name">' + slot.plugin.name + '</span>' +
            '<div class="slot-move">' +
                '<span class="slot-move-btn" data-dir="up" data-idx="' + idx + '">&#9650;</span>' +
                '<span class="slot-move-btn" data-dir="down" data-idx="' + idx + '">&#9660;</span>' +
            '</div>' +
            '<div class="slot-bypass' + (!slot.bypassed ? ' active' : '') + '" data-idx="' + idx + '">ON</div>' +
            '<div class="slot-remove" data-idx="' + idx + '">X</div>';
        container.appendChild(el);
    });

    // Add slot button
    const addEl = document.createElement('div');
    addEl.className = 'add-slot';
    addEl.textContent = '+ ADD INSERT';
    addEl.addEventListener('click', () => {
        // Focus search and show browser
        document.getElementById('searchInput').focus();
    });
    container.appendChild(addEl);

    // Event delegation
    container.addEventListener('click', (e) => {
        const bypass = e.target.closest('.slot-bypass');
        if (bypass) {
            const idx = parseInt(bypass.dataset.idx);
            if (chain[idx]) {
                chain[idx].bypassed = !chain[idx].bypassed;
                renderChain();
                sendRackState();
            }
            return;
        }
        const remove = e.target.closest('.slot-remove');
        if (remove) {
            const idx = parseInt(remove.dataset.idx);
            chain.splice(idx, 1);
            renderChain();
            renderChannels();
            sendRackState();
            return;
        }
        const move = e.target.closest('.slot-move-btn');
        if (move) {
            const idx = parseInt(move.dataset.idx);
            const dir = move.dataset.dir;
            if (dir === 'up' && idx > 0) {
                [chain[idx - 1], chain[idx]] = [chain[idx], chain[idx - 1]];
            } else if (dir === 'down' && idx < chain.length - 1) {
                [chain[idx], chain[idx + 1]] = [chain[idx + 1], chain[idx]];
            }
            renderChain();
            sendRackState();
        }
    });
}

// ============================================
// PLUGIN BROWSER
// ============================================
function renderPlugins() {
    const container = document.getElementById('pluginList');
    container.innerHTML = '';
    document.getElementById('pluginCount').textContent = auPlugins.length + ' PLUGINS FOUND';

    let filtered = auPlugins;
    if (filterType !== 'all') {
        filtered = filtered.filter(p => p.type === filterType);
    }
    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(p =>
            p.name.toLowerCase().includes(q) ||
            (p.manufacturer && p.manufacturer.toLowerCase().includes(q))
        );
    }

    if (filtered.length === 0) {
        const msg = document.createElement('div');
        msg.className = 'no-plugins';
        msg.textContent = auPlugins.length === 0 ? 'NO AU PLUGINS FOUND — RUN IN DESKTOP APP TO SCAN' : 'NO MATCHES';
        container.appendChild(msg);
        return;
    }

    filtered.forEach(plugin => {
        const el = document.createElement('div');
        el.className = 'plugin-item';
        el.innerHTML = '<div class="plugin-name">' + plugin.name + '</div>' +
            '<div class="plugin-mfg">' + (plugin.manufacturer || '') + ' | ' + (plugin.type || 'EFFECT') + '</div>';
        el.addEventListener('click', () => {
            addInsert(plugin);
        });
        el.addEventListener('dblclick', () => {
            addInsert(plugin);
        });
        container.appendChild(el);
    });
}

function addInsert(plugin) {
    if (!inserts[activeChannel]) inserts[activeChannel] = [];
    inserts[activeChannel].push({
        plugin: { name: plugin.name, manufacturer: plugin.manufacturer, type: plugin.type, path: plugin.path },
        bypassed: false
    });
    renderChain();
    renderChannels();
    sendRackState();
}

// ============================================
// FILTER / SEARCH
// ============================================
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        filterType = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPlugins();
    });
});

document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderPlugins();
});

// ============================================
// COMMUNICATION
// ============================================
function sendRackState() {
    if (window === window.parent) return;
    const data = {};
    Object.keys(inserts).forEach(ch => {
        data[ch] = inserts[ch].map(s => ({
            plugin: s.plugin,
            bypassed: s.bypassed
        }));
    });
    window.parent.postMessage({ type: 'rack-state', inserts: data }, '*');
}

window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d) return;

    if (d.type === 'keyboard-focus') {
        window.__kbEnabled = d.enabled;
    }

    // Receive AU plugin list from parent
    if (d.type === 'au-plugins') {
        auPlugins = d.plugins || [];
        renderPlugins();
    }

    // Receive updated channel list from parent (dynamic instances)
    if (d.type === 'rack-channels') {
        channels = d.channels || channels;
        ensureInserts();
        if (!channels.find(c => c.id === activeChannel)) {
            activeChannel = channels[0].id;
        }
        renderChannels();
        renderChain();
    }

    // Session
    if (d.type === 'get-session') {
        window.parent.postMessage({
            type: 'session-data', source: 'rack',
            data: { inserts: JSON.parse(JSON.stringify(inserts)) }
        }, '*');
    }
    if (d.type === 'load-session' && d.data) {
        if (d.data.inserts) {
            Object.keys(d.data.inserts).forEach(ch => {
                inserts[ch] = d.data.inserts[ch];
            });
        }
        renderChannels();
        renderChain();
    }
});

// ============================================
// RESCAN
// ============================================
document.getElementById('btnRescan').addEventListener('click', () => {
    if (window !== window.parent) {
        window.parent.postMessage({ type: 'rack-rescan' }, '*');
    }
});

// ============================================
// INIT
// ============================================
renderChannels();
renderChain();
renderPlugins();

// IFRAME BRIDGE
if (window !== window.parent) {
    window.__kbEnabled = false;
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (!window.__kbEnabled) { e.stopImmediatePropagation(); e.preventDefault(); }
    }, true);
    document.addEventListener('keyup', (e) => {
        if (!window.__kbEnabled) { e.stopImmediatePropagation(); e.preventDefault(); }
    }, true);
    window.parent.postMessage({ type: 'instrument-ready', name: 'rack' }, '*');
}
</script>
</body>
</html>
