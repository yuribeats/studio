<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIANO ROLL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0a0a0a;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            user-select: none;
            cursor: default;
        }

        .pianoroll {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* HEADER BAR */
        .header {
            background: #141414;
            border-bottom: 2px solid #444;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
            height: 36px;
            position: relative;
            z-index: 100;
        }
        .header-section {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            height: 100%;
            border-right: 1px solid #444;
        }
        .header-section:last-child { border-right: none; }

        .ch-dropdown-wrap { position: relative; }
        .ch-dropdown-btn {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            color: #fff;
            background: #1a1a1a;
            border: 1px solid #666;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ch-dropdown-arrow { font-size: 8px; color: #999; }
        .ch-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #1a1a1a;
            border: 1px solid #666;
            z-index: 200;
            min-width: 160px;
        }
        .ch-dropdown-menu.open { display: block; }
        .ch-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }
        .ch-menu-item:hover { background: #2a2a2a; }
        .ch-menu-check {
            width: 10px;
            height: 10px;
            border: 2px solid #666;
            flex-shrink: 0;
        }
        .ch-menu-check.on { border-color: #228B22; }
        .ch-menu-item.primary .ch-menu-label { color: #228B22; }
        .ch-menu-swatch {
            width: 8px;
            height: 8px;
            flex-shrink: 0;
        }

        .btn {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            color: #fff;
            background: #1a1a1a;
            border: 1px solid #555;
            padding: 4px 10px;
            outline: none;
        }
        .btn.active {
            color: #228B22;
            border-color: #228B22;
        }
        .btn.play-active {
            color: #33ff33;
            border-color: #33ff33;
        }
        .btn.rec-active {
            color: #ff3333;
            border-color: #ff3333;
            animation: rec-blink 0.8s ease-in-out infinite;
        }
        @keyframes rec-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .btn.rec-armed {
            color: #ff3333;
            border-color: #ff3333;
        }

        .bpm-input {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            color: #fff;
            background: #111;
            border: 1px solid #555;
            padding: 3px 4px;
            width: 42px;
            text-align: center;
            outline: none;
            -moz-appearance: textfield;
        }
        .bpm-input::-webkit-outer-spin-button,
        .bpm-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .header-label {
            font-size: 11px;
            letter-spacing: 1px;
            color: #fff;
        }

        .grid-select {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .grid-opt {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #fff;
            background: #111;
            border: 1px solid #444;
            padding: 3px 5px;
            outline: none;
            text-transform: uppercase;
        }
        .grid-opt.active {
            color: #228B22;
            border-color: #228B22;
        }

        .zoom-btn {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            background: #1a1a1a;
            border: 1px solid #555;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            line-height: 1;
            padding: 0;
        }

        /* MAIN AREA */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* TIMELINE + GRID ROW */
        .roll-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* PIANO COLUMN */
        .piano-col {
            width: 52px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            z-index: 3;
            transition: width 0.15s;
        }
        .piano-col.wide { width: 80px; }
        .piano-corner {
            height: 22px;
            background: #0e0e0e;
            border-bottom: 1px solid #222;
            border-right: 1px solid #222;
            flex-shrink: 0;
        }
        .piano-keys {
            flex: 1;
            overflow: hidden;
            position: relative;
            border-right: 1px solid #222;
        }
        .piano-keys-inner {
            position: absolute;
            width: 100%;
        }
        .piano-key {
            position: absolute;
            left: 0;
            width: 100%;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 4px;
            font-size: 10px;
            letter-spacing: 0.5px;
        }
        .piano-key.white {
            background: #ccc;
            color: #333;
        }
        .piano-key.black {
            background: #2a2a2a;
            color: #999;
            width: 65%;
        }
        .piano-key.playing {
            background: #228B22;
            color: #fff;
        }

        /* GRID COLUMN */
        .grid-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* TIMELINE RULER */
        .timeline {
            height: 22px;
            background: #0e0e0e;
            border-bottom: 1px solid #222;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .timeline canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* NOTE GRID */
        .grid-scroll {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        .grid-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .grid-scroll::-webkit-scrollbar-track { background: #0a0a0a; }
        .grid-scroll::-webkit-scrollbar-thumb { background: #444; }
        .grid-scroll::-webkit-scrollbar-corner { background: #0a0a0a; }

        .grid-canvas-wrap {
            position: relative;
        }
        .grid-canvas-wrap canvas {
            display: block;
        }

        /* NOTE ELEMENTS */
        .note-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .note-rect {
            position: absolute;
            background: #228B22;
            border: 1px solid transparent;
            border-radius: 2px;
            min-width: 4px;
        }
        .note-rect.selected {
            border-color: #fff !important;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
            z-index: 2;
        }
        .note-rect .note-resize {
            position: absolute;
            right: -1px;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: default;
        }
        .note-rect.ghost {
            opacity: 0.35 !important;
            border-style: dashed;
            pointer-events: none;
        }
        .note-rect .note-label {
            font-size: 10px;
            color: rgba(255,255,255,0.9);
            padding: 0 3px;
            overflow: hidden;
            white-space: nowrap;
            line-height: 1;
            pointer-events: none;
        }

        /* PLAYHEAD */
        .playhead {
            position: absolute;
            top: 0;
            width: 2px;
            background: #33ff33;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        /* VELOCITY LANE */
        .velocity-lane {
            height: 60px;
            background: #0a0a0a;
            border-top: 1px solid #222;
            flex-shrink: 0;
            display: flex;
            overflow: hidden;
        }
        .velocity-piano-spacer {
            width: 52px;
            flex-shrink: 0;
            transition: width 0.15s;
            background: #0e0e0e;
            border-right: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #fff;
            letter-spacing: 1px;
        }
        .velocity-scroll {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .velocity-scroll canvas {
            display: block;
        }
        /* SELECTION MARQUEE */
        .select-marquee {
            position: absolute;
            border: 1px solid #228B22;
            background: rgba(34,139,34,0.1);
            pointer-events: none;
            z-index: 20;
            display: none;
        }
    </style>
<script src="studio-bus.js"></script>
</head>
<body>

<div class="pianoroll">
    <!-- HEADER -->
    <div class="header">
        <div class="header-section" id="channelTabs"></div>
        <div class="header-section">
            <button class="btn" id="btnPlay">PLAY</button>
            <button class="btn" id="btnRec">REC</button>
            <button class="btn" id="btnStop">STOP</button>
            <button class="btn" id="btnLoop">LOOP</button>
            <button class="btn" id="btnRepeat">REPEAT</button>
        </div>
        <div class="header-section">
            <span class="header-label">BPM</span>
            <input type="number" class="bpm-input" id="bpmInput" value="120" min="40" max="300">
        </div>
        <div class="header-section">
            <span class="header-label">4/4</span>
        </div>
        <div class="header-section">
            <span class="header-label">GRID</span>
            <div class="grid-select" id="gridSelect"></div>
        </div>
        <div class="header-section">
            <span class="header-label">VEL</span>
            <button class="zoom-btn" id="velDown">&minus;</button>
            <button class="zoom-btn" id="velUp">+</button>
        </div>
        <div class="header-section">
            <span class="header-label">H</span>
            <button class="zoom-btn" id="zoomHOut">&minus;</button>
            <button class="zoom-btn" id="zoomHIn">+</button>
        </div>
        <div class="header-section">
            <span class="header-label">V</span>
            <button class="zoom-btn" id="zoomVOut">&minus;</button>
            <button class="zoom-btn" id="zoomVIn">+</button>
        </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">
        <div class="roll-area">
            <!-- PIANO COLUMN -->
            <div class="piano-col">
                <div class="piano-corner"></div>
                <div class="piano-keys" id="pianoKeys">
                    <div class="piano-keys-inner" id="pianoKeysInner"></div>
                </div>
            </div>
            <!-- GRID COLUMN -->
            <div class="grid-col">
                <div class="timeline" id="timeline">
                    <canvas id="timelineCanvas"></canvas>
                </div>
                <div class="grid-scroll" id="gridScroll">
                    <div class="grid-canvas-wrap" id="gridWrap">
                        <canvas id="gridCanvas"></canvas>
                        <div class="note-layer" id="noteLayer"></div>
                        <div class="select-marquee" id="selectMarquee"></div>
                        <div class="playhead" id="playhead"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- VELOCITY LANE -->
        <div class="velocity-lane">
            <div class="velocity-piano-spacer">VEL</div>
            <div class="velocity-scroll" id="velocityScroll">
                <canvas id="velocityCanvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // ==================== CONSTANTS ====================
    const BASE_CHANNELS = ['juno', 'fm', 'mpc', 'rhodes', 'deck'];
    const CHANNELS = ['juno', 'fm', 'mpc', '808', 'rhodes', 'deck'];
    const CHANNEL_LABELS = { juno: 'JUNO', fm: 'FM', mpc: 'MPC', '808': 'DRUMS', rhodes: 'RHODES', deck: 'DRIFT' };
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const BLACK_KEYS = [1,3,6,8,10]; // semitone indices that are black keys
    const BEATS_PER_BAR = 4;
    const TOTAL_BARS = 32;
    const TOTAL_BEATS = TOTAL_BARS * BEATS_PER_BAR;

    // Note range: C1 (MIDI 24) to C6 (MIDI 84) = 61 notes
    const MIN_NOTE = 24;
    const MAX_NOTE = 84;
    const TOTAL_NOTES = MAX_NOTE - MIN_NOTE + 1;

    // MPC pads: 4 banks x 16 pads, MIDI 36-99
    const MPC_BANKS = ['A', 'B', 'C', 'D'];
    const MPC_PADS_PER_BANK = 16;
    const MPC_PAD_ROWS = []; // {midi, label}
    MPC_BANKS.forEach((bank, bi) => {
        for (let p = 0; p < MPC_PADS_PER_BANK; p++) {
            MPC_PAD_ROWS.push({ midi: 36 + bi * 16 + p, label: bank + (p + 1) });
        }
    });

    // 808 drum kits
    const DRUM_KITS = {
        cr78: { label: 'CR-78', tracks: ['KICK','KICK ACC','SNARE','SNARE ACC','RIM','HI-HAT','HAT ACC','HAT METAL','CYMBAL','COWBELL','CONGA','BONGO H','BONGO L','TAMB','GUIRO'] },
        lm2: { label: 'LM-2', tracks: ['KICK','KICK ALT','SNARE H','SNARE M','SNARE L','CLAP','HAT CLOSED','HAT OPEN','CRASH','RIDE','TOM HH','TOM H','TOM M','TOM L','COWBELL'] },
        mrk2: { label: 'MRK-2', tracks: ['KICK','SNARE','HAT CLOSED','HAT OPEN','CYMBAL L','CYMBAL S','TOM','BONGO','CLAVE','BLOCK'] },
        tr505: { label: 'TR-505', tracks: ['KICK','SNARE','CLAP','RIM','HAT CLOSED','HAT OPEN','CRASH','RIDE','COWBELL H','COWBELL L','CONGA H','CONGA L','TOM H','TOM M','TOM L'] },
        tr909: { label: 'TR-909', tracks: ['KICK','KICK SHORT','SNARE','CLAP 1','CLAP 2','RIM','HAT CLOSED','HAT OPEN','CYMBAL','RIDE','TOM H','TOM L'] },
    };
    const DRUM_KIT_IDS = Object.keys(DRUM_KITS);
    let active808Kit = 'cr78';
    let drumTrackNames = DRUM_KITS[active808Kit].tracks;
    const DRUM_808_ROWS = [];
    function rebuild808Rows() {
        DRUM_808_ROWS.length = 0;
        drumTrackNames.forEach((name, i) => {
            DRUM_808_ROWS.push({ midi: 36 + i, label: name });
        });
    }
    rebuild808Rows();

    // Channel display mode
    function isFixedRowChannel(ch) { return ch === 'mpc' || ch === '808'; }
    function getFixedRows(ch) { return ch === 'mpc' ? MPC_PAD_ROWS : DRUM_808_ROWS; }
    function getRowCount() {
        if (isFixedRowChannel(activeChannel)) return getFixedRows(activeChannel).length;
        return TOTAL_NOTES;
    }
    function getMinNote() {
        if (isFixedRowChannel(activeChannel)) return getFixedRows(activeChannel)[getFixedRows(activeChannel).length - 1].midi;
        return MIN_NOTE;
    }
    function getMaxNote() {
        if (isFixedRowChannel(activeChannel)) return getFixedRows(activeChannel)[0].midi;
        return MAX_NOTE;
    }

    // Grid resolutions in beats
    const GRID_OPTIONS = [
        { label: '1/4', value: 1 },
        { label: '1/8', value: 0.5 },
        { label: '1/16', value: 0.25 },
        { label: '1/32', value: 0.125 }
    ];

    // ==================== CHANNEL COLORS ====================
    const CH_COLORS = {
        juno: '#228B22', fm: '#4488ff', mpc: '#ff8800',
        '808': '#ff3344', rhodes: '#aa44ff', deck: '#ccaa00'
    };
    function chColor(ch) {
        if (ch.startsWith('808-')) return CH_COLORS['808'];
        return CH_COLORS[ch] || '#228B22';
    }

    // ==================== STATE ====================
    let activeChannel = 'juno';
    const visibleChannels = new Set(['juno']);
    let bpm = 120;
    let gridResolution = 0.25; // 1/16 default
    let cellW = 20;   // pixels per grid subdivision
    let cellH = 14;   // pixels per semitone row
    let isPlaying = false;
    let isLooping = false;
    let loopStart = 0;        // beat position
    let loopEnd = 16;         // beat position (4 bars default)
    let loopRegionSet = false; // user has explicitly set a loop region
    let playheadBeat = 0;
    let playStartTime = 0;
    let audioCtx = null;
    let scheduledNotes = new Map(); // track which notes are currently on
    let selectedNotes = new Set();
    let animFrameId = null;

    // Zoom levels
    const ZOOM_H_LEVELS = [10, 14, 20, 28, 40, 56];
    const ZOOM_V_LEVELS = [8, 10, 14, 18, 24, 30];
    let zoomHIndex = 2;
    let zoomVIndex = 2;

    // Note data per channel — 808 uses per-kit sub-channels (808-cr78, 808-lm2, etc.)
    const notes = {};
    BASE_CHANNELS.forEach(ch => notes[ch] = []);
    DRUM_KIT_IDS.forEach(kid => notes['808-' + kid] = []);

    // Helper: get the storage key for the active 808 kit
    function get808Key() { return '808-' + active808Kit; }
    // Returns the actual storage key for the current display channel
    function getStorageChannel() { return activeChannel === '808' ? get808Key() : activeChannel; }
    // Get all channels to iterate during playback (base + all 808 kits)
    function getAllPlaybackChannels() {
        const chs = [...BASE_CHANNELS];
        DRUM_KIT_IDS.forEach(kid => { if (notes['808-' + kid].length > 0) chs.push('808-' + kid); });
        return chs;
    }
    // Get kits that have note data (for mixer/pedals)
    function getActive808Kits() {
        return DRUM_KIT_IDS.filter(kid => notes['808-' + kid].length > 0);
    }

    // Recording state
    let isRecording = false;
    let isCountingIn = false;
    let countInBeats = 0; // how many beats of count-in have passed
    let recStartTime = 0;
    let recStartBeat = 0;
    let activeRecNotes = new Map(); // midi -> { note obj, startTime }
    let clickGain = null;

    // QWERTY to MIDI mapping (2 octaves starting at C3 = MIDI 48)
    const QWERTY_MAP = {
        'a': 48, 'w': 49, 's': 50, 'e': 51, 'd': 52, 'f': 53, 't': 54,
        'g': 55, 'y': 56, 'h': 57, 'u': 58, 'j': 59, 'k': 60, 'o': 61,
        'l': 62, 'p': 63, ';': 64,
        'z': 36, 'x': 37, 'c': 38, 'v': 39, 'b': 40, 'n': 41, 'm': 42,
        ',': 43, '.': 44, '/': 45
    };

    // Interaction state
    let dragState = null; // { type: 'create'|'move'|'resize'|'marquee', note, origX, origY, ... }

    // ==================== DOM REFS ====================
    const gridScroll = document.getElementById('gridScroll');
    const gridWrap = document.getElementById('gridWrap');
    const gridCanvas = document.getElementById('gridCanvas');
    const gridCtx = gridCanvas.getContext('2d');
    const noteLayer = document.getElementById('noteLayer');
    const playheadEl = document.getElementById('playhead');
    const timelineCanvas = document.getElementById('timelineCanvas');
    const timelineCtx = timelineCanvas.getContext('2d');
    const velocityCanvas = document.getElementById('velocityCanvas');
    const velocityCtx = velocityCanvas.getContext('2d');
    const pianoKeysEl = document.getElementById('pianoKeys');
    const pianoKeysInner = document.getElementById('pianoKeysInner');
    const velocityScrollEl = document.getElementById('velocityScroll');

    // ==================== HELPERS ====================
    function noteName(midi) {
        if (isFixedRowChannel(activeChannel)) {
            const rows = getFixedRows(activeChannel);
            const r = rows.find(r => r.midi === midi);
            return r ? r.label : 'N' + midi;
        }
        return NOTE_NAMES[midi % 12] + Math.floor(midi / 12 - 1);
    }
    function isBlackKey(midi) {
        if (isFixedRowChannel(activeChannel)) return false;
        return BLACK_KEYS.includes(midi % 12);
    }
    function midiToRow(midi) {
        if (isFixedRowChannel(activeChannel)) {
            const rows = getFixedRows(activeChannel);
            const idx = rows.findIndex(r => r.midi === midi);
            return idx >= 0 ? idx : 0;
        }
        return MAX_NOTE - midi;
    }
    function rowToMidi(row) {
        if (isFixedRowChannel(activeChannel)) {
            const rows = getFixedRows(activeChannel);
            return row >= 0 && row < rows.length ? rows[row].midi : 36;
        }
        return MAX_NOTE - row;
    }
    function beatToX(beat) {
        return beat / gridResolution * cellW;
    }
    function xToBeat(x) {
        return x / cellW * gridResolution;
    }
    function snapBeat(beat) {
        return Math.round(beat / gridResolution) * gridResolution;
    }
    function getGridW() {
        return TOTAL_BEATS / gridResolution * cellW;
    }
    function getGridH() {
        return getRowCount() * cellH;
    }

    // ==================== CHANNEL DROPDOWN ====================
    let chMenuOpen = false;
    function buildChannelTabs() {
        const container = document.getElementById('channelTabs');
        container.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'ch-dropdown-wrap';

        // Button shows active channel name + count of visible
        const btn = document.createElement('div');
        btn.className = 'ch-dropdown-btn';
        let label = CHANNEL_LABELS[activeChannel];
        if (activeChannel === '808') label += ' / ' + DRUM_KITS[active808Kit].label;
        if (visibleChannels.size > 1) label += ' +' + (visibleChannels.size - 1);
        btn.innerHTML = label + ' <span class="ch-dropdown-arrow">&#9660;</span>';

        const menu = document.createElement('div');
        menu.className = 'ch-dropdown-menu' + (chMenuOpen ? ' open' : '');

        CHANNELS.forEach(ch => {
            const item = document.createElement('div');
            const isVisible = visibleChannels.has(ch);
            const isPrimary = ch === activeChannel;
            item.className = 'ch-menu-item' + (isPrimary ? ' primary' : '');

            const check = document.createElement('div');
            check.className = 'ch-menu-check' + (isVisible ? ' on' : '');
            check.style.borderColor = isVisible ? chColor(ch) : '';
            check.style.background = isVisible ? chColor(ch) : '';

            const swatch = document.createElement('div');
            swatch.className = 'ch-menu-swatch';
            swatch.style.background = chColor(ch);

            const lbl = document.createElement('span');
            lbl.className = 'ch-menu-label';
            lbl.textContent = CHANNEL_LABELS[ch];
            if (isPrimary) lbl.style.color = chColor(ch);

            // Click checkbox = toggle visibility
            check.addEventListener('mousedown', (e) => {
                e.stopPropagation();

                }
                buildChannelTabs();
                fullRender();
            });

            // Click label = make primary (and ensure visible)
            lbl.addEventListener('mousedown', (e) => {
                e.stopPropagation();

                buildChannelTabs();

                kitSel.textContent = DRUM_KITS[active808Kit].label;

        wrap.appendChild(menu);

    }

    const btnPlay = document.getElementById('btnPlay');

    const btnRepeat = document.getElementById('btnRepeat');

    btnRec.addEventListener('mousedown', () => {

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function startPlayback() {
        isPlaying = true;
        btnPlay.classList.add('play-active');
        playheadEl.style.display = 'block';
        const ctx = getAudioCtx();
        playStartTime = ctx.currentTime - (playheadBeat * 60 / bpm);
        scheduledNotes.clear();
        lastKitReport = ''; notifyActiveKits();
        tick();
    }

    function stopPlayback() {
        isPlaying = false;
        btnPlay.classList.remove('play-active');
        if (animFrameId) cancelAnimationFrame(animFrameId);
        animFrameId = null;
        scheduledNotes.forEach((val, key) => {
            sendNoteOff(val.channel, val.pitch);
        });
        scheduledNotes.clear();
        clearPlayingKeys();
    }

    // ==================== CLICK TRACK ====================
    function playClick(time, accent) {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = accent ? 1200 : 800;
        gain.gain.setValueAtTime(0.3, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(time);
        osc.stop(time + 0.06);
    }

    let scheduledClickBeat = -1;

    function scheduleClicks() {
        if (!isPlaying) return;
        const ctx = getAudioCtx();
        const secPerBeat = 60 / bpm;
        const lookAhead = 0.1; // schedule 100ms ahead

        // Find which beat we should be scheduling
        const now = ctx.currentTime;
        const elapsed = now - playStartTime;
        const currentBeat = elapsed / secPerBeat;

        // Schedule clicks for upcoming beats
        for (let b = Math.floor(currentBeat); b <= Math.ceil(currentBeat + lookAhead / secPerBeat); b++) {
            if (b <= scheduledClickBeat) continue;
            const beatTime = playStartTime + b * secPerBeat;
            if (beatTime >= now - 0.01 && beatTime <= now + lookAhead) {
                const accent = b % BEATS_PER_BAR === 0;
                if (isCountingIn) {
                    playClick(beatTime, accent);
                } else if (isRecording) {
                    playClick(beatTime, accent);
                }
                scheduledClickBeat = b;
            }
        }
    }

    // ==================== RECORDING ====================
    function startRecording() {
        const ctx = getAudioCtx();
        isCountingIn = true;
        countInBeats = 0;
        isRecording = false;
        activeRecNotes.clear();
        btnRec.classList.add('rec-armed');
        scheduledClickBeat = -1;

        // Request keyboard focus from parent for QWERTY input
        if (window !== window.parent) {
            window.parent.postMessage({type: 'request-kb-focus', target: 'pianoroll'}, '*');
        }

        // Start playback for count-in (1 bar)
        if (!isPlaying) {
            recStartBeat = playheadBeat;
            startPlayback();
        } else {
            recStartBeat = playheadBeat;
        }
        // Count-in is handled in tick via scheduleClicks
        // After 1 bar of count-in, recording starts
        const countInDuration = BEATS_PER_BAR * (60 / bpm);
        setTimeout(() => {
            if (!isPlaying) return;
            isCountingIn = false;
            isRecording = true;
            recStartTime = ctx.currentTime;
            recStartBeat = playheadBeat;
            btnRec.classList.remove('rec-armed');
            btnRec.classList.add('rec-active');
        }, countInDuration * 1000);
    }

    function stopRecording() {
        // Finalize any held notes
        activeRecNotes.forEach((val, midi) => {
            const dur = playheadBeat - val.startBeat;
            val.note.duration = Math.max(gridResolution, snapBeat(dur));
        });
        activeRecNotes.clear();
        isRecording = false;
        isCountingIn = false;
        btnRec.classList.remove('rec-active', 'rec-armed');
        renderNotes();
        renderVelocity();
    }

    function recordNoteOn(midi, velocity) {
        if (!isRecording) return;
        const beat = snapBeat(playheadBeat);
        const newNote = {
            pitch: midi,
            start: beat,
            duration: gridResolution,
            velocity: velocity || 100
        };
        notes[getStorageChannel()].push(newNote);
        activeRecNotes.set(midi, { note: newNote, startBeat: beat });
        renderNotes();

        // Also trigger the sound on the instrument
        sendNoteOn(activeChannel, midi, velocity || 100);
        highlightPianoKey(midi, true);
    }

    function recordNoteOff(midi) {
        if (!isRecording) return;
        const rec = activeRecNotes.get(midi);
        if (rec) {
            const dur = playheadBeat - rec.startBeat;
            rec.note.duration = Math.max(gridResolution, snapBeat(dur));
            activeRecNotes.delete(midi);
            renderNotes();
            renderVelocity();
        }
        sendNoteOff(activeChannel, midi);
        highlightPianoKey(midi, false);
    }

    // ==================== REPEAT REGION ====================
    function repeatRegion() {
        if (!loopRegionSet) return;
        const regionLen = loopEnd - loopStart;
        if (regionLen <= 0) return;
        // Copy all notes in the loop region and paste them at loopEnd
        const channelNotes = notes[getStorageChannel()];
        const regionNotes = channelNotes.filter(n => n.start >= loopStart && n.start < loopEnd);
        if (regionNotes.length === 0) return;
        const copies = regionNotes.map(n => ({
            pitch: n.pitch,
            start: n.start + regionLen,
            duration: n.duration,
            velocity: n.velocity
        }));
        copies.forEach(c => channelNotes.push(c));
        // Shift loop region forward
        loopStart += regionLen;
        loopEnd += regionLen;
        renderNotes();
        renderVelocity();
        renderTimeline();
    }

    function tick() {
        if (!isPlaying) return;
        const ctx = getAudioCtx();
        const elapsed = ctx.currentTime - playStartTime;
        playheadBeat = elapsed * bpm / 60;

        // Determine loop/end boundaries
        let endBeat = TOTAL_BEATS;
        if (isLooping && loopRegionSet) {
            endBeat = loopEnd;
        } else if (isLooping) {
            endBeat = BEATS_PER_BAR * 4;
            getAllPlaybackChannels().forEach(ch => {
                (notes[ch] || []).forEach(n => {
                    const end = n.start + n.duration;
                    if (end > endBeat) endBeat = Math.ceil(end / BEATS_PER_BAR) * BEATS_PER_BAR;
                });
            });
        }
        const startBeat = (isLooping && loopRegionSet) ? loopStart : 0;

        if (playheadBeat >= endBeat) {
            if (isLooping) {
                playheadBeat = startBeat;
                playStartTime = ctx.currentTime - (startBeat * 60 / bpm);
                // send all note-offs
                scheduledNotes.forEach((val, key) => sendNoteOff(val.channel, val.pitch));
                scheduledNotes.clear();
                clearPlayingKeys();
            } else {
                stopPlayback();
                return;
            }
        }

        // Schedule notes (all channels including per-kit 808 sub-channels)
        getAllPlaybackChannels().forEach(ch => {
            (notes[ch] || []).forEach(n => {
                const noteKey = ch + '_' + n.pitch + '_' + n.start;
                const noteEnd = n.start + n.duration;
                if (playheadBeat >= n.start && playheadBeat < noteEnd) {
                    if (!scheduledNotes.has(noteKey)) {
                        scheduledNotes.set(noteKey, { channel: ch, pitch: n.pitch });
                        sendNoteOn(ch, n.pitch, n.velocity);
                        highlightPianoKey(n.pitch, true);
                    }
                } else {
                    if (scheduledNotes.has(noteKey)) {
                        scheduledNotes.delete(noteKey);
                        sendNoteOff(ch, n.pitch);
                        highlightPianoKey(n.pitch, false);
                    }
                }
            });
        });

        // Schedule click track for recording
        if (isRecording || isCountingIn) {
            scheduleClicks();
        }

        updatePlayheadPosition();
        animFrameId = requestAnimationFrame(tick);
    }

    function updatePlayheadPosition() {
        const x = beatToX(playheadBeat);
        playheadEl.style.left = x + 'px';
        playheadEl.style.display = playheadBeat > 0 || isPlaying ? 'block' : 'none';

        // Auto-scroll to follow playhead
        if (isPlaying) {
            const scrollLeft = gridScroll.scrollLeft;
            const visibleW = gridScroll.clientWidth;
            if (x > scrollLeft + visibleW - 40 || x < scrollLeft) {
                gridScroll.scrollLeft = x - 60;
            }
        }
    }

    function sendNoteOn(channel, pitch, velocity) {
        if (window !== window.parent) {
            const msg = {
                type: 'pianoroll-note',
                channel: channel,
                note: pitch,
                velocity: velocity,
                on: true
            };
            // For 808 sub-channels, include kit info
            if (channel.startsWith('808-')) {
                msg.kit = channel.replace('808-', '');
                msg.channel = '808';
            }
            window.parent.postMessage(msg, '*');
        }
    }

    function sendNoteOff(channel, pitch) {
        if (window !== window.parent) {
            const msg = {
                type: 'pianoroll-note',
                channel: channel,
                note: pitch,
                on: false
            };
            if (channel.startsWith('808-')) {
                msg.kit = channel.replace('808-', '');
                msg.channel = '808';
            }
            window.parent.postMessage(msg, '*');
        }
    }

    // ==================== PIANO KEYS ====================
    function buildPianoKeys() {
        pianoKeysInner.innerHTML = '';
        const rc = getRowCount();
        const h = rc * cellH;
        pianoKeysInner.style.height = h + 'px';

        if (isFixedRowChannel(activeChannel)) {
            const rows = getFixedRows(activeChannel);
            rows.forEach((r, i) => {
                const key = document.createElement('div');
                key.className = 'piano-key white';
                key.style.top = (i * cellH) + 'px';
                key.style.height = cellH + 'px';
                key.dataset.midi = r.midi;
                if (i % 2 === 1) key.style.background = '#a8a8a8';
                key.textContent = r.label;
                key.addEventListener('mousedown', () => {
                    sendNoteOn(activeChannel, r.midi, 100);
                    highlightPianoKey(r.midi, true);
                    const up = () => {
                        sendNoteOff(activeChannel, r.midi);
                        highlightPianoKey(r.midi, false);
                        window.removeEventListener('mouseup', up);
                    };
                    window.addEventListener('mouseup', up);
                });
                pianoKeysInner.appendChild(key);
            });
        } else {
            for (let i = 0; i < rc; i++) {
                const midi = rowToMidi(i);
                const key = document.createElement('div');
                const black = isBlackKey(midi);
                key.className = 'piano-key ' + (black ? 'black' : 'white');
                key.style.top = (i * cellH) + 'px';
                key.style.height = cellH + 'px';
                key.dataset.midi = midi;

                if (midi % 12 === 0 || cellH >= 14) {
                    key.textContent = noteName(midi);
                }

                key.addEventListener('mousedown', () => {
                    sendNoteOn(activeChannel, midi, 100);
                    highlightPianoKey(midi, true);
                    const up = () => {
                        sendNoteOff(activeChannel, midi);
                        highlightPianoKey(midi, false);
                        window.removeEventListener('mouseup', up);
                    };
                    window.addEventListener('mouseup', up);
                });

                pianoKeysInner.appendChild(key);
            }
        }
    }

    function highlightPianoKey(midi, on) {
        const el = pianoKeysInner.querySelector(`[data-midi="${midi}"]`);
        if (el) {
            if (on) el.classList.add('playing');
            else el.classList.remove('playing');
        }
    }

    function clearPlayingKeys() {
        pianoKeysInner.querySelectorAll('.playing').forEach(el => el.classList.remove('playing'));
    }

    // ==================== GRID RENDERING ====================
    function renderGrid() {
        const w = getGridW();
        const h = getGridH();
        const dpr = window.devicePixelRatio || 1;

        gridCanvas.width = w * dpr;
        gridCanvas.height = h * dpr;
        gridCanvas.style.width = w + 'px';
        gridCanvas.style.height = h + 'px';
        gridCtx.scale(dpr, dpr);

        gridWrap.style.width = w + 'px';
        gridWrap.style.height = h + 'px';

        // Draw row backgrounds
        const rc = getRowCount();
        for (let i = 0; i < rc; i++) {
            const midi = rowToMidi(i);
            const black = isBlackKey(midi);
            if (isFixedRowChannel(activeChannel)) {
                gridCtx.fillStyle = i % 2 === 0 ? '#141414' : '#111';
            } else {
                gridCtx.fillStyle = black ? '#101010' : '#141414';
            }
            gridCtx.fillRect(0, i * cellH, w, cellH);
        }

        // Draw horizontal lines (between rows)
        gridCtx.strokeStyle = '#1a1a1a';
        gridCtx.lineWidth = 0.5;
        for (let i = 0; i <= rc; i++) {
            const y = i * cellH;
            gridCtx.beginPath();
            gridCtx.moveTo(0, y);
            gridCtx.lineTo(w, y);
            gridCtx.stroke();
            const midi = rowToMidi(i);
            if (!isFixedRowChannel(activeChannel) && midi % 12 === 0) {
                gridCtx.strokeStyle = '#252525';
                gridCtx.beginPath();
                gridCtx.moveTo(0, y);
                gridCtx.lineTo(w, y);
                gridCtx.stroke();
                gridCtx.strokeStyle = '#1a1a1a';
            }
        }

        // Draw vertical lines
        const totalSubdivisions = TOTAL_BEATS / gridResolution;
        const subsPerBeat = 1 / gridResolution;
        const subsPerBar = BEATS_PER_BAR / gridResolution;

        for (let i = 0; i <= totalSubdivisions; i++) {
            const x = i * cellW;
            if (i % subsPerBar === 0) {
                gridCtx.strokeStyle = '#333';
                gridCtx.lineWidth = 1;
            } else if (i % subsPerBeat === 0) {
                gridCtx.strokeStyle = '#1e1e1e';
                gridCtx.lineWidth = 0.5;
            } else {
                gridCtx.strokeStyle = '#161616';
                gridCtx.lineWidth = 0.5;
            }
            gridCtx.beginPath();
            gridCtx.moveTo(x, 0);
            gridCtx.lineTo(x, h);
            gridCtx.stroke();
        }

        // Update playhead height
        playheadEl.style.height = h + 'px';
    }

    // ==================== TIMELINE RENDERING ====================
    function renderTimeline() {
        const scrollContainer = document.querySelector('.grid-col');
        const w = getGridW();
        const h = 22;
        const dpr = window.devicePixelRatio || 1;

        timelineCanvas.width = w * dpr;
        timelineCanvas.height = h * dpr;
        timelineCanvas.style.width = w + 'px';
        timelineCanvas.style.height = h + 'px';
        timelineCtx.scale(dpr, dpr);

        timelineCtx.fillStyle = '#0e0e0e';
        timelineCtx.fillRect(0, 0, w, h);

        const subsPerBar = BEATS_PER_BAR / gridResolution;
        const subsPerBeat = 1 / gridResolution;
        const totalSubs = TOTAL_BEATS / gridResolution;

        timelineCtx.font = '700 8px Arial';
        timelineCtx.textBaseline = 'middle';

        for (let i = 0; i <= totalSubs; i++) {
            const x = i * cellW;
            if (i % subsPerBar === 0) {
                // Bar number
                const barNum = (i / subsPerBar) + 1;
                timelineCtx.fillStyle = '#888';
                timelineCtx.fillText(String(barNum), x + 4, 10);
                timelineCtx.strokeStyle = '#444';
                timelineCtx.lineWidth = 1;
                timelineCtx.beginPath();
                timelineCtx.moveTo(x, 16);
                timelineCtx.lineTo(x, h);
                timelineCtx.stroke();
            } else if (i % subsPerBeat === 0) {
                timelineCtx.strokeStyle = '#2a2a2a';
                timelineCtx.lineWidth = 0.5;
                timelineCtx.beginPath();
                timelineCtx.moveTo(x, 18);
                timelineCtx.lineTo(x, h);
                timelineCtx.stroke();
            }
        }

        // Draw loop region
        if (loopRegionSet && isLooping) {
            const lx1 = (loopStart / gridResolution) * cellW;
            const lx2 = (loopEnd / gridResolution) * cellW;
            timelineCtx.fillStyle = 'rgba(34,139,34,0.2)';
            timelineCtx.fillRect(lx1, 0, lx2 - lx1, h);
            timelineCtx.strokeStyle = '#228B22';
            timelineCtx.lineWidth = 2;
            timelineCtx.beginPath();
            timelineCtx.moveTo(lx1, 0); timelineCtx.lineTo(lx1, h);
            timelineCtx.moveTo(lx2, 0); timelineCtx.lineTo(lx2, h);
            timelineCtx.stroke();
        }
    }

    // ==================== TIMELINE LOOP REGION DRAG ====================
    let tlDragging = false;
    let tlDragStartBeat = 0;

    timelineCanvas.addEventListener('mousedown', (e) => {
        const rect = timelineCanvas.getBoundingClientRect();
        const scrollLeft = document.querySelector('.grid-col').scrollLeft;
        const x = e.clientX - rect.left + scrollLeft;
        const beat = Math.round((x / cellW) * gridResolution / gridResolution) * gridResolution;
        tlDragStartBeat = Math.max(0, beat);
        tlDragging = true;
    });

    document.addEventListener('mousemove', (e) => {
        if (!tlDragging) return;
        const rect = timelineCanvas.getBoundingClientRect();
        const scrollLeft = document.querySelector('.grid-col').scrollLeft;
        const x = e.clientX - rect.left + scrollLeft;
        const beat = Math.round((x / cellW) * gridResolution / gridResolution) * gridResolution;
        const b = Math.max(0, beat);
        loopStart = Math.min(tlDragStartBeat, b);
        loopEnd = Math.max(tlDragStartBeat, b);
        if (loopEnd - loopStart >= gridResolution) {
            loopRegionSet = true;
            renderTimeline();
        }
    });

    document.addEventListener('mouseup', () => {
        if (tlDragging) {
            tlDragging = false;
            // Snap to nearest bar boundaries
            loopStart = Math.floor(loopStart / BEATS_PER_BAR) * BEATS_PER_BAR;
            loopEnd = Math.ceil(loopEnd / BEATS_PER_BAR) * BEATS_PER_BAR;
            if (loopEnd <= loopStart) loopEnd = loopStart + BEATS_PER_BAR;
            renderTimeline();
        }
    });

    // Double-click timeline to clear loop region
    timelineCanvas.addEventListener('dblclick', () => {
        loopRegionSet = false;
        loopStart = 0;
        loopEnd = 16;
        renderTimeline();
    });

    // ==================== VELOCITY RENDERING ====================
    function renderVelocity() {
        const w = getGridW();
        const h = 58;
        const dpr = window.devicePixelRatio || 1;

        velocityCanvas.width = w * dpr;
        velocityCanvas.height = h * dpr;
        velocityCanvas.style.width = w + 'px';
        velocityCanvas.style.height = h + 'px';
        velocityCtx.scale(dpr, dpr);

        velocityCtx.fillStyle = '#0a0a0a';
        velocityCtx.fillRect(0, 0, w, h);

        // Draw bar lines
        const subsPerBar = BEATS_PER_BAR / gridResolution;
        const totalSubs = TOTAL_BEATS / gridResolution;
        for (let i = 0; i <= totalSubs; i++) {
            if (i % subsPerBar === 0) {
                const x = i * cellW;
                velocityCtx.strokeStyle = '#1a1a1a';
                velocityCtx.lineWidth = 0.5;
                velocityCtx.beginPath();
                velocityCtx.moveTo(x, 0);
                velocityCtx.lineTo(x, h);
                velocityCtx.stroke();
            }
        }

        // Draw velocity bars for current channel
        const activeColor = chColor(activeChannel);
        const channelNotes = notes[getStorageChannel()] || [];
        channelNotes.forEach(n => {
            const x = beatToX(n.start);
            const noteW = Math.max(4, beatToX(n.duration) - 1);
            const barH = (n.velocity / 127) * (h - 4);
            const isSelected = selectedNotes.has(n);

            velocityCtx.fillStyle = isSelected ? '#33ff33' : activeColor;
            velocityCtx.fillRect(x + 1, h - barH - 2, Math.min(noteW, 8), barH);
        });
    }

    // ==================== NOTE RENDERING ====================
    function renderNotes() {
        noteLayer.innerHTML = '';

        // Render background (non-active) visible channels first
        visibleChannels.forEach(ch => {
            if (ch === activeChannel) return;
            // Skip fixed-row channels if active is chromatic and vice versa
            const activeFixed = isFixedRowChannel(activeChannel);
            const chFixed = isFixedRowChannel(ch);
            if (activeFixed !== chFixed) return;
            const key = ch === '808' ? '808-' + active808Kit : ch;
            const chNotes = notes[key] || [];
            const color = chColor(ch);
            chNotes.forEach(n => {
                const el = createNoteElement(n, color, false);
                noteLayer.appendChild(el);
            });
        });

        // Render active channel on top
        const channelNotes = notes[getStorageChannel()] || [];
        const activeColor = chColor(activeChannel);
        channelNotes.forEach(n => {
            const el = createNoteElement(n, activeColor, true);
            noteLayer.appendChild(el);
        });
        notifyActiveKits();
    }

    function createNoteElement(n, color, isActive) {
        const row = midiToRow(n.pitch);
        const x = beatToX(n.start);
        const w = Math.max(4, beatToX(n.duration));
        const y = row * cellH;

        const el = document.createElement('div');
        el.className = 'note-rect' + (selectedNotes.has(n) ? ' selected' : '');
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.width = w + 'px';
        el.style.height = (cellH - 1) + 'px';
        el.style.background = color || '#228B22';
        el.style.borderColor = isActive ? (color || '#228B22') : 'transparent';

        // Opacity: non-active channels are dimmer
        const velOpacity = 0.5 + (n.velocity / 127) * 0.5;
        el.style.opacity = isActive ? velOpacity : velOpacity * 0.4;

        if (!isActive) {
            el.style.pointerEvents = 'none';
        }

        // Label
        if (w > 20) {
            const label = document.createElement('span');
            label.className = 'note-label';
            label.textContent = noteName(n.pitch);
            label.style.lineHeight = (cellH - 1) + 'px';
            el.appendChild(label);
        }

        // Resize handle (only for active channel)
        if (isActive) {
            const handle = document.createElement('div');
            handle.className = 'note-resize';
            el.appendChild(handle);
        }

        el.dataset.noteRef = 'true';
        el._noteData = n;

        return el;
    }

    // ==================== GRID INTERACTION ====================
    gridWrap.addEventListener('mousedown', (e) => {
        if (e.button === 2) {
            // Right click: delete
            const noteEl = e.target.closest('.note-rect');
            if (noteEl && noteEl._noteData) {
                deleteNote(noteEl._noteData);
            }
            e.preventDefault();
            return;
        }

        if (e.button !== 0) return;

        const rect = gridWrap.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        // Check if clicked on resize handle
        const resizeHandle = e.target.closest('.note-resize');
        if (resizeHandle) {
            const noteEl = resizeHandle.closest('.note-rect');
            const n = noteEl._noteData;
            dragState = {
                type: 'resize',
                note: n,
                startX: mx,
                origDuration: n.duration
            };
            e.preventDefault();
            return;
        }

        // Check if clicked on existing note
        const noteEl = e.target.closest('.note-rect');
        if (noteEl && noteEl._noteData) {
            const n = noteEl._noteData;

            // Selection logic
            if (e.shiftKey) {
                if (selectedNotes.has(n)) selectedNotes.delete(n);
                else selectedNotes.add(n);
            } else {
                if (!selectedNotes.has(n)) {
                    selectedNotes.clear();
                    selectedNotes.add(n);
                }
            }

            // Alt/Option key: copy mode
            const isCopy = e.altKey;
            dragState = {
                type: 'move',
                note: n,
                startX: mx,
                startY: my,
                origStart: n.start,
                origPitch: n.pitch,
                isCopy: isCopy,
                origPositions: null
            };
            if (isCopy) {
                // Store original positions of all selected notes
                dragState.origPositions = new Map();
                selectedNotes.forEach(sn => {
                    dragState.origPositions.set(sn, { start: sn.start, pitch: sn.pitch });
                });
            }

            renderNotes();
            renderVelocity();
            e.preventDefault();
            return;
        }

        // Clicked on empty grid: start marquee select or create note
        if (!e.shiftKey) selectedNotes.clear();

        const beat = snapBeat(xToBeat(mx));
        const row = Math.floor(my / cellH);
        const pitch = rowToMidi(row);

        dragState = {
            type: 'marquee',
            startX: mx,
            startY: my,
            startBeat: beat,
            startRow: row,
            startPitch: pitch,
            hasMoved: false
        };

        renderNotes();
        renderVelocity();
    });

    gridWrap.addEventListener('dblclick', (e) => {
        const noteEl = e.target.closest('.note-rect');
        if (noteEl && noteEl._noteData) {
            deleteNote(noteEl._noteData);
        }
    });

    gridWrap.addEventListener('contextmenu', (e) => e.preventDefault());

    window.addEventListener('mousemove', (e) => {
        if (!dragState) return;
        const rect = gridWrap.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (dragState.type === 'marquee') {
            const dx = Math.abs(mx - dragState.startX);
            const dy = Math.abs(my - dragState.startY);
            if (dx > 3 || dy > 3) dragState.hasMoved = true;
            if (dragState.hasMoved) {
                const marquee = document.getElementById('selectMarquee');
                const x1 = Math.min(mx, dragState.startX);
                const y1 = Math.min(my, dragState.startY);
                const x2 = Math.max(mx, dragState.startX);
                const y2 = Math.max(my, dragState.startY);
                marquee.style.display = 'block';
                marquee.style.left = x1 + 'px';
                marquee.style.top = y1 + 'px';
                marquee.style.width = (x2 - x1) + 'px';
                marquee.style.height = (y2 - y1) + 'px';

                // Select notes within marquee
                selectedNotes.clear();
                notes[getStorageChannel()].forEach(n => {
                    const nRow = midiToRow(n.pitch);
                    const nx = beatToX(n.start);
                    const nw = beatToX(n.duration);
                    const ny = nRow * cellH;
                    const nh = cellH;
                    if (nx + nw > x1 && nx < x2 && ny + nh > y1 && ny < y2) {
                        selectedNotes.add(n);
                    }
                });
                renderNotes();
            }
            return;
        } else if (dragState.type === 'create') {
            const currentBeat = snapBeat(xToBeat(mx));
            const dur = Math.max(gridResolution, currentBeat - dragState.startBeat);
            dragState.note.duration = dur;
            renderNotes();
        } else if (dragState.type === 'resize') {
            const dx = mx - dragState.startX;
            const beatDelta = dx / cellW * gridResolution;
            const newDur = snapBeat(Math.max(gridResolution, dragState.origDuration + beatDelta));
            dragState.note.duration = newDur;
            renderNotes();
        } else if (dragState.type === 'move') {
            const dx = mx - dragState.startX;
            const dy = my - dragState.startY;
            const beatDelta = snapBeat(dx / cellW * gridResolution);
            const rowDelta = Math.round(dy / cellH);

            if (dragState.isCopy) {
                // Copy mode: don't move originals, show ghost at new positions
                renderNotes();
                // Draw ghost outlines for selected notes at offset
                selectedNotes.forEach(sn => {
                    const orig = dragState.origPositions.get(sn);
                    if (!orig) return;
                    const ns = Math.max(0, orig.start + beatDelta);
                    let np;
                    if (isFixedRowChannel(activeChannel)) {
                        const rows = getFixedRows(activeChannel);
                        const origRow = rows.findIndex(r => r.midi === orig.pitch);
                        const newRow = Math.max(0, Math.min(rows.length - 1, origRow + rowDelta));
                        np = rows[newRow].midi;
                    } else {
                        np = Math.max(MIN_NOTE, Math.min(MAX_NOTE, orig.pitch - rowDelta));
                    }
                    const ghostEl = document.createElement('div');
                    ghostEl.className = 'note-rect ghost';
                    const row2 = midiToRow(np);
                    ghostEl.style.left = beatToX(ns) + 'px';
                    ghostEl.style.top = (row2 * cellH) + 'px';
                    ghostEl.style.width = Math.max(4, beatToX(sn.duration)) + 'px';
                    ghostEl.style.height = (cellH - 1) + 'px';
                    noteLayer.appendChild(ghostEl);
                });
                dragState._beatDelta = beatDelta;
                dragState._rowDelta = rowDelta;
            } else {
                // Normal move: move all selected notes together
                const startDelta = beatDelta;
                let pitchDelta;
                if (isFixedRowChannel(activeChannel)) {
                    pitchDelta = rowDelta; // row-based
                } else {
                    pitchDelta = -rowDelta; // pitch-based (invert)
                }

                const newStart = Math.max(0, dragState.origStart + startDelta);
                let newPitch;
                if (isFixedRowChannel(activeChannel)) {
                    const rows = getFixedRows(activeChannel);
                    const origRow = rows.findIndex(r => r.midi === dragState.origPitch);
                    const newRow = Math.max(0, Math.min(rows.length - 1, origRow + rowDelta));
                    newPitch = rows[newRow].midi;
                } else {
                    newPitch = Math.max(MIN_NOTE, Math.min(MAX_NOTE, dragState.origPitch - rowDelta));
                }

                dragState.note.start = newStart;
                dragState.note.pitch = newPitch;
                renderNotes();
            }
        }
    });

    window.addEventListener('mouseup', (e) => {
        if (dragState) {
            // Finalize copy on alt+drag
            if (dragState.type === 'move' && dragState.isCopy && dragState._beatDelta !== undefined) {
                const copies = [];
                selectedNotes.forEach(sn => {
                    const orig = dragState.origPositions.get(sn);
                    if (!orig) return;
                    const ns = Math.max(0, orig.start + dragState._beatDelta);
                    let np;
                    if (isFixedRowChannel(activeChannel)) {
                        const rows = getFixedRows(activeChannel);
                        const origRow = rows.findIndex(r => r.midi === orig.pitch);
                        const newRow = Math.max(0, Math.min(rows.length - 1, origRow + dragState._rowDelta));
                        np = rows[newRow].midi;
                    } else {
                        np = Math.max(MIN_NOTE, Math.min(MAX_NOTE, orig.pitch - dragState._rowDelta));
                    }
                    copies.push({ pitch: np, start: ns, duration: sn.duration, velocity: sn.velocity });
                });
                copies.forEach(c => notes[getStorageChannel()].push(c));
                selectedNotes.clear();
                copies.forEach(c => selectedNotes.add(c));
            }
            if (dragState.type === 'marquee') {
                const marquee = document.getElementById('selectMarquee');
                marquee.style.display = 'none';
                if (!dragState.hasMoved) {
                    // Single click on empty space: create note
                    const row = dragState.startRow;
                    const pitch = dragState.startPitch;
                    const beat = dragState.startBeat;
                    let valid = true;
                    if (isFixedRowChannel(activeChannel)) {
                        const rows = getFixedRows(activeChannel);
                        if (row < 0 || row >= rows.length) valid = false;
                    } else {
                        if (pitch < MIN_NOTE || pitch > MAX_NOTE) valid = false;
                    }
                    if (valid) {
                        const newNote = { pitch, start: beat, duration: gridResolution, velocity: 100 };
                        notes[getStorageChannel()].push(newNote);
                        selectedNotes.clear();
                        selectedNotes.add(newNote);
                        sendNoteOn(activeChannel, pitch, 100);
                        setTimeout(() => sendNoteOff(activeChannel, pitch), 150);
                    }
                }
            }
            dragState = null;
            renderNotes();
            renderVelocity();
        }
    });

    // Notify parent about which 808 kits have note data (for mixer/pedals channels)
    let lastKitReport = '';
    function notifyActiveKits() {
        const kits = getActive808Kits();
        const report = kits.join(',');
        if (report === lastKitReport) return;
        lastKitReport = report;
        if (window !== window.parent) {
            window.parent.postMessage({ type: 'active-808-kits', kits: kits }, '*');
        }
    }

    function deleteNote(n) {
        const arr = notes[getStorageChannel()];
        const idx = arr.indexOf(n);
        if (idx !== -1) {
            arr.splice(idx, 1);
            selectedNotes.delete(n);
            renderNotes();
            renderVelocity();
        }
    }

    // ==================== VELOCITY INTERACTION ====================
    let velDragging = false;
    velocityCanvas.addEventListener('mousedown', (e) => {
        velDragging = true;
        adjustVelocityAt(e);
    });
    window.addEventListener('mousemove', (e) => {
        if (velDragging) adjustVelocityAt(e);
    });
    window.addEventListener('mouseup', () => { velDragging = false; });

    function adjustVelocityAt(e) {
        const rect = velocityCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const h = 58;
        const beat = xToBeat(mx);

        // Find note at this x position
        const channelNotes = notes[getStorageChannel()];
        let closest = null;
        let closestDist = Infinity;
        channelNotes.forEach(n => {
            if (beat >= n.start && beat <= n.start + n.duration) {
                const dist = Math.abs(beat - n.start);
                if (dist < closestDist) {
                    closestDist = dist;
                    closest = n;
                }
            }
        });

        if (closest) {
            const vel = Math.max(1, Math.min(127, Math.round((1 - my / h) * 127)));
            closest.velocity = vel;
            renderNotes();
            renderVelocity();
        }
    }

    // ==================== SCROLLING ====================
    gridScroll.addEventListener('scroll', syncScroll);

    function syncScroll() {
        const scrollLeft = gridScroll.scrollLeft;
        const scrollTop = gridScroll.scrollTop;

        // Sync timeline
        timelineCanvas.style.transform = `translateX(${-scrollLeft}px)`;

        // Sync piano keys
        pianoKeysInner.style.transform = `translateY(${-scrollTop}px)`;

        // Sync velocity
        velocityCanvas.style.transform = `translateX(${-scrollLeft}px)`;
    }

    // ==================== KEYBOARD SHORTCUTS ====================
    const qwertyHeld = new Set();
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;

        // QWERTY recording
        if (isRecording && !e.repeat && QWERTY_MAP[e.key.toLowerCase()] !== undefined) {
            const midi = QWERTY_MAP[e.key.toLowerCase()];
            if (!qwertyHeld.has(midi)) {
                qwertyHeld.add(midi);
                recordNoteOn(midi, 100);
            }
            e.preventDefault();
            return;
        }

        // Record toggle with R key
        if (e.key === 'r' && !e.ctrlKey && !e.metaKey && !isRecording) {
            e.preventDefault();
            startRecording();
            return;
        }

        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault();
            if (isRecording) { stopRecording(); stopPlayback(); }
            else if (isPlaying) stopPlayback();
            else startPlayback();
        }
        if (e.key === 'Delete' || e.key === 'Backspace') {
            e.preventDefault();
            selectedNotes.forEach(n => {
                const arr = notes[getStorageChannel()];
                const idx = arr.indexOf(n);
                if (idx !== -1) arr.splice(idx, 1);
            });
            selectedNotes.clear();
            renderNotes();
            renderVelocity();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
            e.preventDefault();
            selectedNotes.clear();
            notes[getStorageChannel()].forEach(n => selectedNotes.add(n));
            renderNotes();
        }
        // Duplicate with Ctrl+D
        if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
            e.preventDefault();
            const duped = [];
            selectedNotes.forEach(n => {
                const copy = { ...n, start: n.start + n.duration };
                notes[getStorageChannel()].push(copy);
                duped.push(copy);
            });
            selectedNotes.clear();
            duped.forEach(n => selectedNotes.add(n));
            renderNotes();
            renderVelocity();
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (QWERTY_MAP[e.key.toLowerCase()] !== undefined) {
            const midi = QWERTY_MAP[e.key.toLowerCase()];
            if (qwertyHeld.has(midi)) {
                qwertyHeld.delete(midi);
                if (isRecording) recordNoteOff(midi);
                else {
                    sendNoteOff(activeChannel, midi);
                    highlightPianoKey(midi, false);
                }
            }
        }
    });

    // ==================== FULL RENDER ====================
    function fullRender() {
        cellW = ZOOM_H_LEVELS[zoomHIndex];
        cellH = ZOOM_V_LEVELS[zoomVIndex];
        const wide = isFixedRowChannel(activeChannel);
        document.querySelector('.piano-col').classList.toggle('wide', wide);
        const spacer = document.querySelector('.velocity-piano-spacer');
        spacer.style.width = wide ? '80px' : '52px';
        buildPianoKeys();
        renderGrid();
        renderTimeline();
        renderNotes();
        renderVelocity();
        updatePlayheadPosition();
    }

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        fullRender();
    });

    // ==================== INSTRUMENT SYNC ====================
    // Convert 808 step patterns into piano roll note data
    function handle808PatternSync(d) {
        const allPats = d.allPatterns;
        const activePat = d.currentPattern || 0;
        if (!allPats) return;
        // For each kit, convert the active pattern into notes
        for (const kitId of Object.keys(allPats)) {
            const storageKey = '808-' + kitId;
            if (!notes[storageKey]) notes[storageKey] = [];
            // Clear existing 808-synced notes for this kit
            notes[storageKey] = notes[storageKey].filter(n => !n._from808);
            const kitPats = allPats[kitId];
            if (!kitPats || !kitPats[activePat]) continue;
            const pat = kitPats[activePat];
            for (let t = 0; t < pat.length; t++) {
                for (let s = 0; s < pat[t].length; s++) {
                    if (pat[t][s] > 0) {
                        const note = {
                            pitch: 36 + t,
                            start: s * 0.25, // each step = 1 sixteenth = 0.25 beats
                            duration: 0.25,
                            velocity: pat[t][s] === 2 ? 127 : 100,
                            _from808: true
                        };
                        notes[storageKey].push(note);
                    }
                }
            }
        }
        notifyActiveKits();
        if (activeChannel === '808') renderNotes();
    }

    // Convert MPC recorded hits into piano roll note data
    function handleMpcRecordingSync(d) {
        if (!d.recording || d.recording.length === 0) return;
        const recBpm = d.bpm || 90;
        // Clear existing MPC-synced notes
        notes['mpc'] = notes['mpc'].filter(n => !n._fromMpc);
        for (const hit of d.recording) {
            // Convert time (seconds) to beats
            const beatPos = hit.time * recBpm / 60;
            // Pad index → MIDI note (bank A: 36-51, B: 52-67, etc.)
            const midi = 36 + hit.pad;
            notes['mpc'].push({
                pitch: midi,
                start: parseFloat(beatPos.toFixed(4)),
                duration: 0.25,
                velocity: 100,
                _fromMpc: true
            });
        }
        if (activeChannel === 'mpc') renderNotes();
    }

    // ==================== IFRAME BRIDGE ====================
    if (window !== window.parent) {
        window.__kbEnabled = false;
        window.addEventListener('message', (e) => {
            const d = e.data;
            if (d && d.type === 'keyboard-focus') {
                window.__kbEnabled = d.enabled;
            }
            if (d && d.type === 'midi' && d.data) {
                const status = d.data[0] & 0xF0;
                const midi = d.data[1];
                const vel = d.data[2] || 0;
                if (status === 0x90 && vel > 0) {
                    if (isRecording) recordNoteOn(midi, vel);
                } else if (status === 0x80 || (status === 0x90 && vel === 0)) {
                    if (isRecording) recordNoteOff(midi);
                }
            }
            // 808 step sequencer pattern sync → convert to piano roll notes
            if (d && d.type === '808-pattern-sync') {
                handle808PatternSync(d);
            }
            // MPC recording sync → convert to piano roll notes
            if (d && d.type === 'mpc-recording-sync') {
                handleMpcRecordingSync(d);
            }
            // Session save: send all note data
            if (d && d.type === 'get-session') {
                const noteData = {};
                for (const ch of Object.keys(notes)) {
                    if (notes[ch].length > 0) {
                        noteData[ch] = notes[ch].map(n => ({
                            pitch: n.pitch, start: n.start, duration: n.duration,
                            velocity: n.velocity
                        }));
                    }
                }
                window.parent.postMessage({
                    type: 'session-data', source: 'pianoroll',
                    data: { notes: noteData, bpm, activeChannel, active808Kit }
                }, '*');
            }
            // Session load: restore note data
            if (d && d.type === 'load-session' && d.data) {
                const sd = d.data;
                if (sd.bpm) { bpm = sd.bpm; document.getElementById('bpmInput').value = bpm; }
                if (sd.notes) {
                    for (const ch of Object.keys(notes)) notes[ch] = [];
                    for (const ch of Object.keys(sd.notes)) {
                        if (!notes[ch]) notes[ch] = [];
                        notes[ch] = sd.notes[ch].map(n => ({
                            pitch: n.pitch, start: n.start, duration: n.duration,
                            velocity: n.velocity
                        }));
                    }
                }
                if (sd.active808Kit) {
                    active808Kit = sd.active808Kit;
                    drumTrackNames = DRUM_KITS[active808Kit].tracks;
                    rebuild808Rows();
                }
                notifyActiveKits();
                fullRender();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            // Always allow Delete/Backspace, Cmd+A, Cmd+D, Space, R for piano roll operations
            // Allow QWERTY keys during recording
            const allowedKeys = ['Delete', 'Backspace', ' ', 'r'];
            const isModCombo = (e.ctrlKey || e.metaKey) && ['a','d'].includes(e.key);
            const isRecKey = isRecording && QWERTY_MAP[e.key.toLowerCase()] !== undefined;
            if (!window.__kbEnabled && !allowedKeys.includes(e.key) && !isModCombo && !isRecKey) {
                e.stopImmediatePropagation(); e.preventDefault();
            }
        }, true);
        document.addEventListener('keyup', (e) => {
            const isRecKey = (isRecording || qwertyHeld.size > 0) && QWERTY_MAP[e.key.toLowerCase()] !== undefined;
            if (!window.__kbEnabled && !isRecKey) { e.stopImmediatePropagation(); e.preventDefault(); }
        }, true);
        window.parent.postMessage({ type: 'instrument-ready', name: 'pianoroll' }, '*');
    }

    // ==================== INIT ====================
    buildChannelTabs();
    buildGridSelect();
    fullRender();

    // Send active kits on a short delay to ensure mixer/pedals are ready
    setTimeout(() => { lastKitReport = ''; notifyActiveKits(); }, 1000);
    setTimeout(() => { lastKitReport = ''; notifyActiveKits(); }, 3000);

    // Scroll to middle C area (C4 = MIDI 60)
    const c4Row = midiToRow(60);
    const targetScrollTop = c4Row * cellH - gridScroll.clientHeight / 2;
    gridScroll.scrollTop = Math.max(0, targetScrollTop);
    syncScroll();

})();
</script>

</body>
</html>
