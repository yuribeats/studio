<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMMOND B3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .hammond {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-bar {
            background: #000;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .brand { font-size: 11px; letter-spacing: 3px; color: #fff; }
        .model { font-size: 16px; letter-spacing: 3px; color: #228B22; }
        .controls-right {
            margin-left: auto;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .ctrl-label { font-size: 10px; letter-spacing: 1px; color: #fff; }
        .knob-wrap { width: 36px; height: 36px; position: relative; }
        .knob {
            width: 36px; height: 36px;
            background: radial-gradient(circle at 40% 35%, #444, #1a1a1a);
            border: 1px solid #555;
            position: relative;
        }
        .knob-indicator {
            position: absolute; width: 2px; height: 10px;
            background: #228B22; top: 3px; left: 50%;
            transform-origin: bottom center; transform: translateX(-50%);
        }
        .ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }

        /* DRAWBAR SECTION */
        .drawbar-section {
            background: #000;
            border-bottom: 1px solid #222;
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .drawbar-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .drawbar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .drawbar-label { font-size: 9px; letter-spacing: 0.5px; color: #888; }
        .drawbar-footage { font-size: 8px; color: #555; }
        .drawbar-value { font-size: 11px; color: #228B22; min-width: 14px; text-align: center; }
        .drawbar-track {
            width: 20px;
            height: 100px;
            background: #111;
            border: 1px solid #333;
            position: relative;
        }
        .drawbar-track.sub { border-color: #553300; }
        .drawbar-track.even { border-color: #fff; }
        .drawbar-track.odd { border-color: #333; }
        .drawbar-thumb {
            position: absolute;
            left: 2px; right: 2px;
            height: 12px;
            background: #fff;
            border: 1px solid #888;
            top: 0;
        }
        .drawbar-track.sub .drawbar-thumb { background: #995500; }
        .drawbar-track.even .drawbar-thumb { background: #fff; }
        .drawbar-track.odd .drawbar-thumb { background: #333; border-color: #555; }

        /* LESLIE */
        .leslie-section {
            display: flex;
            gap: 2px;
            padding: 8px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            align-items: center;
        }
        .leslie-label { font-size: 11px; letter-spacing: 2px; color: #228B22; margin-right: 8px; }
        .leslie-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            background: #111;
            border: 1px solid #333;
        }
        .leslie-btn.active { border-color: #228B22; color: #228B22; background: #0a1a0a; }

        /* KEYBOARD */
        .keyboard-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0 10px 10px 10px;
            overflow: hidden;
        }
        .keyboard { display: flex; position: relative; height: 100%; max-height: 160px; }
        .white-key {
            width: 22px; height: 100%;
            background: linear-gradient(180deg, #e8e4dc 0%, #faf9f5 90%, #e0dcd4 100%);
            border: 1px solid #999; border-top: none;
            position: absolute; z-index: 1;
        }
        .white-key.active { background: linear-gradient(180deg, #a8c8a8 0%, #c8e0c8 90%, #90b090 100%); }
        .black-key {
            width: 14px; height: 60%;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            border: 1px solid #000;
            position: absolute; z-index: 2; top: 0;
        }
        .black-key.active { background: linear-gradient(180deg, #2a4a2a 0%, #1a3a1a 100%); }
    </style>
</head>
<body>
<div class="hammond">
    <div class="top-bar">
        <span class="brand">HAMMOND</span>
        <span class="model">B3</span>
        <div class="controls-right">
            <div class="ctrl-group">
                <span class="ctrl-label">VOLUME</span>
                <div class="knob-wrap"><div class="knob" data-param="volume" data-value="0.7"><div class="knob-indicator"></div></div></div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">OVERDRIVE</span>
                <div class="knob-wrap"><div class="knob" data-param="overdrive" data-value="0.1"><div class="knob-indicator"></div></div></div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">PERCUSSION</span>
                <div class="knob-wrap"><div class="knob" data-param="percussion" data-value="0.5"><div class="knob-indicator"></div></div></div>
            </div>
        </div>
    </div>

    <!-- DRAWBARS: 9 harmonic drawbars -->
    <div class="drawbar-section">
        <div class="drawbar-row" id="drawbarRow"></div>
    </div>

    <!-- LESLIE SPEAKER -->
    <div class="leslie-section">
        <span class="leslie-label">LESLIE</span>
        <div class="leslie-btn" data-speed="off">OFF</div>
        <div class="leslie-btn active" data-speed="slow">SLOW</div>
        <div class="leslie-btn" data-speed="fast">FAST</div>
    </div>

    <div class="keyboard-area">
        <div class="keyboard" id="keyboard"></div>
    </div>
</div>

<script src="pedal-fx.js"></script>
<script>
(function() {
    var actx = null, masterGain = null, mixerGain = null, pedalFX = null, mixerSends = null;
    var params = { volume: 0.7, overdrive: 0.1, percussion: 0.5 };
    var muted = false;

    // 9 Hammond drawbars: sub-fundamental through 9th harmonic
    // Footage: 16' 5-1/3' 8' 4' 2-2/3' 2' 1-3/5' 1-1/3' 1'
    // Harmonic multipliers relative to fundamental (8')
    var DRAWBARS = [
        { name: "16'",    mult: 0.5,        type: 'sub',  def: 8 },
        { name: "5⅓'",   mult: 1.498307,   type: 'odd',  def: 0 },
        { name: "8'",     mult: 1.0,        type: 'even', def: 8 },
        { name: "4'",     mult: 2.0,        type: 'even', def: 0 },
        { name: "2⅔'",   mult: 2.997153,   type: 'odd',  def: 0 },
        { name: "2'",     mult: 4.0,        type: 'even', def: 0 },
        { name: "1⅗'",   mult: 5.04,       type: 'odd',  def: 0 },
        { name: "1⅓'",   mult: 5.994307,   type: 'odd',  def: 0 },
        { name: "1'",     mult: 8.0,        type: 'even', def: 0 },
    ];
    var drawbarValues = DRAWBARS.map(function(d) { return d.def; });

    // Leslie state
    var leslieSpeed = 'slow';
    var leslieNode = null;
    var leslieTremolo = null;
    var leslieVibrato = null;
    var leslieTremoloGain = null;
    var leslieVibratoGain = null;

    // Overdrive waveshaper
    var overdriveNode = null;

    // Percussion
    var percDecayTime = 0.3;

    // Active voices: midi -> { oscs: [], gains: [], env, perc }
    var activeVoices = {};

    function ensureAudio() {
        if (actx) return;
        actx = new (window.AudioContext || window.webkitAudioContext)();
        if (window.loadAirwindowsWorklet) loadAirwindowsWorklet(actx);
        masterGain = actx.createGain();
        masterGain.gain.value = params.volume;
        mixerGain = actx.createGain();
        mixerGain.gain.value = 1.0;
        window._masterOut = actx.createGain();
        window._masterOut.connect(actx.destination);
        window._captureNode = actx.createMediaStreamDestination();
        window._masterOut.connect(window._captureNode);
        mixerSends = new MixerSends(actx, window._masterOut);
        pedalFX = new PedalFXChain(actx);

        // Overdrive waveshaper
        overdriveNode = actx.createWaveShaper();
        overdriveNode.oversample = '2x';
        updateOverdrive();

        // Leslie: tremolo (amplitude) + vibrato (pitch) via LFO
        leslieTremolo = actx.createOscillator();
        leslieTremolo.type = 'sine';
        leslieTremoloGain = actx.createGain();
        leslieTremolo.connect(leslieTremoloGain);
        leslieTremolo.start();

        leslieVibrato = actx.createOscillator();
        leslieVibrato.type = 'sine';
        leslieVibratoGain = actx.createGain();
        leslieVibrato.connect(leslieVibratoGain);
        leslieVibrato.start();

        // Leslie amplitude modulation node
        leslieNode = actx.createGain();
        leslieNode.gain.value = 1.0;
        leslieTremoloGain.connect(leslieNode.gain);

        setLeslieSpeed(leslieSpeed);

        // Signal chain: master → overdrive → leslie → pedalFX → mixerSends → mixerGain → masterOut
        masterGain.connect(overdriveNode);
        overdriveNode.connect(leslieNode);
        leslieNode.connect(pedalFX.getInput());
        pedalFX.getOutput().connect(mixerSends.getInput());
        mixerSends.getOutput().connect(mixerGain);
        mixerGain.connect(window._masterOut);
    }

    function updateOverdrive() {
        if (!overdriveNode) return;
        var amt = params.overdrive;
        if (amt < 0.01) { overdriveNode.curve = null; return; }
        var n = 512;
        var curve = new Float32Array(n);
        var k = amt * 80;
        for (var i = 0; i < n; i++) {
            var x = (i * 2) / n - 1;
            // Warm tube-style saturation
            curve[i] = Math.tanh(x * (1 + k));
        }
        overdriveNode.curve = curve;
    }

    function setLeslieSpeed(speed) {
        leslieSpeed = speed;
        if (!leslieTremolo) return;
        if (speed === 'off') {
            leslieTremolo.frequency.value = 0.001;
            leslieTremoloGain.gain.value = 0;
            leslieVibrato.frequency.value = 0.001;
            leslieVibratoGain.gain.value = 0;
        } else if (speed === 'slow') {
            // Chorale: ~0.8 Hz horn, ~0.7 Hz drum
            leslieTremolo.frequency.value = 0.8;
            leslieTremoloGain.gain.value = 0.15;
            leslieVibrato.frequency.value = 0.7;
            leslieVibratoGain.gain.value = 2;
        } else {
            // Tremolo: ~6.5 Hz horn, ~5.8 Hz drum
            leslieTremolo.frequency.value = 6.5;
            leslieTremoloGain.gain.value = 0.25;
            leslieVibrato.frequency.value = 5.8;
            leslieVibratoGain.gain.value = 4;
        }
    }

    function noteOn(midi, vel) {
        if (!actx) ensureAudio();
        if (actx.state === 'suspended') actx.resume();
        if (activeVoices[midi]) noteOff(midi);

        var freq = 440 * Math.pow(2, (midi - 69) / 12);
        var now = actx.currentTime;
        var voice = { oscs: [], gains: [] };

        // Main envelope (organ: instant on)
        var env = actx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.25, now + 0.003);
        env.connect(masterGain);
        voice.env = env;

        // Key click — short burst of noise
        var clickLen = actx.sampleRate * 0.008;
        var clickBuf = actx.createBuffer(1, clickLen, actx.sampleRate);
        var clickData = clickBuf.getChannelData(0);
        for (var c = 0; c < clickLen; c++) clickData[c] = (Math.random() * 2 - 1) * 0.4 * (1 - c / clickLen);
        var click = actx.createBufferSource();
        click.buffer = clickBuf;
        click.connect(env);
        click.start(now);

        // 9 drawbar harmonics (sine waves — tonewheel simulation)
        for (var i = 0; i < DRAWBARS.length; i++) {
            var level = drawbarValues[i];
            if (level === 0) continue;

            var osc = actx.createOscillator();
            osc.type = 'sine';
            var harmFreq = freq * DRAWBARS[i].mult;
            // Clamp to Nyquist
            if (harmFreq > actx.sampleRate * 0.45) continue;
            osc.frequency.value = harmFreq;

            // Leslie vibrato modulates pitch
            if (leslieVibratoGain) leslieVibratoGain.connect(osc.detune);

            var g = actx.createGain();
            g.gain.value = (level / 8) * (1.0 / 9);
            osc.connect(g);
            g.connect(env);
            osc.start(now);
            voice.oscs.push(osc);
            voice.gains.push(g);
        }

        // Percussion: short decaying harmonic (2nd or 3rd)
        if (params.percussion > 0.05) {
            var percOsc = actx.createOscillator();
            percOsc.type = 'sine';
            percOsc.frequency.value = freq * 4; // 4' harmonic
            if (leslieVibratoGain) leslieVibratoGain.connect(percOsc.detune);
            var percGain = actx.createGain();
            var percAmp = params.percussion * 0.4;
            percGain.gain.setValueAtTime(percAmp, now);
            percGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15 + params.percussion * 0.5);
            percOsc.connect(percGain);
            percGain.connect(env);
            percOsc.start(now);
            percOsc.stop(now + 1);
            voice.oscs.push(percOsc);
        }

        activeVoices[midi] = voice;
        highlightKey(midi, true);
    }

    function noteOff(midi) {
        var voice = activeVoices[midi];
        if (!voice) return;
        var now = actx.currentTime;
        // Organ: near-instant release with tiny click
        voice.env.gain.cancelScheduledValues(now);
        voice.env.gain.setValueAtTime(voice.env.gain.value, now);
        voice.env.gain.linearRampToValueAtTime(0, now + 0.008);
        voice.oscs.forEach(function(o) { try { o.stop(now + 0.05); } catch(e) {} });
        delete activeVoices[midi];
        highlightKey(midi, false);
    }

    // Rebuild active voices when drawbar changes
    function refreshVoices() {
        var mids = Object.keys(activeVoices);
        mids.forEach(function(midi) {
            var voice = activeVoices[midi];
            if (!voice) return;
            var freq = 440 * Math.pow(2, (parseInt(midi) - 69) / 12);
            // Update gain levels for each drawbar harmonic
            var oscIdx = 0;
            for (var i = 0; i < DRAWBARS.length; i++) {
                var level = drawbarValues[i];
                var harmFreq = freq * DRAWBARS[i].mult;
                if (harmFreq > actx.sampleRate * 0.45) continue;
                if (level === 0) {
                    // Was it playing? Check if we have an osc for it
                    continue;
                }
                if (oscIdx < voice.gains.length) {
                    voice.gains[oscIdx].gain.value = (level / 8) * (1.0 / 9);
                }
                oscIdx++;
            }
        });
    }

    // BUILD DRAWBARS UI
    function buildDrawbars() {
        var row = document.getElementById('drawbarRow');
        row.innerHTML = '';
        DRAWBARS.forEach(function(db, i) {
            var group = document.createElement('div');
            group.className = 'drawbar-group';

            var valEl = document.createElement('div');
            valEl.className = 'drawbar-value';
            valEl.id = 'dbval-' + i;
            valEl.textContent = drawbarValues[i];

            var track = document.createElement('div');
            track.className = 'drawbar-track ' + db.type;
            track.dataset.idx = i;

            var thumb = document.createElement('div');
            thumb.className = 'drawbar-thumb';
            thumb.id = 'dbthumb-' + i;
            setDrawbarThumbPos(thumb, drawbarValues[i]);

            track.appendChild(thumb);

            var label = document.createElement('div');
            label.className = 'drawbar-label';
            label.textContent = db.name;

            group.appendChild(valEl);
            group.appendChild(track);
            group.appendChild(label);
            row.appendChild(group);

            // Drag interaction
            var dragging = false, startY = 0, startVal = 0;
            track.addEventListener('mousedown', function(e) {
                e.preventDefault();
                dragging = true;
                startY = e.clientY;
                startVal = drawbarValues[i];
                function onMove(e2) {
                    if (!dragging) return;
                    var dy = startY - e2.clientY;
                    var nv = Math.round(Math.max(0, Math.min(8, startVal + dy / 10)));
                    if (nv !== drawbarValues[i]) {
                        drawbarValues[i] = nv;
                        valEl.textContent = nv;
                        setDrawbarThumbPos(thumb, nv);
                        refreshVoices();
                    }
                }
                function onUp() { dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            });
        });
    }

    function setDrawbarThumbPos(thumb, val) {
        // 0 = top (pulled out, no sound), 8 = bottom (full)
        // But Hammond convention: drawbar pulled OUT = louder
        // So 8 = fully pulled = bottom position visually
        var pct = (1 - val / 8) * 100;
        thumb.style.top = Math.max(0, Math.min(88, pct * 0.88)) + '%';
    }

    // KEYBOARD
    var FIRST_MIDI = 36, LAST_MIDI = 96;
    var BLACK_INDICES = [1, 3, 6, 8, 10];
    var keyElements = {};
    var mouseNoteDown = null;

    function isBlack(m) { return BLACK_INDICES.indexOf(m % 12) >= 0; }

    function buildKeyboard() {
        var kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        var whites = [];
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) { if (!isBlack(m)) whites.push(m); }
        var w = 22;
        kb.style.width = (whites.length * w) + 'px';
        whites.forEach(function(m, i) {
            var el = document.createElement('div');
            el.className = 'white-key';
            el.dataset.midi = m;
            el.style.left = (i * w) + 'px';
            el.style.width = w + 'px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', function(e) { e.preventDefault(); ensureAudio(); noteOn(m, 100); mouseNoteDown = m; });
            el.addEventListener('mouseenter', function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOff(mouseNoteDown); noteOn(m, 80); mouseNoteDown = m; } });
        });
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) {
            if (!isBlack(m)) continue;
            var prevIdx = whites.indexOf(m - 1);
            if (prevIdx < 0) continue;
            var el = document.createElement('div');
            el.className = 'black-key';
            el.dataset.midi = m;
            el.style.left = ((prevIdx + 1) * w - 7) + 'px';
            el.style.width = '14px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', (function(mm) { return function(e) { e.preventDefault(); ensureAudio(); noteOn(mm, 100); mouseNoteDown = mm; }; })(m));
            el.addEventListener('mouseenter', (function(mm) { return function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOff(mouseNoteDown); noteOn(mm, 80); mouseNoteDown = mm; } }; })(m));
        }
    }
    document.addEventListener('mouseup', function() { if (mouseNoteDown !== null) { noteOff(mouseNoteDown); mouseNoteDown = null; } });
    function highlightKey(midi, on) { var el = keyElements[midi]; if (el) { if (on) el.classList.add('active'); else el.classList.remove('active'); } }

    // KNOBS
    document.querySelectorAll('.knob').forEach(function(knob) {
        var param = knob.dataset.param;
        var val = parseFloat(knob.dataset.value);
        var ind = knob.querySelector('.knob-indicator');
        function setRot(v) { ind.style.transform = 'translateX(-50%) rotate(' + (-135 + v * 270) + 'deg)'; }
        setRot(val);
        knob.addEventListener('mousedown', function(e) {
            e.preventDefault();
            var startY = e.clientY, startVal = parseFloat(knob.dataset.value);
            function onMove(e2) {
                var nv = Math.max(0, Math.min(1, startVal + (startY - e2.clientY) / 150));
                knob.dataset.value = nv;
                setRot(nv);
                params[param] = nv;
                if (param === 'volume' && masterGain) masterGain.gain.value = nv;
                if (param === 'overdrive') updateOverdrive();
            }
            function onUp() { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });
    });

    // LESLIE BUTTONS
    document.querySelectorAll('.leslie-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.leslie-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            var speed = btn.dataset.speed;
            ensureAudio();
            setLeslieSpeed(speed);
        });
    });

    // KEYBOARD INPUT
    window.__kbEnabled = false;
    var kbOctave = 4;
    var KEY_MAP = { 'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,'k':12,'o':13,'l':14 };
    var kbNotesDown = {};
    document.addEventListener('keydown', function(e) {
        if (!window.__kbEnabled) return;
        if (e.repeat) return;
        var k = e.key.toLowerCase();
        if (k === 'z') { kbOctave = Math.max(1, kbOctave - 1); return; }
        if (k === 'x') { kbOctave = Math.min(7, kbOctave + 1); return; }
        var semi = KEY_MAP[k]; if (semi === undefined) return;
        var m = (kbOctave + 1) * 12 + semi;
        if (m >= 0 && !kbNotesDown[k]) { ensureAudio(); kbNotesDown[k] = m; noteOn(m, 100); }
    }, true);
    document.addEventListener('keyup', function(e) {
        if (!window.__kbEnabled) return;
        var k = e.key.toLowerCase();
        if (kbNotesDown[k]) { noteOff(kbNotesDown[k]); delete kbNotesDown[k]; }
    }, true);

    // MESSAGE BRIDGE
    window.addEventListener('message', function(e) {
        var d = e.data; if (!d) return;
        if (d.type === 'midi') { ensureAudio(); var data = d.data || d; var cmd = data[0] & 0xF0; if (cmd === 0x90 && data[2] > 0) noteOn(data[1], data[2]); else if (cmd === 0x80 || (cmd === 0x90 && data[2] === 0)) noteOff(data[1]); }
        if (d.type === 'keyboard-focus') window.__kbEnabled = d.enabled;
        if (d.type === 'mixer') {
            ensureAudio();
            if (d.param === 'volume' && mixerGain) mixerGain.gain.value = d.value;
            else if (d.param === 'mute') { muted = d.value > 0; if (mixerGain) mixerGain.gain.value = muted ? 0 : 1; }
            else if (mixerSends) mixerSends.setParam(d.param, d.value);
        }
        if (d.type === 'mixer-fx' && mixerSends) {
            ensureAudio();
            if (d.fx === 'reverb') mixerSends.updateReverb(d.param, d.value);
            if (d.fx === 'delay') mixerSends.updateDelay(d.param, d.value);
        }
        if (d.type === 'pedals' && pedalFX) pedalFX.update(d.pedals);
        if (d.type === 'get-session') {
            window.parent.postMessage({ type: 'session-data', source: 'hammond', data: { params: params, drawbars: drawbarValues.slice(), leslie: leslieSpeed, kbOctave: kbOctave } }, '*');
        }
        if (d.type === 'load-session' && d.data) {
            if (d.data.params) { for (var k in d.data.params) params[k] = d.data.params[k]; if (masterGain) masterGain.gain.value = params.volume; updateOverdrive(); }
            if (d.data.drawbars) {
                drawbarValues = d.data.drawbars;
                for (var i = 0; i < drawbarValues.length; i++) {
                    var ve = document.getElementById('dbval-' + i);
                    var th = document.getElementById('dbthumb-' + i);
                    if (ve) ve.textContent = drawbarValues[i];
                    if (th) setDrawbarThumbPos(th, drawbarValues[i]);
                }
            }
            if (d.data.leslie) { leslieSpeed = d.data.leslie; ensureAudio(); setLeslieSpeed(leslieSpeed); document.querySelectorAll('.leslie-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.speed === leslieSpeed); }); }
            if (d.data.kbOctave !== undefined) kbOctave = d.data.kbOctave;
        }
    });

    buildDrawbars();
    buildKeyboard();
    window.parent.postMessage({ type: 'instrument-ready', name: 'hammond' }, '*');
})();
</script>
</body>
</html>
