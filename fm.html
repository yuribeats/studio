<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM SYNTH</title>
<script src="studio-bus.js"></script>
<script src="pedal-fx.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#111;height:100%;overflow-y:auto;overflow-x:hidden;
  font-family:Arial,Helvetica,sans-serif;font-weight:700;
  text-transform:uppercase;color:#fff;user-select:none;
  -webkit-user-select:none;cursor:default;
}
.fm-wrap{display:flex;flex-direction:column;min-height:100vh;padding:8px 12px 12px}
.top-bar{display:flex;align-items:center;gap:16px;padding:6px 0 10px;border-bottom:1px solid #333;margin-bottom:8px}
.brand{font-size:18px;letter-spacing:4px;color:#228B22}
.patch-area{display:flex;align-items:center;gap:8px;margin-left:16px}
.patch-name{background:#1a1a1a;border:1px solid #333;color:#228B22;padding:4px 12px;font:700 13px/1.2 Arial,sans-serif;text-transform:uppercase;min-width:180px;text-align:center;letter-spacing:1px}
.patch-btn{background:#1a1a1a;border:1px solid #333;color:#fff;padding:4px 10px;font:700 12px/1.2 Arial,sans-serif;text-transform:uppercase;letter-spacing:1px}
.patch-btn:hover{background:#228B22;color:#000}
.algo-section{display:flex;align-items:center;gap:12px;margin-left:auto}
.algo-label{font-size:11px;color:#888;letter-spacing:1px}
.algo-num{background:#1a1a1a;border:1px solid #333;color:#228B22;font:700 18px/1 Arial,sans-serif;padding:4px 12px;min-width:44px;text-align:center}
.algo-nav{background:#1a1a1a;border:1px solid #333;color:#fff;padding:4px 8px;font:700 14px/1 Arial,sans-serif}
.algo-nav:hover{background:#228B22;color:#000}
.algo-canvas{border:1px solid #333;background:#0a0a0a}

.ops-row{display:flex;gap:6px;margin-bottom:8px}
.op-panel{flex:1;background:#1a1a1a;border:1px solid #333;padding:8px;min-width:0}
.op-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.op-title{font-size:12px;letter-spacing:2px}
.op-title.carrier{color:#228B22}
.op-toggle{width:16px;height:16px;border:1px solid #555;background:#222;display:flex;align-items:center;justify-content:center;font-size:10px}
.op-toggle.on{background:#228B22;color:#000;border-color:#228B22}
.op-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.op-lbl{font-size:9px;color:#888;letter-spacing:1px;width:36px;flex-shrink:0}
.op-val{font-size:10px;color:#228B22;min-width:24px;text-align:right}

.slider-h{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#333;outline:none;flex:1}
.slider-h::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:14px;background:#228B22;border:none}
.slider-h::-moz-range-thumb{width:10px;height:14px;background:#228B22;border:none}

.env-area{margin-top:4px}
.env-canvas{width:100%;height:40px;background:#0a0a0a;border:1px solid #333;display:block}
.env-sliders{display:flex;gap:2px;margin-top:3px}
.env-col{display:flex;flex-direction:column;align-items:center;flex:1}
.env-col-lbl{font-size:7px;color:#666;margin-bottom:1px}
.eslider{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:#333;outline:none}
.eslider::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:10px;background:#228B22;border:none}
.eslider::-moz-range-thumb{width:6px;height:10px;background:#228B22;border:none}

.bottom-section{display:flex;gap:12px;border-top:1px solid #333;padding-top:8px;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-row{display:flex;align-items:center;gap:6px}
.ctrl-lbl{font-size:9px;color:#888;letter-spacing:1px;width:48px}
.ctrl-val{font-size:10px;color:#228B22;min-width:24px;text-align:right}
.fb-section{display:flex;align-items:center;gap:8px}
.lfo-section{flex:1}
.master-section{display:flex;align-items:center;gap:8px}

.patch-list{position:absolute;background:#111;border:1px solid #333;max-height:300px;overflow-y:auto;z-index:100;width:220px;display:none}
.patch-list.open{display:block}
.patch-item{padding:4px 10px;font:700 11px/1.4 Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:#ccc;border-bottom:1px solid #222}
.patch-item:hover{background:#228B22;color:#000}
.patch-item.active{color:#228B22}

.wf-btn{background:#1a1a1a;border:1px solid #333;color:#888;padding:2px 6px;font:700 9px/1 Arial,sans-serif;text-transform:uppercase}
.wf-btn.active{color:#228B22;border-color:#228B22}
</style>
</head>
<body>
<div class="fm-wrap">
  <div class="top-bar">
    <span class="brand">FM SYNTH</span>
    <div class="patch-area" style="position:relative">
      <div class="patch-btn" id="patchPrev">&lt;</div>
      <div class="patch-name" id="patchName">E PIANO 1</div>
      <div class="patch-btn" id="patchNext">&gt;</div>
      <div class="patch-list" id="patchList"></div>
    </div>
    <div class="algo-section">
      <span class="algo-label">ALG</span>
      <div class="algo-nav" id="algPrev">&lt;</div>
      <div class="algo-num" id="algNum">1</div>
      <div class="algo-nav" id="algNext">&gt;</div>
      <canvas class="algo-canvas" id="algoCanvas" width="120" height="64"></canvas>
    </div>
    <div class="fb-section" style="margin-left:12px">
      <span class="ctrl-lbl">FB</span>
      <input type="range" class="slider-h" id="fbSlider" min="0" max="7" value="0" style="width:60px">
      <span class="ctrl-val" id="fbVal">0</span>
    </div>
    <div class="master-section" style="margin-left:auto">
      <span class="ctrl-lbl">VOLUME</span>
      <input type="range" class="slider-h" id="masterVol" min="0" max="100" value="80" style="width:80px">
      <span class="ctrl-val" id="masterVolVal">80</span>
    </div>
  </div>

  <div class="ops-row" id="opsRow"></div>

  <div class="bottom-section">
    <div class="ctrl-group">
      <div style="font-size:11px;letter-spacing:2px;color:#888;margin-bottom:2px">LFO</div>
      <div class="ctrl-row">
        <span class="ctrl-lbl">RATE</span>
        <input type="range" class="slider-h" id="lfoRate" min="0" max="99" value="0" style="width:80px">
        <span class="ctrl-val" id="lfoRateVal">0</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-lbl">P.DEPTH</span>
        <input type="range" class="slider-h" id="lfoPitch" min="0" max="99" value="0" style="width:80px">
        <span class="ctrl-val" id="lfoPitchVal">0</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-lbl">A.DEPTH</span>
        <input type="range" class="slider-h" id="lfoAmp" min="0" max="99" value="0" style="width:80px">
        <span class="ctrl-val" id="lfoAmpVal">0</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-lbl">DELAY</span>
        <input type="range" class="slider-h" id="lfoDelay" min="0" max="99" value="0" style="width:80px">
        <span class="ctrl-val" id="lfoDelayVal">0</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-lbl">WAVE</span>
        <div id="lfoWaveforms" style="display:flex;gap:2px">
          <div class="wf-btn active" data-wf="0">TRI</div>
          <div class="wf-btn" data-wf="1">SD</div>
          <div class="wf-btn" data-wf="2">SU</div>
          <div class="wf-btn" data-wf="3">SQR</div>
          <div class="wf-btn" data-wf="4">SIN</div>
          <div class="wf-btn" data-wf="5">S+H</div>
        </div>
      </div>
    </div>
    <div class="ctrl-group" style="margin-left:16px">
      <div style="font-size:11px;letter-spacing:2px;color:#888;margin-bottom:2px">TRANSPOSE</div>
      <div class="ctrl-row">
        <input type="range" class="slider-h" id="transpose" min="-24" max="24" value="0" style="width:100px">
        <span class="ctrl-val" id="transposeVal">0</span>
      </div>
    </div>
  </div>
</div>

var audioCtx = null;
var mixerGain = null;
var masterGain = null;
var fmPedalFX = null;
var fmMixerSends = null;

// ==================== AUDIO INIT ====================
function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  mixerGain = audioCtx.createGain();
  mixerGain.gain.value = 1.0;
  fmMixerSends = new MixerSends(audioCtx);
  fmPedalFX = new PedalFXChain(audioCtx);
  masterGain.connect(fmPedalFX.getInput());
  fmPedalFX.getOutput().connect(fmMixerSends.getInput());
  fmMixerSends.getOutput().connect(mixerGain);
  mixerGain.connect(audioCtx.destination);
  window.fmPedalFX = fmPedalFX;
}

// ==================== DX7 ENVELOPE ====================
// DX7 rate-to-time conversion (approximate)
function dx7RateToTime(rate) {
  if (rate >= 99) return 0.004;
  if (rate <= 0) return 12.0;
  return Math.pow(10, -0.02 * rate + 1.7) * 0.4;
}

// DX7 level to amplitude (exponential curve)
function dx7LevelToAmp(level) {
  if (level <= 0) return 0;
  if (level >= 99) return 1;
  return Math.pow(level / 99, 2.5);
}

// Schedule DX7 4-stage envelope on a gain node
function scheduleDX7Envelope(gainNode, op, velocity, t0) {
  var g = gainNode.gain;
  var baseLevel = dx7LevelToAmp(op.level);
  var velScale = 1.0 - (op.velSens / 7) * (1.0 - velocity / 127);
  var amp = baseLevel * velScale;

  var l1 = dx7LevelToAmp(op.l1) * amp;
  var l2 = dx7LevelToAmp(op.l2) * amp;
  var l3 = dx7LevelToAmp(op.l3) * amp;
  var l4 = dx7LevelToAmp(op.l4) * amp;

  var t1 = dx7RateToTime(op.r1);
  var t2 = dx7RateToTime(op.r2);
  var t3 = dx7RateToTime(op.r3);

  g.cancelScheduledValues(t0);
  g.setValueAtTime(0, t0);
  g.linearRampToValueAtTime(l1, t0 + t1);
  g.linearRampToValueAtTime(l2, t0 + t1 + t2);
  g.linearRampToValueAtTime(l3, t0 + t1 + t2 + t3);

  return {l4: l4, totalAttack: t1 + t2 + t3};
}

function scheduleDX7Release(gainNode, l4, t0, rate4) {
  var t4 = dx7RateToTime(rate4);
  var g = gainNode.gain;
  g.cancelScheduledValues(t0);
  g.setValueAtTime(g.value, t0);
  g.linearRampToValueAtTime(l4, t0 + t4);
  g.linearRampToValueAtTime(0, t0 + t4 + 0.01);
  return t4 + 0.02;
}

// ==================== FM VOICE ====================
function createVoice(note, velocity) {
  ensureAudio();
  var alg = ALGORITHMS[patch.algorithm] || ALGORITHMS[1];
  var t0 = audioCtx.currentTime;
  var freq = 440 * Math.pow(2, (note + patch.transpose - 69) / 12);

  var ops = [];
  var envData = [];
  var outputGain = audioCtx.createGain();
  outputGain.gain.value = 1.0 / Math.max(1, alg.carriers.length);
  outputGain.connect(masterGain);

  // Create 6 operators
  for (var i = 0; i < 6; i++) {
    var opDef = patch.ops[i];
    var opFreq = freq * (opDef.ratio + opDef.fine / 100);
    var osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = opFreq;
    var envGain = audioCtx.createGain();
    envGain.gain.value = 0;
    osc.connect(envGain);
    osc.start(t0);
    ops.push({osc: osc, envGain: envGain, freq: opFreq});

    if (opDef.on) {
      var ed = scheduleDX7Envelope(envGain, opDef, velocity, t0);
      envData.push(ed);
    } else {
      envGain.gain.value = 0;
      envData.push({l4: 0, totalAttack: 0});
    }
  }

  // Wire modulations according to algorithm
  for (var m = 0; m < alg.mods.length; m++) {
    var modIdx = alg.mods[m][0];
    var carIdx = alg.mods[m][1];
    if (patch.ops[modIdx].on) {
      var modDepth = audioCtx.createGain();
      modDepth.gain.value = ops[carIdx].freq * dx7LevelToAmp(patch.ops[modIdx].level);
      ops[modIdx].envGain.connect(modDepth);
      modDepth.connect(ops[carIdx].osc.frequency);
      ops[modIdx].modDepth = modDepth;
    }
  }

  // Wire carriers to output
  for (var c = 0; c < alg.carriers.length; c++) {
    var ci = alg.carriers[c];
    if (patch.ops[ci].on) {
      ops[ci].envGain.connect(outputGain);
    }
  }

  // Feedback on op6 (index 5)
  var fbDelay = null, fbGain = null;
  if (patch.feedback > 0 && patch.ops[5].on) {
    fbDelay = audioCtx.createDelay(0.01);
    fbDelay.delayTime.value = 1 / audioCtx.sampleRate * 128;
    fbGain = audioCtx.createGain();
    fbGain.gain.value = (patch.feedback / 7) * ops[5].freq * 0.5;
    ops[5].envGain.connect(fbDelay);
    fbDelay.connect(fbGain);
    fbGain.connect(ops[5].osc.frequency);
  }

  // LFO modulation
  var lfoNodes = null;
  if (patch.lfo && (patch.lfo.pitchDepth > 0 || patch.lfo.ampDepth > 0) && patch.lfo.rate > 0) {
    var lfoOsc = audioCtx.createOscillator();
    var waveTypes = ['triangle','sawtooth','sawtooth','square','sine','triangle'];
    var wIdx = patch.lfo.wave || 0;
    lfoOsc.type = waveTypes[wIdx] || 'triangle';
    lfoOsc.frequency.value = 0.1 + (patch.lfo.rate / 99) * 20;

    var lfoDelayTime = (patch.lfo.delay / 99) * 3;

    if (patch.lfo.pitchDepth > 0) {
      var lfoPitchGain = audioCtx.createGain();
      lfoPitchGain.gain.value = 0;
      lfoPitchGain.gain.setValueAtTime(0, t0);
      lfoPitchGain.gain.linearRampToValueAtTime(
        (patch.lfo.pitchDepth / 99) * freq * 0.02,
        t0 + lfoDelayTime
      );
      lfoOsc.connect(lfoPitchGain);
      for (var i = 0; i < 6; i++) {
        if (patch.ops[i].on) lfoPitchGain.connect(ops[i].osc.frequency);
      }
    }

    if (patch.lfo.ampDepth > 0) {
      var lfoAmpGain = audioCtx.createGain();
      lfoAmpGain.gain.value = 0;
      lfoAmpGain.gain.setValueAtTime(0, t0);
      lfoAmpGain.gain.linearRampToValueAtTime(
        (patch.lfo.ampDepth / 99) * 0.5,
        t0 + lfoDelayTime
      );
      lfoOsc.connect(lfoAmpGain);
      lfoAmpGain.connect(outputGain.gain);
    }

    lfoOsc.start(t0);
    lfoNodes = {osc: lfoOsc};
  }

  return {
    ops: ops, envData: envData, outputGain: outputGain,
    fbDelay: fbDelay, fbGain: fbGain, lfoNodes: lfoNodes, note: note
  };
}

function releaseVoice(voice) {
  if (!voice || !audioCtx) return;
  var t0 = audioCtx.currentTime;
  var maxRelease = 0;
  for (var i = 0; i < 6; i++) {
    if (patch.ops[i].on) {
      var rt = scheduleDX7Release(voice.ops[i].envGain, voice.envData[i].l4, t0, patch.ops[i].r4);
      if (rt > maxRelease) maxRelease = rt;
    }
  }
  // Schedule cleanup
  var v = voice;
  setTimeout(function() { cleanupVoice(v); }, (maxRelease + 0.1) * 1000);
}

function cleanupVoice(voice) {
  if (!voice) return;
  for (var i = 0; i < 6; i++) {
    try { voice.ops[i].osc.stop(); } catch(e) {}
    try { voice.ops[i].osc.disconnect(); } catch(e) {}
    try { voice.ops[i].envGain.disconnect(); } catch(e) {}
    if (voice.ops[i].modDepth) try { voice.ops[i].modDepth.disconnect(); } catch(e) {}
  }
  try { voice.outputGain.disconnect(); } catch(e) {}
  if (voice.fbDelay) try { voice.fbDelay.disconnect(); } catch(e) {}
  if (voice.fbGain) try { voice.fbGain.disconnect(); } catch(e) {}
  if (voice.lfoNodes) try { voice.lfoNodes.osc.stop(); voice.lfoNodes.osc.disconnect(); } catch(e) {}
}

// ==================== NOTE ON / OFF ====================
function noteOn(note, vel) {
  ensureAudio();
  if (voices[note]) {
    releaseVoice(voices[note]);
    delete voices[note];
    var idx = voiceOrder.indexOf(note);
    if (idx >= 0) voiceOrder.splice(idx, 1);
  }
  // Voice stealing
  if (voiceOrder.length >= MAX_POLY) {
    var oldest = voiceOrder.shift();
    if (voices[oldest]) {
      releaseVoice(voices[oldest]);
      delete voices[oldest];
    }
  }
  voices[note] = createVoice(note, vel);
  voiceOrder.push(note);
}

function noteOff(note) {
  if (voices[note]) {
    releaseVoice(voices[note]);
    delete voices[note];
    var idx = voiceOrder.indexOf(note);
    if (idx >= 0) voiceOrder.splice(idx, 1);
  }
}

// ==================== PATCH MANAGEMENT ====================
function loadPatch(idx) {
  currentPatch = idx;
  patch = JSON.parse(JSON.stringify(PRESETS[idx]));
  document.getElementById('patchName').textContent = patch.name;
  updateUI();
}

function updateUI() {
  document.getElementById('algNum').textContent = patch.algorithm;
  document.getElementById('fbSlider').value = patch.feedback;
  document.getElementById('fbVal').textContent = patch.feedback;
  document.getElementById('transpose').value = patch.transpose;
  document.getElementById('transposeVal').textContent = patch.transpose;
  if (patch.lfo) {
    document.getElementById('lfoRate').value = patch.lfo.rate;
    document.getElementById('lfoRateVal').textContent = patch.lfo.rate;
    document.getElementById('lfoPitch').value = patch.lfo.pitchDepth;
    document.getElementById('lfoPitchVal').textContent = patch.lfo.pitchDepth;
    document.getElementById('lfoAmp').value = patch.lfo.ampDepth;
    document.getElementById('lfoAmpVal').textContent = patch.lfo.ampDepth;
    document.getElementById('lfoDelay').value = patch.lfo.delay;
    document.getElementById('lfoDelayVal').textContent = patch.lfo.delay;
    var wfBtns = document.querySelectorAll('#lfoWaveforms .wf-btn');
    for (var w = 0; w < wfBtns.length; w++) {
      wfBtns[w].classList.toggle('active', parseInt(wfBtns[w].dataset.wf) === patch.lfo.wave);
    }
  }
  // Update volume
  var vol = Math.round(masterGain ? masterGain.gain.value * 100 : 80);
  document.getElementById('masterVol').value = vol;
  document.getElementById('masterVolVal').textContent = vol;

  // Update operator panels
  for (var i = 0; i < 6; i++) {
    updateOpPanel(i);
  }
  drawAlgorithm();
  drawAllEnvelopes();
}

function updateOpPanel(i) {
  var op = patch.ops[i];
  var panel = document.getElementById('op' + i);
  if (!panel) return;
  var alg = ALGORITHMS[patch.algorithm] || ALGORITHMS[1];
  var isCarrier = alg.carriers.indexOf(i) >= 0;

  panel.querySelector('.op-title').className = 'op-title' + (isCarrier ? ' carrier' : '');
  panel.querySelector('.op-title').textContent = 'OP' + (i + 1) + (isCarrier ? ' [C]' : ' [M]');

  var toggle = panel.querySelector('.op-toggle');
  toggle.className = 'op-toggle' + (op.on ? ' on' : '');
  toggle.textContent = op.on ? 'ON' : '--';

  panel.querySelector('.op-level').value = op.level;
  panel.querySelector('.op-level-val').textContent = op.level;
  panel.querySelector('.op-ratio-val').textContent = op.ratio.toFixed(op.ratio % 1 === 0 ? 0 : 2);
  panel.querySelector('.op-fine-val').textContent = op.fine;
  panel.querySelector('.op-coarse').value = Math.min(31, Math.round(op.ratio));
  panel.querySelector('.op-fine').value = op.fine;
  panel.querySelector('.op-velsens').value = op.velSens;
  panel.querySelector('.op-velsens-val').textContent = op.velSens;

  var envNames = ['r1','r2','r3','r4','l1','l2','l3','l4'];
  for (var e = 0; e < envNames.length; e++) {
    var sl = panel.querySelector('.env-' + envNames[e]);
    if (sl) sl.value = op[envNames[e]];
  }
}

function buildOpPanels() {
  var row = document.getElementById('opsRow');
  row.innerHTML = '';
  for (var i = 0; i < 6; i++) {
    var p = document.createElement('div');
    p.className = 'op-panel';
    p.id = 'op' + i;
    p.innerHTML =
      '<div class="op-header">' +
        '<span class="op-title">OP' + (i+1) + '</span>' +

        '<span class="op-val op-level-val">99</span></div>' +
      '<div class="op-row"><span class="op-lbl">RATIO</span>' +
        '<span class="op-val op-ratio-val">1</span></div>' +
      '<div class="op-row"><span class="op-lbl">COARSE</span>' +
        '<input type="range" class="slider-h op-coarse" data-op="' + i + '" data-param="coarse" min="0" max="31" value="1">' +
      '</div>' +
      '<div class="op-row"><span class="op-lbl">FINE</span>' +
        '<input type="range" class="slider-h op-fine" data-op="' + i + '" data-param="fine" min="0" max="99" value="0">' +
        '<span class="op-val op-fine-val">0</span></div>' +
      '<div class="op-row"><span class="op-lbl">V.SENS</span>' +
        '<input type="range" class="slider-h op-velsens" data-op="' + i + '" data-param="velSens" min="0" max="7" value="0">' +
        '<span class="op-val op-velsens-val">0</span></div>' +
      '<div class="env-area">' +
        '<canvas class="env-canvas" id="envCanvas' + i + '" width="160" height="40"></canvas>' +
        '<div class="env-sliders">' +
          '<div class="env-col"><div class="env-col-lbl">R1</div><input type="range" class="eslider env-r1" data-op="' + i + '" data-env="r1" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">R2</div><input type="range" class="eslider env-r2" data-op="' + i + '" data-env="r2" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">R3</div><input type="range" class="eslider env-r3" data-op="' + i + '" data-env="r3" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">R4</div><input type="range" class="eslider env-r4" data-op="' + i + '" data-env="r4" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">L1</div><input type="range" class="eslider env-l1" data-op="' + i + '" data-env="l1" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">L2</div><input type="range" class="eslider env-l2" data-op="' + i + '" data-env="l2" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">L3</div><input type="range" class="eslider env-l3" data-op="' + i + '" data-env="l3" min="0" max="99" value="99"></div>' +
          '<div class="env-col"><div class="env-col-lbl">L4</div><input type="range" class="eslider env-l4" data-op="' + i + '" data-env="l4" min="0" max="99" value="0"></div>' +
        '</div>' +
      '</div>';
    row.appendChild(p);
  }
}

// ==================== DRAW ALGORITHM DIAGRAM ====================
function drawAlgorithm() {
  var canvas = document.getElementById('algoCanvas');
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  var alg = ALGORITHMS[patch.algorithm] || ALGORITHMS[1];
  var opSize = 14;
  var spacing = 18;

  // Simple layout: carriers on bottom, modulators stacked above
  // Position each operator
  var positions = [];
  var cx = w / 2;
  var carrierY = h - 12;
  var carrierCount = alg.carriers.length;
  var carrierStartX = cx - ((carrierCount - 1) * spacing) / 2;

  // Map each op to a position
  var assigned = {};
  // Place carriers
  for (var c = 0; c < alg.carriers.length; c++) {
    var ci = alg.carriers[c];
    assigned[ci] = {x: carrierStartX + c * spacing, y: carrierY};
  }

  // Find modulation chains and place modulators above their targets
  function placeModsAbove(targetIdx, depth) {
    for (var m = 0; m < alg.mods.length; m++) {
      var modIdx = alg.mods[m][0];
      var carIdx = alg.mods[m][1];
      if (carIdx === targetIdx && !assigned[modIdx]) {
        assigned[modIdx] = {x: assigned[targetIdx].x, y: assigned[targetIdx].y - spacing};
        placeModsAbove(modIdx, depth + 1);
      }
    }
  }
  for (var c = 0; c < alg.carriers.length; c++) {
    placeModsAbove(alg.carriers[c], 0);
  }

  // Place any unassigned ops
  var unassigned = [];
  for (var i = 0; i < 6; i++) {
    if (!assigned[i]) unassigned.push(i);
  }
  for (var u = 0; u < unassigned.length; u++) {
    assigned[unassigned[u]] = {x: 10 + u * spacing, y: 12};
  }

  // Draw connections
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  for (var m = 0; m < alg.mods.length; m++) {
    var from = assigned[alg.mods[m][0]];
    var to = assigned[alg.mods[m][1]];
    if (from && to) {
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
    }
  }

  // Draw feedback arc on op6
  if (patch.feedback > 0) {
    var fbPos = assigned[5];
    if (fbPos) {
      ctx.strokeStyle = '#228B22';
      ctx.beginPath();
      ctx.arc(fbPos.x + opSize/2 + 3, fbPos.y - 2, 6, 0, Math.PI * 1.5);
      ctx.stroke();
    }
  }

  // Draw operator boxes
  for (var i = 0; i < 6; i++) {
    var pos = assigned[i];
    if (!pos) continue;
    var isCarrier = alg.carriers.indexOf(i) >= 0;
    ctx.fillStyle = isCarrier ? '#228B22' : '#444';
    ctx.fillRect(pos.x - opSize/2, pos.y - opSize/2, opSize, opSize);
    ctx.fillStyle = isCarrier ? '#000' : '#fff';
    ctx.font = '700 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(i + 1), pos.x, pos.y);
  }
}

// ==================== DRAW ENVELOPE ====================
function drawEnvelope(opIdx) {
  var canvas = document.getElementById('envCanvas' + opIdx);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  var op = patch.ops[opIdx];
  var t1 = dx7RateToTime(op.r1);
  var t2 = dx7RateToTime(op.r2);
  var t3 = dx7RateToTime(op.r3);
  var t4 = dx7RateToTime(op.r4);
  var totalTime = t1 + t2 + t3 + t4;
  if (totalTime <= 0) totalTime = 1;

  var l1 = op.l1 / 99;
  var l2 = op.l2 / 99;
  var l3 = op.l3 / 99;
  var l4 = op.l4 / 99;

  var pad = 2;
  var drawW = w - pad * 2;
  var drawH = h - pad * 2;

  function tx(t) { return pad + (t / totalTime) * drawW; }
  function ty(l) { return pad + (1 - l) * drawH; }

  ctx.strokeStyle = '#228B22';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(tx(0), ty(0));
  ctx.lineTo(tx(t1), ty(l1));
  ctx.lineTo(tx(t1 + t2), ty(l2));
  ctx.lineTo(tx(t1 + t2 + t3), ty(l3));

  // Dashed line for release
  ctx.stroke();
  ctx.setLineDash([2, 2]);
  ctx.strokeStyle = '#555';
  ctx.beginPath();
  ctx.moveTo(tx(t1 + t2 + t3), ty(l3));
  ctx.lineTo(tx(totalTime), ty(l4));
  ctx.stroke();
  ctx.setLineDash([]);

  // Sustain indicator
  ctx.fillStyle = '#228B22';
  ctx.fillRect(tx(t1 + t2 + t3) - 1, ty(l3) - 1, 3, 3);
}

function drawAllEnvelopes() {
  for (var i = 0; i < 6; i++) drawEnvelope(i);
}

// ==================== PATCH LIST ====================
function buildPatchList() {
  var list = document.getElementById('patchList');
  list.innerHTML = '';
  for (var i = 0; i < PRESETS.length; i++) {
    var item = document.createElement('div');
    item.className = 'patch-item' + (i === currentPatch ? ' active' : '');
    item.textContent = (i + 1) + '. ' + PRESETS[i].name;
    item.dataset.idx = i;
    list.appendChild(item);
  }
}

// ==================== EVENT HANDLERS ====================
function initEvents() {
  // Patch navigation
  document.getElementById('patchPrev').addEventListener('mousedown', function() {
    ensureAudio();
    loadPatch((currentPatch - 1 + PRESETS.length) % PRESETS.length);
  });
  document.getElementById('patchNext').addEventListener('mousedown', function() {
    ensureAudio();
    loadPatch((currentPatch + 1) % PRESETS.length);
  });

  // Patch name click -> toggle list
  document.getElementById('patchName').addEventListener('mousedown', function() {
    var list = document.getElementById('patchList');
    list.classList.toggle('open');
  });
  document.getElementById('patchList').addEventListener('mousedown', function(e) {
    var item = e.target.closest('.patch-item');
    if (item) {
      ensureAudio();
      loadPatch(parseInt(item.dataset.idx));
      document.getElementById('patchList').classList.remove('open');
    }
  });
  // Close list on outside click
  document.addEventListener('mousedown', function(e) {
    if (!e.target.closest('.patch-area')) {
      document.getElementById('patchList').classList.remove('open');
    }
  });

  // Algorithm navigation
  document.getElementById('algPrev').addEventListener('mousedown', function() {
    patch.algorithm = patch.algorithm <= 1 ? 32 : patch.algorithm - 1;
    updateUI();
  });
  document.getElementById('algNext').addEventListener('mousedown', function() {
    patch.algorithm = patch.algorithm >= 32 ? 1 : patch.algorithm + 1;
    updateUI();
  });

  // Feedback slider
  document.getElementById('fbSlider').addEventListener('input', function() {
    patch.feedback = parseInt(this.value);
    document.getElementById('fbVal').textContent = patch.feedback;
    drawAlgorithm();
  });

  // Master volume
  document.getElementById('masterVol').addEventListener('input', function() {
    var v = parseInt(this.value);
    document.getElementById('masterVolVal').textContent = v;
    if (masterGain) masterGain.gain.value = v / 100;
  });

  // Transpose
  document.getElementById('transpose').addEventListener('input', function() {
    patch.transpose = parseInt(this.value);
    document.getElementById('transposeVal').textContent = patch.transpose;
  });

  // LFO controls
  document.getElementById('lfoRate').addEventListener('input', function() {
    patch.lfo.rate = parseInt(this.value);
    document.getElementById('lfoRateVal').textContent = patch.lfo.rate;
  });
  document.getElementById('lfoPitch').addEventListener('input', function() {
    patch.lfo.pitchDepth = parseInt(this.value);
    document.getElementById('lfoPitchVal').textContent = patch.lfo.pitchDepth;
  });
  document.getElementById('lfoAmp').addEventListener('input', function() {
    patch.lfo.ampDepth = parseInt(this.value);
    document.getElementById('lfoAmpVal').textContent = patch.lfo.ampDepth;
  });
  document.getElementById('lfoDelay').addEventListener('input', function() {
    patch.lfo.delay = parseInt(this.value);
    document.getElementById('lfoDelayVal').textContent = patch.lfo.delay;
  });

  // LFO waveform buttons
  document.getElementById('lfoWaveforms').addEventListener('mousedown', function(e) {
    var btn = e.target.closest('.wf-btn');
    if (!btn) return;
    patch.lfo.wave = parseInt(btn.dataset.wf);
    var btns = document.querySelectorAll('#lfoWaveforms .wf-btn');
    for (var b = 0; b < btns.length; b++) btns[b].classList.toggle('active', btns[b] === btn);
  });

  // Operator panel events (delegated)
  document.getElementById('opsRow').addEventListener('mousedown', function(e) {
    var toggle = e.target.closest('.op-toggle');
    if (toggle) {
      ensureAudio();
      var opIdx = parseInt(toggle.dataset.op);
      patch.ops[opIdx].on = !patch.ops[opIdx].on;
      updateOpPanel(opIdx);
      drawAlgorithm();
    }
  });

  document.getElementById('opsRow').addEventListener('input', function(e) {
    var el = e.target;
    var opIdx = parseInt(el.dataset.op);
    if (isNaN(opIdx)) opIdx = parseInt(el.dataset.op);
    if (isNaN(opIdx)) return;
    var op = patch.ops[opIdx];

    if (el.dataset.param === 'level') {
      op.level = parseInt(el.value);
      el.parentElement.querySelector('.op-level-val').textContent = op.level;
    }
    if (el.dataset.param === 'coarse') {
      var coarse = parseInt(el.value);
      op.ratio = coarse + op.fine / 100;
      if (coarse === 0) op.ratio = 0.5 + op.fine / 200;
      var panel = document.getElementById('op' + opIdx);
      panel.querySelector('.op-ratio-val').textContent = op.ratio.toFixed(op.ratio % 1 === 0 ? 0 : 2);
    }
    if (el.dataset.param === 'fine') {
      op.fine = parseInt(el.value);
      var coarseVal = Math.round(op.ratio);
      op.ratio = coarseVal + op.fine / 100;
      var panel = document.getElementById('op' + opIdx);
      panel.querySelector('.op-fine-val').textContent = op.fine;
      panel.querySelector('.op-ratio-val').textContent = op.ratio.toFixed(op.ratio % 1 === 0 ? 0 : 2);
    }
    if (el.dataset.param === 'velSens') {
      op.velSens = parseInt(el.value);
      el.parentElement.querySelector('.op-velsens-val').textContent = op.velSens;
    }
    if (el.dataset.env) {
      op[el.dataset.env] = parseInt(el.value);
      drawEnvelope(opIdx);
    }
  });
}

// ==================== KEYBOARD ====================
var kbOctave = 4;
var kbNotesDown = {};
var KB_MAP = {
  'a': 0, 'w': 1, 's': 2, 'e': 3, 'd': 4, 'f': 5,
  't': 6, 'g': 7, 'y': 8, 'h': 9, 'u': 10, 'j': 11, 'k': 12
};

function kbMidi(key) {
  if (KB_MAP[key] === undefined) return -1;
  return kbOctave * 12 + KB_MAP[key];
}

window.__kbEnabled = false;

document.addEventListener('keydown', function(e) {
  if (!window.__kbEnabled) return;
  if (e.repeat) return;
  var k = e.key.toLowerCase();
  if (k === 'z') { kbOctave = Math.max(1, kbOctave - 1); return; }
  if (k === 'x') { kbOctave = Math.min(7, kbOctave + 1); return; }
  var m = kbMidi(k);
  if (m >= 0 && !kbNotesDown[k]) {
    ensureAudio();
    kbNotesDown[k] = m;
    noteOn(m, 100);
  }
}, true);

document.addEventListener('keyup', function(e) {
  if (!window.__kbEnabled) return;
  var k = e.key.toLowerCase();
  if (kbNotesDown[k]) {
    noteOff(kbNotesDown[k]);
    delete kbNotesDown[k];
  }
}, true);

// ==================== MESSAGE BRIDGE ====================
window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d) return;

  if (d.type === 'midi' && d.data) {
    ensureAudio();
    var cmd = d.data[0] & 0xf0;
    var note = d.data[1];
    var vel = d.data[2];
    if (cmd === 0x90 && vel > 0) {
      noteOn(note, vel);
    } else if (cmd === 0x80 || (cmd === 0x90 && vel === 0)) {
      noteOff(note);
    }
  }

  if (d.type === 'keyboard-focus') {
    window.__kbEnabled = d.enabled;
  }

  if (d.type === 'mixer') {
    ensureAudio();
    if (d.param === 'volume' && mixerGain) mixerGain.gain.value = d.value;
    else if (d.param === 'mute') {
      __muted = d.value > 0;
      if (mixerGain) mixerGain.gain.value = __muted ? 0 : 1;
    }
    else if (fmMixerSends) fmMixerSends.setParam(d.param, d.value);
  }

  if (d.type === 'mixer-fx' && fmMixerSends) {
    ensureAudio();
    if (d.fx === 'reverb') fmMixerSends.updateReverb(d.param, d.value);
    if (d.fx === 'delay') fmMixerSends.updateDelay(d.param, d.value);
  }

  if (d.type === 'pedals' && fmPedalFX) {
    fmPedalFX.update(d.pedals);
  }

  if (d.type === 'get-session') {
    window.parent.postMessage({
      type: 'session-data',
      source: 'fm',
      data: {
        patchIndex: currentPatch,
        kbOctave: kbOctave
      }
    }, '*');
  }

  if (d.type === 'load-session' && d.data) {
    if (d.data.patchIndex !== undefined) {
      loadPatch(d.data.patchIndex);
    }
    if (d.data.kbOctave !== undefined) kbOctave = d.data.kbOctave;
  }
});

// ==================== INIT ====================
buildOpPanels();
buildPatchList();
initEvents();
loadPatch(0);

// First click initializes audio
document.addEventListener('mousedown', function initAudio() {
  ensureAudio();
  document.removeEventListener('mousedown', initAudio);
}, {once: true});

window.parent.postMessage({type: 'instrument-ready', name: 'fm'}, '*');

})();
</script>
