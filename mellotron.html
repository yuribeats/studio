<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELLOTRON</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .mellotron {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-bar {
            background: #000;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .brand { font-size: 11px; letter-spacing: 3px; color: #fff; }
        .model { font-size: 16px; letter-spacing: 3px; color: #228B22; }
        .controls {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: auto;
        }
        .ctrl-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .ctrl-label { font-size: 10px; letter-spacing: 1px; color: #fff; }
        .knob-wrap { width: 40px; height: 40px; position: relative; }
        .knob {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 40% 35%, #444, #1a1a1a);
            border: 1px solid #555;
            position: relative;
        }
        .knob-indicator {
            position: absolute;
            width: 2px;
            height: 12px;
            background: #228B22;
            top: 3px;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%);
        }
        .tape-section {
            display: flex;
            gap: 2px;
            padding: 8px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .tape-btn {
            padding: 8px 14px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            background: #111;
            border: 1px solid #333;
        }
        .tape-btn.active {
            border-color: #228B22;
            color: #228B22;
            background: #0a1a0a;
        }
        .keyboard-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0 10px 10px 10px;
            overflow: hidden;
        }
        .keyboard {
            display: flex;
            position: relative;
            height: 100%;
            max-height: 180px;
        }
        .white-key {
            width: 22px;
            height: 100%;
            background: linear-gradient(180deg, #d0c8b0 0%, #e8e0c8 90%, #c0b8a0 100%);
            border: 1px solid #888;
            border-top: none;
            position: absolute;
            z-index: 1;
        }
        .white-key.active { background: linear-gradient(180deg, #a8c8a8 0%, #c8e0c8 90%, #90b090 100%); }
        .black-key {
            width: 14px;
            height: 60%;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            border: 1px solid #000;
            position: absolute;
            z-index: 2;
            top: 0;
        }
        .black-key.active { background: linear-gradient(180deg, #2a4a2a 0%, #1a3a1a 100%); }
    </style>
</head>
<body>
<div class="mellotron">
    <div class="top-bar">
        <span class="brand">STREETLY ELECTRONICS</span>
        <span class="model">MELLOTRON M400</span>
        <div class="controls">
            <div class="ctrl-group">
                <span class="ctrl-label">VOLUME</span>
                <div class="knob-wrap"><div class="knob" data-param="volume" data-value="0.7"><div class="knob-indicator"></div></div></div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">TONE</span>
                <div class="knob-wrap"><div class="knob" data-param="tone" data-value="0.5"><div class="knob-indicator"></div></div></div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">SPEED</span>
                <div class="knob-wrap"><div class="knob" data-param="speed" data-value="0.5"><div class="knob-indicator"></div></div></div>
            </div>
        </div>
    </div>
    <div class="tape-section">
        <div class="tape-btn active" data-tape="strings">STRINGS</div>
        <div class="tape-btn" data-tape="flute">FLUTE</div>
        <div class="tape-btn" data-tape="choir">CHOIR</div>
        <div class="tape-btn" data-tape="brass">BRASS</div>
        <div class="tape-btn" data-tape="cello">CELLO</div>
    </div>
    <div class="keyboard-area">
        <div class="keyboard" id="keyboard"></div>
    </div>
</div>

<script src="pedal-fx.js"></script>
<script>
(function() {
    var actx = null, masterGain = null, mixerGain = null, pedalFX = null, mixerSends = null;
    var params = { volume: 0.7, tone: 0.5, speed: 0.5 };
    var currentTape = 'strings';
    var activeVoices = {};
    var muted = false;

    function ensureAudio() {
        if (actx) return;
        actx = new (window.AudioContext || window.webkitAudioContext)();
        if (window.loadAirwindowsWorklet) loadAirwindowsWorklet(actx);
        masterGain = actx.createGain();
        masterGain.gain.value = params.volume;
        mixerGain = actx.createGain();
        mixerGain.gain.value = 1.0;
        window._masterOut = actx.createGain();
        window._masterOut.connect(actx.destination);
        window._captureNode = actx.createMediaStreamDestination();
        window._masterOut.connect(window._captureNode);
        mixerSends = new MixerSends(actx, window._masterOut);
        pedalFX = new PedalFXChain(actx);
        masterGain.connect(pedalFX.getInput());
        pedalFX.getOutput().connect(mixerSends.getInput());
        mixerSends.getOutput().connect(mixerGain);
        mixerGain.connect(window._masterOut);
    }

    // Mellotron tape sounds synthesized with additive/subtractive
    var TAPE_CONFIGS = {
        strings: { type: 'sawtooth', filterFreq: 3000, filterQ: 0.5, detune: [0, 7, -7, 3], attack: 0.08, release: 0.3, gain: 0.2 },
        flute: { type: 'sine', filterFreq: 4000, filterQ: 1.0, detune: [0, 2], attack: 0.05, release: 0.15, gain: 0.35, harmonics: [1, 0.3, 0.1] },
        choir: { type: 'sawtooth', filterFreq: 2000, filterQ: 2.0, detune: [0, 5, -5, 10, -10], attack: 0.12, release: 0.5, gain: 0.15, formant: true },
        brass: { type: 'sawtooth', filterFreq: 2500, filterQ: 1.5, detune: [0, 3, -3], attack: 0.04, release: 0.2, gain: 0.25 },
        cello: { type: 'sawtooth', filterFreq: 1500, filterQ: 0.8, detune: [0, 5, -5], attack: 0.1, release: 0.4, gain: 0.25, octave: -1 }
    };

    function noteOn(midi, vel) {
        if (!actx) ensureAudio();
        if (actx.state === 'suspended') actx.resume();
        if (activeVoices[midi]) noteOff(midi);

        var cfg = TAPE_CONFIGS[currentTape];
        var freq = 440 * Math.pow(2, (midi - 69) / 12) * Math.pow(2, cfg.octave || 0);
        var amp = (vel / 127) * cfg.gain;
        var now = actx.currentTime;
        var voice = { oscs: [], nodes: [] };

        // Envelope
        var env = actx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(amp, now + cfg.attack);
        env.connect(masterGain);
        voice.env = env;

        // Tape wobble — pitch instability
        var wobble = actx.createOscillator();
        wobble.type = 'sine';
        wobble.frequency.value = 3 + params.speed * 8;
        var wobbleGain = actx.createGain();
        wobbleGain.gain.value = 3 + params.speed * 5;
        wobble.connect(wobbleGain);
        wobble.start(now);
        voice.oscs.push(wobble);

        // Tone filter
        var lpf = actx.createBiquadFilter();
        lpf.type = 'lowpass';
        lpf.frequency.value = cfg.filterFreq * (0.3 + params.tone * 1.4);
        lpf.Q.value = cfg.filterQ;
        lpf.connect(env);
        voice.lpf = lpf;

        // Formant filters for choir
        if (cfg.formant) {
            var formants = [700, 1200, 2600];
            var formantNode = actx.createGain();
            formantNode.gain.value = 1;
            formants.forEach(function(f) {
                var bp = actx.createBiquadFilter();
                bp.type = 'bandpass';
                bp.frequency.value = f;
                bp.Q.value = 5;
                formantNode.connect(bp);
                bp.connect(lpf);
                voice.nodes.push(bp);
            });
            voice.formantIn = formantNode;
        }

        // Oscillators
        var dest = cfg.formant ? voice.formantIn : lpf;
        if (cfg.harmonics) {
            cfg.harmonics.forEach(function(h, i) {
                var osc = actx.createOscillator();
                osc.type = cfg.type;
                osc.frequency.value = freq * (i + 1);
                wobbleGain.connect(osc.detune);
                var g = actx.createGain();
                g.gain.value = h / cfg.detune.length;
                osc.connect(g);
                g.connect(dest);
                osc.start(now);
                voice.oscs.push(osc);
            });
        } else {
            cfg.detune.forEach(function(dt) {
                var osc = actx.createOscillator();
                osc.type = cfg.type;
                osc.frequency.value = freq;
                osc.detune.value = dt;
                wobbleGain.connect(osc.detune);
                var g = actx.createGain();
                g.gain.value = 1.0 / cfg.detune.length;
                osc.connect(g);
                g.connect(dest);
                osc.start(now);
                voice.oscs.push(osc);
            });
        }

        // Noise layer for tape hiss
        var noiseLen = actx.sampleRate * 0.5;
        var noiseBuf = actx.createBuffer(1, noiseLen, actx.sampleRate);
        var noiseData = noiseBuf.getChannelData(0);
        for (var i = 0; i < noiseLen; i++) noiseData[i] = (Math.random() * 2 - 1) * 0.01;
        var noise = actx.createBufferSource();
        noise.buffer = noiseBuf;
        noise.loop = true;
        var noiseGain = actx.createGain();
        noiseGain.gain.value = 0.02;
        noise.connect(noiseGain);
        noiseGain.connect(env);
        noise.start(now);
        voice.oscs.push(noise);

        activeVoices[midi] = voice;
        voice.cfg = cfg;
        highlightKey(midi, true);
    }

    function noteOff(midi) {
        var voice = activeVoices[midi];
        if (!voice) return;
        var now = actx.currentTime;
        var rel = voice.cfg.release;
        voice.env.gain.cancelScheduledValues(now);
        voice.env.gain.setValueAtTime(voice.env.gain.value, now);
        voice.env.gain.linearRampToValueAtTime(0, now + rel);
        voice.oscs.forEach(function(o) { try { o.stop(now + rel + 0.05); } catch(e) {} });
        delete activeVoices[midi];
        highlightKey(midi, false);
    }

    // Keyboard
    var FIRST_MIDI = 36, LAST_MIDI = 96;
    var BLACK_INDICES = [1, 3, 6, 8, 10];
    var keyElements = {};
    var mouseNoteDown = null;

    function isBlack(m) { return BLACK_INDICES.indexOf(m % 12) >= 0; }

    function buildKeyboard() {
        var kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        var whites = [];
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) { if (!isBlack(m)) whites.push(m); }
        var w = 22;
        kb.style.width = (whites.length * w) + 'px';
        whites.forEach(function(m, i) {
            var el = document.createElement('div');
            el.className = 'white-key';
            el.dataset.midi = m;
            el.style.left = (i * w) + 'px';
            el.style.width = w + 'px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', function(e) { e.preventDefault(); ensureAudio(); noteOn(m, 100); mouseNoteDown = m; });
            el.addEventListener('mouseenter', function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOff(mouseNoteDown); noteOn(m, 80); mouseNoteDown = m; } });
        });
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) {
            if (!isBlack(m)) continue;
            var prevIdx = whites.indexOf(m - 1);
            if (prevIdx < 0) continue;
            var el = document.createElement('div');
            el.className = 'black-key';
            el.dataset.midi = m;
            el.style.left = ((prevIdx + 1) * w - 7) + 'px';
            el.style.width = '14px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', (function(mm) { return function(e) { e.preventDefault(); ensureAudio(); noteOn(mm, 100); mouseNoteDown = mm; }; })(m));
            el.addEventListener('mouseenter', (function(mm) { return function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOff(mouseNoteDown); noteOn(mm, 80); mouseNoteDown = mm; } }; })(m));
        }
    }
    document.addEventListener('mouseup', function() { if (mouseNoteDown !== null) { noteOff(mouseNoteDown); mouseNoteDown = null; } });
    function highlightKey(midi, on) { var el = keyElements[midi]; if (el) { if (on) el.classList.add('active'); else el.classList.remove('active'); } }

    // Knobs
    document.querySelectorAll('.knob').forEach(function(knob) {
        var param = knob.dataset.param;
        var val = parseFloat(knob.dataset.value);
        var ind = knob.querySelector('.knob-indicator');
        function setRot(v) { ind.style.transform = 'translateX(-50%) rotate(' + (-135 + v * 270) + 'deg)'; }
        setRot(val);
        var dragging = false, startY = 0, startVal = 0;
        knob.addEventListener('mousedown', function(e) {
            e.preventDefault(); dragging = true; startY = e.clientY; startVal = parseFloat(knob.dataset.value);
            function onMove(e2) {
                if (!dragging) return;
                var nv = Math.max(0, Math.min(1, startVal + (startY - e2.clientY) / 150));
                knob.dataset.value = nv;
                setRot(nv);
                params[param] = nv;
                if (param === 'volume' && masterGain) masterGain.gain.value = nv;
            }
            function onUp() { dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });
    });

    // Tape buttons
    document.querySelectorAll('.tape-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            currentTape = btn.dataset.tape;
            document.querySelectorAll('.tape-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            // Kill all active voices on tape change
            Object.keys(activeVoices).forEach(function(k) { noteOff(parseInt(k)); });
        });
    });

    // Keyboard input
    window.__kbEnabled = false;
    var kbOctave = 4;
    var KEY_MAP = { 'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,'k':12,'o':13,'l':14 };
    var kbNotesDown = {};
    document.addEventListener('keydown', function(e) {
        if (!window.__kbEnabled) return;
        if (e.repeat) return;
        var k = e.key.toLowerCase();
        if (k === 'z') { kbOctave = Math.max(1, kbOctave - 1); return; }
        if (k === 'x') { kbOctave = Math.min(7, kbOctave + 1); return; }
        var semi = KEY_MAP[k]; if (semi === undefined) return;
        var m = (kbOctave + 1) * 12 + semi;
        if (m >= 0 && !kbNotesDown[k]) { ensureAudio(); kbNotesDown[k] = m; noteOn(m, 100); }
    }, true);
    document.addEventListener('keyup', function(e) {
        if (!window.__kbEnabled) return;
        var k = e.key.toLowerCase();
        if (kbNotesDown[k]) { noteOff(kbNotesDown[k]); delete kbNotesDown[k]; }
    }, true);

    // Message bridge
    window.addEventListener('message', function(e) {
        var d = e.data; if (!d) return;
        if (d.type === 'midi') { ensureAudio(); var data = d.data || d; var cmd = data[0] & 0xF0; if (cmd === 0x90 && data[2] > 0) noteOn(data[1], data[2]); else if (cmd === 0x80 || (cmd === 0x90 && data[2] === 0)) noteOff(data[1]); }
        if (d.type === 'keyboard-focus') window.__kbEnabled = d.enabled;
        if (d.type === 'mixer') {
            ensureAudio();
            if (d.param === 'volume' && mixerGain) mixerGain.gain.value = d.value;
            else if (d.param === 'mute') { muted = d.value > 0; if (mixerGain) mixerGain.gain.value = muted ? 0 : 1; }
            else if (mixerSends) mixerSends.setParam(d.param, d.value);
        }
        if (d.type === 'mixer-fx' && mixerSends) {
            ensureAudio();
            if (d.fx === 'reverb') mixerSends.updateReverb(d.param, d.value);
            if (d.fx === 'delay') mixerSends.updateDelay(d.param, d.value);
        }
        if (d.type === 'pedals' && pedalFX) pedalFX.update(d.pedals);
        if (d.type === 'get-session') {
            window.parent.postMessage({ type: 'session-data', source: 'mellotron', data: { params: params, tape: currentTape, kbOctave: kbOctave } }, '*');
        }
        if (d.type === 'load-session' && d.data) {
            if (d.data.params) { for (var k in d.data.params) params[k] = d.data.params[k]; if (masterGain) masterGain.gain.value = params.volume; }
            if (d.data.tape) { currentTape = d.data.tape; document.querySelectorAll('.tape-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tape === currentTape); }); }
            if (d.data.kbOctave !== undefined) kbOctave = d.data.kbOctave;
        }
    });

    buildKeyboard();
    window.parent.postMessage({ type: 'instrument-ready', name: 'mellotron' }, '*');
})();
</script>
</body>
</html>
