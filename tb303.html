<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB-303</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .tb303 {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-bar {
            background: #000;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .brand { font-size: 11px; letter-spacing: 3px; color: #fff; }
        .model { font-size: 16px; letter-spacing: 3px; color: #228B22; }
        .knob-panel {
            display: flex;
            gap: 20px;
            padding: 12px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .ctrl-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .ctrl-label { font-size: 10px; letter-spacing: 1px; color: #fff; }
        .knob-wrap { width: 44px; height: 44px; position: relative; }
        .knob {
            width: 44px;
            height: 44px;
            background: radial-gradient(circle at 40% 35%, #444, #1a1a1a);
            border: 1px solid #555;
            position: relative;
        }
        .knob-indicator {
            position: absolute;
            width: 2px;
            height: 14px;
            background: #228B22;
            top: 3px;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%);
        }
        .wave-section {
            display: flex;
            gap: 2px;
            padding: 8px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .wave-btn {
            padding: 8px 20px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            background: #111;
            border: 1px solid #333;
        }
        .wave-btn.active {
            border-color: #228B22;
            color: #228B22;
            background: #0a1a0a;
        }
        .keyboard-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0 10px 10px 10px;
            overflow: hidden;
        }
        .keyboard {
            display: flex;
            position: relative;
            height: 100%;
            max-height: 160px;
        }
        .white-key {
            width: 28px;
            height: 100%;
            background: linear-gradient(180deg, #e8e4dc 0%, #faf9f5 90%, #e0dcd4 100%);
            border: 1px solid #999;
            border-top: none;
            position: absolute;
            z-index: 1;
        }
        .white-key.active { background: linear-gradient(180deg, #a8c8a8 0%, #c8e0c8 90%, #90b090 100%); }
        .black-key {
            width: 18px;
            height: 60%;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            border: 1px solid #000;
            position: absolute;
            z-index: 2;
            top: 0;
        }
        .black-key.active { background: linear-gradient(180deg, #2a4a2a 0%, #1a3a1a 100%); }
        .filter-display {
            padding: 8px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .filter-bar {
            flex: 1;
            height: 6px;
            background: #111;
            border: 1px solid #222;
            position: relative;
        }
        .filter-fill {
            height: 100%;
            background: #228B22;
            width: 50%;
            transition: width 0.05s;
        }
        .filter-label { font-size: 10px; letter-spacing: 1px; color: #228B22; white-space: nowrap; }
    </style>
</head>
<body>
<div class="tb303">
    <div class="top-bar">
        <span class="brand">ROLAND</span>
        <span class="model">TB-303 BASS LINE</span>
    </div>
    <div class="knob-panel">
        <div class="ctrl-group">
            <span class="ctrl-label">CUTOFF</span>
            <div class="knob-wrap"><div class="knob" data-param="cutoff" data-value="0.4"><div class="knob-indicator"></div></div></div>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">RESONANCE</span>
            <div class="knob-wrap"><div class="knob" data-param="resonance" data-value="0.5"><div class="knob-indicator"></div></div></div>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">ENV MOD</span>
            <div class="knob-wrap"><div class="knob" data-param="envmod" data-value="0.5"><div class="knob-indicator"></div></div></div>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">DECAY</span>
            <div class="knob-wrap"><div class="knob" data-param="decay" data-value="0.4"><div class="knob-indicator"></div></div></div>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">ACCENT</span>
            <div class="knob-wrap"><div class="knob" data-param="accent" data-value="0.5"><div class="knob-indicator"></div></div></div>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">VOLUME</span>
            <div class="knob-wrap"><div class="knob" data-param="volume" data-value="0.7"><div class="knob-indicator"></div></div></div>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">DIST</span>
            <div class="knob-wrap"><div class="knob" data-param="dist" data-value="0.0"><div class="knob-indicator"></div></div></div>
        </div>
    </div>
    <div class="wave-section">
        <div class="wave-btn active" data-wave="sawtooth">SAW</div>
        <div class="wave-btn" data-wave="square">SQUARE</div>
    </div>
    <div class="filter-display">
        <span class="filter-label">FILTER</span>
        <div class="filter-bar"><div class="filter-fill" id="filterBar"></div></div>
    </div>
    <div class="keyboard-area">
        <div class="keyboard" id="keyboard"></div>
    </div>
</div>

<script src="pedal-fx.js"></script>
<script>
(function() {
    var actx = null, masterGain = null, mixerGain = null, pedalFX = null, mixerSends = null;
    var params = { cutoff: 0.4, resonance: 0.5, envmod: 0.5, decay: 0.4, accent: 0.5, volume: 0.7, dist: 0.0 };
    var waveform = 'sawtooth';
    var monoVoice = null;
    var currentNote = -1;
    var muted = false;
    var filterBarEl = null;

    function ensureAudio() {
        if (actx) return;
        actx = new (window.AudioContext || window.webkitAudioContext)();
        if (window.loadAirwindowsWorklet) loadAirwindowsWorklet(actx);
        masterGain = actx.createGain();
        masterGain.gain.value = params.volume;
        mixerGain = actx.createGain();
        mixerGain.gain.value = 1.0;
        window._masterOut = actx.createGain();
        window._masterOut.connect(actx.destination);
        window._captureNode = actx.createMediaStreamDestination();
        window._masterOut.connect(window._captureNode);
        mixerSends = new MixerSends(actx, window._masterOut);
        pedalFX = new PedalFXChain(actx);
        masterGain.connect(pedalFX.getInput());
        pedalFX.getOutput().connect(mixerSends.getInput());
        mixerSends.getOutput().connect(mixerGain);
        mixerGain.connect(window._masterOut);
    }

    // 303 mono synth: single oscillator → diode ladder filter → VCA → distortion
    function createVoice() {
        if (!actx) ensureAudio();
        var v = {};

        // Oscillator
        v.osc = actx.createOscillator();
        v.osc.type = waveform;
        v.osc.frequency.value = 220;

        // Sub oscillator (one octave down, square, quieter)
        v.sub = actx.createOscillator();
        v.sub.type = 'square';
        v.sub.frequency.value = 110;
        v.subGain = actx.createGain();
        v.subGain.gain.value = 0.15;
        v.sub.connect(v.subGain);

        // Filter (resonant lowpass — the heart of the 303)
        v.filter = actx.createBiquadFilter();
        v.filter.type = 'lowpass';
        v.filter.frequency.value = getFilterFreq();
        v.filter.Q.value = getFilterQ();

        // VCA envelope
        v.vca = actx.createGain();
        v.vca.gain.value = 0;

        // Distortion waveshaper
        v.distortion = actx.createWaveShaper();
        v.distortion.oversample = '2x';
        updateDistortionCurve(v.distortion);

        // Connect: osc+sub → filter → vca → distortion → master
        v.osc.connect(v.filter);
        v.subGain.connect(v.filter);
        v.filter.connect(v.vca);
        v.vca.connect(v.distortion);
        v.distortion.connect(masterGain);

        v.osc.start();
        v.sub.start();
        return v;
    }

    function getFilterFreq() {
        return 100 + Math.pow(params.cutoff, 2) * 10000;
    }

    function getFilterQ() {
        return 0.5 + params.resonance * 25;
    }

    function updateDistortionCurve(shaper) {
        var amt = params.dist;
        if (amt < 0.01) { shaper.curve = null; return; }
        var n = 256;
        var curve = new Float32Array(n);
        for (var i = 0; i < n; i++) {
            var x = (i * 2) / n - 1;
            var k = amt * 50;
            curve[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
        }
        shaper.curve = curve;
    }

    function updateFilterBar() {
        if (!filterBarEl) filterBarEl = document.getElementById('filterBar');
        if (!monoVoice || !monoVoice.filter) { filterBarEl.style.width = (params.cutoff * 100) + '%'; return; }
        var freq = monoVoice.filter.frequency.value;
        var pct = Math.min(100, Math.max(0, (Math.log(freq / 100) / Math.log(100)) * 100));
        filterBarEl.style.width = pct + '%';
    }

    function noteOn(midi, vel) {
        if (!actx) ensureAudio();
        if (actx.state === 'suspended') actx.resume();

        var freq = 440 * Math.pow(2, (midi - 69) / 12);
        var now = actx.currentTime;
        var isAccent = vel > 100;
        var accentAmt = isAccent ? params.accent : 0;

        if (!monoVoice) monoVoice = createVoice();

        var isSlide = currentNote >= 0;
        var v = monoVoice;

        if (isSlide) {
            // Slide/glide: portamento
            v.osc.frequency.cancelScheduledValues(now);
            v.osc.frequency.setValueAtTime(v.osc.frequency.value, now);
            v.osc.frequency.linearRampToValueAtTime(freq, now + 0.06);
            v.sub.frequency.cancelScheduledValues(now);
            v.sub.frequency.setValueAtTime(v.sub.frequency.value, now);
            v.sub.frequency.linearRampToValueAtTime(freq / 2, now + 0.06);
        } else {
            v.osc.frequency.setValueAtTime(freq, now);
            v.sub.frequency.setValueAtTime(freq / 2, now);
        }

        // Filter envelope
        var baseFreq = getFilterFreq();
        var envAmt = params.envmod * (5000 + accentAmt * 5000);
        var peakFreq = Math.min(18000, baseFreq + envAmt);
        var decayTime = 0.05 + params.decay * 1.5;

        v.filter.Q.value = getFilterQ();
        v.filter.frequency.cancelScheduledValues(now);
        v.filter.frequency.setValueAtTime(peakFreq, now);
        v.filter.frequency.exponentialRampToValueAtTime(Math.max(20, baseFreq), now + decayTime);

        // VCA
        var ampBase = 0.4 + accentAmt * 0.3;
        if (!isSlide) {
            v.vca.gain.cancelScheduledValues(now);
            v.vca.gain.setValueAtTime(0, now);
            v.vca.gain.linearRampToValueAtTime(ampBase, now + 0.003);
        }

        if (currentNote >= 0) highlightKey(currentNote, false);
        currentNote = midi;
        highlightKey(midi, true);
        updateFilterBar();
    }

    function noteOff(midi) {
        if (midi !== currentNote) return;
        if (!monoVoice) return;
        var now = actx.currentTime;
        var v = monoVoice;
        v.vca.gain.cancelScheduledValues(now);
        v.vca.gain.setValueAtTime(v.vca.gain.value, now);
        v.vca.gain.linearRampToValueAtTime(0, now + 0.02);
        currentNote = -1;
        highlightKey(midi, false);
        updateFilterBar();
    }

    // 303 keyboard: 2 octaves, wider keys
    var FIRST_MIDI = 36, LAST_MIDI = 72;
    var BLACK_INDICES = [1, 3, 6, 8, 10];
    var keyElements = {};
    var mouseNoteDown = null;

    function isBlack(m) { return BLACK_INDICES.indexOf(m % 12) >= 0; }

    function buildKeyboard() {
        var kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        var whites = [];
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) { if (!isBlack(m)) whites.push(m); }
        var w = 28;
        kb.style.width = (whites.length * w) + 'px';
        whites.forEach(function(m, i) {
            var el = document.createElement('div');
            el.className = 'white-key';
            el.dataset.midi = m;
            el.style.left = (i * w) + 'px';
            el.style.width = w + 'px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', function(e) { e.preventDefault(); ensureAudio(); noteOn(m, 100); mouseNoteDown = m; });
            el.addEventListener('mouseenter', function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOn(m, 80); mouseNoteDown = m; } });
        });
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) {
            if (!isBlack(m)) continue;
            var prevIdx = whites.indexOf(m - 1);
            if (prevIdx < 0) continue;
            var el = document.createElement('div');
            el.className = 'black-key';
            el.dataset.midi = m;
            el.style.left = ((prevIdx + 1) * w - 9) + 'px';
            el.style.width = '18px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', (function(mm) { return function(e) { e.preventDefault(); ensureAudio(); noteOn(mm, 100); mouseNoteDown = mm; }; })(m));
            el.addEventListener('mouseenter', (function(mm) { return function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOn(mm, 80); mouseNoteDown = mm; } }; })(m));
        }
    }
    document.addEventListener('mouseup', function() { if (mouseNoteDown !== null) { noteOff(mouseNoteDown); mouseNoteDown = null; } });
    function highlightKey(midi, on) { var el = keyElements[midi]; if (el) { if (on) el.classList.add('active'); else el.classList.remove('active'); } }

    // Knobs
    document.querySelectorAll('.knob').forEach(function(knob) {
        var param = knob.dataset.param;
        var val = parseFloat(knob.dataset.value);
        var ind = knob.querySelector('.knob-indicator');
        function setRot(v) { ind.style.transform = 'translateX(-50%) rotate(' + (-135 + v * 270) + 'deg)'; }
        setRot(val);
        knob.addEventListener('mousedown', function(e) {
            e.preventDefault();
            var startY = e.clientY, startVal = parseFloat(knob.dataset.value);
            function onMove(e2) {
                var nv = Math.max(0, Math.min(1, startVal + (startY - e2.clientY) / 150));
                knob.dataset.value = nv;
                setRot(nv);
                params[param] = nv;
                if (param === 'volume' && masterGain) masterGain.gain.value = nv;
                if (param === 'cutoff' && monoVoice) { monoVoice.filter.frequency.value = getFilterFreq(); updateFilterBar(); }
                if (param === 'resonance' && monoVoice) monoVoice.filter.Q.value = getFilterQ();
                if (param === 'dist' && monoVoice) updateDistortionCurve(monoVoice.distortion);
            }
            function onUp() { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });
    });

    // Wave buttons
    document.querySelectorAll('.wave-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            waveform = btn.dataset.wave;
            document.querySelectorAll('.wave-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            if (monoVoice) monoVoice.osc.type = waveform;
        });
    });

    // Keyboard input
    window.__kbEnabled = false;
    var kbOctave = 3;
    var KEY_MAP = { 'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,'k':12,'o':13,'l':14 };
    var kbNotesDown = {};
    document.addEventListener('keydown', function(e) {
        if (!window.__kbEnabled) return;
        if (e.repeat) return;
        var k = e.key.toLowerCase();
        if (k === 'z') { kbOctave = Math.max(1, kbOctave - 1); return; }
        if (k === 'x') { kbOctave = Math.min(6, kbOctave + 1); return; }
        var semi = KEY_MAP[k]; if (semi === undefined) return;
        var m = (kbOctave + 1) * 12 + semi;
        if (m >= 0 && !kbNotesDown[k]) { ensureAudio(); kbNotesDown[k] = m; noteOn(m, 100); }
    }, true);
    document.addEventListener('keyup', function(e) {
        if (!window.__kbEnabled) return;
        var k = e.key.toLowerCase();
        if (kbNotesDown[k]) { noteOff(kbNotesDown[k]); delete kbNotesDown[k]; }
    }, true);

    // Message bridge
    window.addEventListener('message', function(e) {
        var d = e.data; if (!d) return;
        if (d.type === 'midi') { ensureAudio(); var data = d.data || d; var cmd = data[0] & 0xF0; if (cmd === 0x90 && data[2] > 0) noteOn(data[1], data[2]); else if (cmd === 0x80 || (cmd === 0x90 && data[2] === 0)) noteOff(data[1]); }
        if (d.type === 'keyboard-focus') window.__kbEnabled = d.enabled;
        if (d.type === 'mixer') {
            ensureAudio();
            if (d.param === 'volume' && mixerGain) mixerGain.gain.value = d.value;
            else if (d.param === 'mute') { muted = d.value > 0; if (mixerGain) mixerGain.gain.value = muted ? 0 : 1; }
            else if (mixerSends) mixerSends.setParam(d.param, d.value);
        }
        if (d.type === 'mixer-fx' && mixerSends) {
            ensureAudio();
            if (d.fx === 'reverb') mixerSends.updateReverb(d.param, d.value);
            if (d.fx === 'delay') mixerSends.updateDelay(d.param, d.value);
        }
        if (d.type === 'pedals' && pedalFX) pedalFX.update(d.pedals);
        if (d.type === 'get-session') {
            window.parent.postMessage({ type: 'session-data', source: 'tb303', data: { params: params, waveform: waveform, kbOctave: kbOctave } }, '*');
        }
        if (d.type === 'load-session' && d.data) {
            if (d.data.params) { for (var k in d.data.params) params[k] = d.data.params[k]; if (masterGain) masterGain.gain.value = params.volume; }
            if (d.data.waveform) { waveform = d.data.waveform; document.querySelectorAll('.wave-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.wave === waveform); }); if (monoVoice) monoVoice.osc.type = waveform; }
            if (d.data.kbOctave !== undefined) kbOctave = d.data.kbOctave;
        }
    });

    // Filter animation
    setInterval(updateFilterBar, 50);

    buildKeyboard();
    window.parent.postMessage({ type: 'instrument-ready', name: 'tb303' }, '*');
})();
</script>
</body>
</html>
