<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR-78 RHYTHM PROGRAMMER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #111;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            user-select: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scale-wrap {
            transform-origin: center center;
        }

        /* MACHINE BODY */
        .machine {
            width: 1000px;
            background: linear-gradient(180deg, #2a2a2a 0%, #1e1e1e 100%);
            border: 2px solid #333;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
        }

        /* ACCENT STRIPE */
        .stripe {
            height: 4px;
            background: linear-gradient(90deg, #cc3300 0%, #cc3300 60%, #ff6600 60%, #ff6600 100%);
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #2a2a2a;
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .brand-name {
            font-size: 14px;
            color: #fff;
            letter-spacing: 4px;
        }
        .brand-model {
            font-size: 20px;
            color: #cc3300;
            letter-spacing: 2px;
        }
        .brand-sub {
            font-size: 10px;
            color: #fff;
            letter-spacing: 2px;
        }

        /* CONTROLS ROW */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            border-bottom: 1px solid #1a1a1a;
            background: #1a1a1a;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ctrl-label {
            font-size: 10px;
            color: #fff;
            letter-spacing: 1px;
        }
        .ctrl-input {
            width: 50px;
            height: 22px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #ff6600;
            font-family: Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            outline: none;
            padding: 0;
        }
        .ctrl-input:focus { border-color: #ff6600; }
        .ctrl-btn {
            height: 24px;
            padding: 0 14px;
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active { background: #333; }
        .ctrl-btn.play-on {
            background: #1a3a1a;
            border-color: #228B22;
            color: #33ff33;
        }
        .ctrl-btn.rec-on {
            background: #3a1a1a;
            border-color: #cc3333;
            color: #ff3333;
        }
        .ctrl-sep { width: 1px; height: 20px; background: #333; }
        .groove-opt { padding: 5px 12px; font-size: 11px; font-weight: 700; font-family: Arial, sans-serif; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .groove-opt:hover { background: #1a1a1a; color: #ff6600; }
        .ctrl-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 3px;
            background: #0a0a0a;
            border: 1px solid #222;
            outline: none;
        }
        .ctrl-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 16px;
            background: #666;
            border: 1px solid #444;
        }

        /* BEAT INDICATOR */
        .beat-row {
            display: flex;
            padding: 6px 20px 2px 140px;
            gap: 0;
        }
        .beat-num {
            width: 46px;
            text-align: center;
            font-size: 10px;
            color: #fff;
            letter-spacing: 1px;
        }
        .beat-num.group-start { color: #fff; }
        .beat-group-gap { width: 8px; }

        /* STEP GRID */
        .grid {
            padding: 4px 20px 12px 20px;
        }
        .track {
            display: flex;
            align-items: center;
            height: 34px;
            border-bottom: 1px solid #1a1a1a;
        }
        .track:last-child { border-bottom: none; }
        .track-label {
            width: 120px;
            font-size: 11px;
            color: #fff;
            letter-spacing: 1px;
            padding-right: 10px;
            text-align: right;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }
        .track-vol {
            -webkit-appearance: none;
            appearance: none;
            width: 30px;
            height: 2px;
            background: #222;
            outline: none;
        }
        .track-vol::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 10px;
            background: #555;
            border: 1px solid #333;
        }
        .track-mute {
            width: 10px;
            height: 10px;
            background: #228B22;
            border: 1px solid #1a5a1a;
            flex-shrink: 0;
        }
        .track-mute.muted {
            background: #331111;
            border-color: #441111;
        }
        .steps {
            display: flex;
            gap: 0;
            flex: 1;
        }
        .step-group-gap { width: 8px; flex-shrink: 0; }

        /* TRACK OFFSET CONTROLS */
        .track-offset {
            display: flex;
            align-items: center;
            gap: 3px;
            padding-left: 6px;
            flex-shrink: 0;
        }
        .offset-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 36px;
            height: 2px;
            background: #222;
            outline: none;
        }
        .offset-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 10px;
            background: #555;
            border: 1px solid #333;
        }
        .offset-val {
            font-size: 9px;
            color: #fff;
            width: 24px;
            text-align: center;
            letter-spacing: 0;
        }
        .offset-mode {
            width: 18px;
            height: 12px;
            font-size: 8px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            letter-spacing: 0;
        }
        .offset-mode.mode-odd { color: #cc8800; border-color: #664400; }
        .offset-mode.mode-even { color: #3366cc; border-color: #224488; }
        .offset-mode.mode-all { color: #228B22; border-color: #1a5a1a; }
        .step {
            width: 46px;
            height: 28px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            position: relative;
            transition: background 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .step.on {
            background: #cc3300;
            border-color: #aa2200;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .step.on.accent {
            background: #ff6600;
            border-color: #cc5500;
        }
        .step.current {
            border-color: #888;
            box-shadow: 0 0 6px rgba(255,255,255,0.15);
        }
        .step.on.current {
            background: #ff4400;
            box-shadow: 0 0 8px rgba(255,68,0,0.4);
        }
        .step-dot {
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
        }
        .step.on .step-dot {
            background: #fff;
            box-shadow: 0 0 4px rgba(255,255,255,0.5);
        }

        /* PLAYHEAD ROW */
        .playhead-row {
            display: flex;
            padding: 0 20px 6px 140px;
            gap: 0;
        }
        .ph-cell {
            width: 46px;
            height: 4px;
            background: transparent;
        }
        .ph-cell.active {
            background: #33ff33;
            box-shadow: 0 0 4px #33ff33;
        }
        .ph-group-gap { width: 8px; }

        /* FOOTER */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 20px;
            border-top: 1px solid #2a2a2a;
        }
        .footer-text {
            font-size: 9px;
            color: #fff;
            letter-spacing: 1.5px;
        }

        /* Pattern selector */
        .pattern-btns {
            display: flex;
            gap: 3px;
        }
        .pat-btn {
            width: 22px;
            height: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            font-size: 10px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* KIT DROPDOWN */
        .kit-dropdown { position: relative; }
        .kit-selected {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #ff6600;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            letter-spacing: 1px;
            min-width: 60px;
            text-align: center;
        }
        .kit-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #444;
            border-top: none;
            z-index: 100;
        }
        .kit-menu.open { display: block; }
        .kit-option {
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 1px;
        }
        .kit-option:hover { background: #252525; color: #fff; }
        .kit-option.active-kit { color: #ff6600; }

        .pat-btn.active-pat {
            background: #cc3300;
            color: #fff;
            border-color: #aa2200;
        }
    </style>
<script src="studio-bus.js"></script>
</head>

<script src="pedal-fx.js"></script>
<script>
// ============================================
// POPOUT / IFRAME BRIDGE
// ============================================
const _isIframe = window !== window.parent;
const _isPopout = !!window.opener && !_isIframe;
function _msgToParent(msg) {
    if (_isIframe) {
        window.parent.postMessage(msg, '*');
    } else if (_isPopout && window._sendToParent) {
        window._sendToParent(msg);
    }
}

// ============================================
// KITS
// ============================================
const SAMPLE_BASE = 'samples/';
const KITS = {
    cr78: {
        name: 'ROLAND', model: 'CR-78', sub: 'COMPURHYTHM PROGRAMMER',
        path: 'CR-78/',
        tracks: [
            {name:'KICK', file:'kick.wav'}, {name:'KICK ACC', file:'kick-accent.wav'},
            {name:'SNARE', file:'snare.wav'}, {name:'SNARE ACC', file:'snare-accent.wav'},
            {name:'RIM', file:'rim.wav'}, {name:'HI-HAT', file:'hihat.wav'},
            {name:'HAT ACC', file:'hihat-accent.wav'}, {name:'HAT METAL', file:'hihat-metal.wav'},
            {name:'CYMBAL', file:'cymbal.wav'}, {name:'COWBELL', file:'cowbell.wav'},
            {name:'CONGA', file:'conga-l.wav'}, {name:'BONGO H', file:'bongo-h.wav'},
            {name:'BONGO L', file:'bongo-l.wav'}, {name:'TAMB', file:'tamb-short.wav'},
            {name:'GUIRO', file:'guiro-short.wav'},
        ]
    },
    lm2: {
        name: 'LINN', model: 'LM-2', sub: 'LINN DRUM',
        path: 'LM-2/',
        tracks: [
            {name:'KICK', file:'kick.wav'}, {name:'KICK ALT', file:'kick-alt.wav'},
            {name:'SNARE H', file:'snare-h.wav'}, {name:'SNARE M', file:'snare-m.wav'},
            {name:'SNARE L', file:'snare-l.wav'}, {name:'CLAP', file:'clap.wav'},
            {name:'HAT CLOSED', file:'hihat-closed.wav'}, {name:'HAT OPEN', file:'hihat-open.wav'},
            {name:'CRASH', file:'crash.wav'}, {name:'RIDE', file:'ride.wav'},
            {name:'TOM HH', file:'tom-hh.wav'}, {name:'TOM H', file:'tom-h.wav'},
            {name:'TOM M', file:'tom-m.wav'}, {name:'TOM L', file:'tom-l.wav'},
            {name:'COWBELL', file:'cowb.wav'},
        ]
    },
    mrk2: {
        name: 'MAESTRO', model: 'MRK-2', sub: 'RHYTHM KING',
        path: 'MRK-2/',
        tracks: [
            {name:'KICK', file:'kick.wav'}, {name:'SNARE', file:'snare.wav'},
            {name:'HAT CLOSED', file:'hihat-closed.wav'}, {name:'HAT OPEN', file:'hihat-open.wav'},
            {name:'CYMBAL L', file:'cymball-long.wav'}, {name:'CYMBAL S', file:'cymball-short.wav'},
            {name:'TOM', file:'tom.wav'}, {name:'BONGO', file:'bongo.wav'},
            {name:'CLAVE', file:'clave.wav'}, {name:'BLOCK', file:'block.wav'},
        ]
    },
    tr505: {
        name: 'ROLAND', model: 'TR-505', sub: 'RHYTHM COMPOSER',
        path: 'TR-505/',
        tracks: [
            {name:'KICK', file:'tr505-kick.wav'}, {name:'SNARE', file:'tr505-snare.wav'},
            {name:'CLAP', file:'tr505-clap.wav'}, {name:'RIM', file:'tr505-rim.wav'},
            {name:'HAT CLOSED', file:'tr505-hihat-closed.wav'}, {name:'HAT OPEN', file:'tr505-hihat-open.wav'},
            {name:'CRASH', file:'tr505-crash.wav'}, {name:'RIDE', file:'tr505-ride.wav'},
            {name:'COWBELL H', file:'tr505-cowb-h.wav'}, {name:'COWBELL L', file:'tr505-cowb-l.wav'},
            {name:'CONGA H', file:'tr505-conga-h.wav'}, {name:'CONGA L', file:'tr505-conga-l.wav'},
            {name:'TOM H', file:'tr505-tom-h.wav'}, {name:'TOM M', file:'tr505-tom-m.wav'},
            {name:'TOM L', file:'tr505-tom-l.wav'},
        ]
    },
    tr909: {
        name: 'ROLAND', model: 'TR-909', sub: 'RHYTHM COMPOSER (DETROIT)',
        path: 'TR-909/',
        tracks: [
            {name:'KICK', file:'kick.wav'}, {name:'KICK SHORT', file:'kick-short.wav'},
            {name:'SNARE', file:'snare.wav'}, {name:'CLAP 1', file:'clap-1.wav'},
            {name:'CLAP 2', file:'clap-2.wav'}, {name:'RIM', file:'rim.wav'},
            {name:'HAT CLOSED', file:'hihat-closed.wav'}, {name:'HAT OPEN', file:'hihat-open-1.wav'},
            {name:'CYMBAL', file:'cymbal.wav'}, {name:'RIDE', file:'ride.wav'},
            {name:'TOM H', file:'tom-h.wav'}, {name:'TOM L', file:'tom-l.wav'},
        ]
    }
};

let currentKit = 'cr78';
let TRACKS = KITS[currentKit].tracks;
const STEPS = 16;
const NUM_PATTERNS = 4;

// ============================================
// STATE
// ============================================
let bpm = 120;
let swing = 0;
let playing = false;
let currentStep = -1;
let nextStepTime = 0;
let timerID = null;
let currentPattern = 0;

// Per-kit pattern storage
const allPatterns = {}; // kitId -> patterns
function initPatternsForKit(kitId) {
    if (allPatterns[kitId]) return;
    const kit = KITS[kitId];
    const pats = [];
    for (let p = 0; p < NUM_PATTERNS; p++) {
        const pat = [];
        for (let t = 0; t < kit.tracks.length; t++) pat.push(new Uint8Array(STEPS));
        pats.push(pat);
    }
    allPatterns[kitId] = pats;
}
initPatternsForKit(currentKit);
function patterns() { return allPatterns[currentKit]; }

let patternClipboard = null;
let lastKitReport = '';

function notifyActiveKits() {
    if (window === window.parent) return;
    const active = [];
    for (const kitId of Object.keys(KITS)) {
        if (!allPatterns[kitId]) continue;
        const pats = allPatterns[kitId];
        let hasData = false;
        for (let p = 0; p < pats.length && !hasData; p++) {
            for (let t = 0; t < pats[p].length && !hasData; t++) {
                for (let s = 0; s < STEPS; s++) {
                    if (pats[p][t][s] > 0) { hasData = true; break; }
                }
            }
        }
        if (hasData) active.push(kitId);
    }
    const report = JSON.stringify(active);
    if (report === lastKitReport) return;
    lastKitReport = report;
    _msgToParent({type: 'active-808-kits', kits: active});
}

function syncPatternsToPianoRoll() {
    if (!_isIframe && !_isPopout) return;
    // Send all pattern data for all kits to parent -> piano roll
    const data = {};
    for (const kitId of Object.keys(KITS)) {
        if (!allPatterns[kitId]) continue;
        const kitData = [];
        const pats = allPatterns[kitId];
        for (let p = 0; p < pats.length; p++) {
            const patData = [];
            for (let t = 0; t < pats[p].length; t++) {
                patData.push(Array.from(pats[p][t]));
            }
            kitData.push(patData);
        }
        data[kitId] = kitData;
    }
    const swing = parseInt(document.getElementById('swingSlider').value) || 0;
    _msgToParent({
        type: '808-pattern-sync',
        allPatterns: data,
        currentPattern: currentPattern,
        currentKit: currentKit,
        bpm: bpm,
        swing: swing,
        trackOffsets: Array.from(trackOffsets),
        trackOffsetModes: Array.from(trackOffsetModes)
    });
}

let trackVolumes = TRACKS.map(() => 0.8);
let trackMutes = TRACKS.map(() => false);
let trackOffsets = TRACKS.map(() => 0); // ms, range -50 to +50
let trackOffsetModes = TRACKS.map(() => 'all'); // 'all', 'odd', 'even'

const actx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = actx.createGain();
masterGain.gain.value = 0.8;
window._masterOut = actx.createGain();
window._masterOut.connect(actx.destination);
window._captureNode = actx.createMediaStreamDestination();
window._masterOut.connect(window._captureNode);
const mixerGain = actx.createGain();
mixerGain.connect(window._masterOut);
const drumMixerSends = new MixerSends(actx, window._masterOut);
const drumPedalFX = new PedalFXChain(actx);
drumPedalFX.getOutput().connect(drumMixerSends.getInput());
drumMixerSends.getOutput().connect(mixerGain);
masterGain.connect(drumPedalFX.getInput());

const buffers = {};
let trackGains = [];

async function loadSamples() {
    const kit = KITS[currentKit];
    const url = SAMPLE_BASE + kit.path;
    document.getElementById('stepDisplay').textContent = 'LOADING...';
    const promises = TRACKS.map(async (track) => {
        const key = currentKit + '/' + track.file;
        if (buffers[key]) return;
        try {
            const resp = await fetch(url + track.file);
            const ab = await resp.arrayBuffer();
            buffers[key] = await actx.decodeAudioData(ab);
        } catch(e) { console.error('Failed to load', track.file, e); }
    });
    await Promise.all(promises);
    document.getElementById('stepDisplay').textContent = 'READY';
}

async function switchKit(kitId) {
    if (playing) stopSequencer();
    currentKit = kitId;
    TRACKS = KITS[kitId].tracks;
    initPatternsForKit(kitId);
    trackVolumes = TRACKS.map(() => 0.8);
    trackMutes = TRACKS.map(() => false);
    trackOffsets = TRACKS.map(() => 0);
    trackOffsetModes = TRACKS.map(() => 'all');
    // Rebuild gain nodes
    trackGains.forEach(g => g.disconnect());
    trackGains = [];
    for (let t = 0; t < TRACKS.length; t++) {
        const g = actx.createGain(); g.gain.value = 0.8;
        g.connect(masterGain); trackGains.push(g);
    }
    // Update branding
    document.getElementById('brandName').textContent = KITS[kitId].name;
    document.getElementById('brandModel').textContent = KITS[kitId].model;
    document.getElementById('brandSub').textContent = KITS[kitId].sub;
    document.getElementById('footerSrc').textContent = 'SAMPLES: ORAMICS / ' + KITS[kitId].model + ' PUBLIC DOMAIN';
    buildGrid();
    await loadSamples();
    scaleToFit();
    notifyActiveKits();
    syncPatternsToPianoRoll();
}

function playSample(trackIdx, time, accent) {
    const track = TRACKS[trackIdx];
    const buf = buffers[currentKit + '/' + track.file];
    if (!buf || trackMutes[trackIdx]) return;

    const source = actx.createBufferSource();
    source.buffer = buf;
    source.connect(trackGains[trackIdx]);
    const vol = accent ? 1.0 : trackVolumes[trackIdx];
    trackGains[trackIdx].gain.setValueAtTime(vol, time);
    source.start(time);
}

function buildGrid() {
    const grid = document.getElementById('grid');
    const beatRow = document.getElementById('beatRow');
    const phRow = document.getElementById('playheadRow');
    grid.innerHTML = '';
    beatRow.innerHTML = '';
    phRow.innerHTML = '';

    // Beat numbers
    for (let s = 0; s < STEPS; s++) {
        if (s > 0 && s % 4 === 0) {
            const gap = document.createElement('div');
            gap.className = 'beat-group-gap';
            beatRow.appendChild(gap);
            const phGap = document.createElement('div');
            phGap.className = 'ph-group-gap';
            phRow.appendChild(phGap);
        }
        const num = document.createElement('div');
        num.className = 'beat-num' + (s % 4 === 0 ? ' group-start' : '');
        num.textContent = s + 1;
        beatRow.appendChild(num);

        const ph = document.createElement('div');
        ph.className = 'ph-cell';
        ph.dataset.step = s;
        phRow.appendChild(ph);
    }

    // Tracks
    for (let t = 0; t < TRACKS.length; t++) {
        const row = document.createElement('div');
        row.className = 'track';

        // Label + volume + mute
        const label = document.createElement('div');
        label.className = 'track-label';

        const mute = document.createElement('div');
        mute.className = 'track-mute' + (trackMutes[t] ? ' muted' : '');
        mute.addEventListener('click', () => {
            trackMutes[t] = !trackMutes[t];
            mute.classList.toggle('muted', trackMutes[t]);
        });

        const vol = document.createElement('input');
        vol.type = 'range';
        vol.className = 'track-vol';
        vol.min = 0; vol.max = 100; vol.value = trackVolumes[t] * 100;
        vol.addEventListener('input', () => { trackVolumes[t] = vol.value / 100; });

        const nameSpan = document.createElement('span');
        nameSpan.textContent = TRACKS[t].name;

        label.appendChild(mute);
        label.appendChild(vol);
        label.appendChild(nameSpan);
        row.appendChild(label);

        // Steps
        const steps = document.createElement('div');
        steps.className = 'steps';

        for (let s = 0; s < STEPS; s++) {
            if (s > 0 && s % 4 === 0) {
                const gap = document.createElement('div');
                gap.className = 'step-group-gap';
                steps.appendChild(gap);
            }

            const step = document.createElement('div');
            step.className = 'step';
            step.dataset.track = t;
            step.dataset.step = s;

            const dot = document.createElement('div');
            dot.className = 'step-dot';
            step.appendChild(dot);

            step.addEventListener('click', (e) => {
                const pat = patterns()[currentPattern][t];
                if (pat[s] === 0) {
                    pat[s] = 1;
                    step.classList.add('on');
                    step.classList.remove('accent');
                    // Preview the sound
                    if (actx.state === 'suspended') actx.resume();
                    playSample(t, actx.currentTime, false);
                } else if (pat[s] === 1 && e.shiftKey) {
                    pat[s] = 2;
                    step.classList.add('on', 'accent');
                } else {
                    pat[s] = 0;
                    step.classList.remove('on', 'accent');
                }
                notifyActiveKits();
                syncPatternsToPianoRoll();
            });

            steps.appendChild(step);
        }
        row.appendChild(steps);

        // Offset controls
        const offsetDiv = document.createElement('div');
        offsetDiv.className = 'track-offset';

        const offsetSlider = document.createElement('input');
        offsetSlider.type = 'range';
        offsetSlider.className = 'offset-slider';
        offsetSlider.min = -50; offsetSlider.max = 50; offsetSlider.value = trackOffsets[t];

        const offsetVal = document.createElement('span');
        offsetVal.className = 'offset-val';
        offsetVal.textContent = trackOffsets[t] + 'MS';

        offsetSlider.addEventListener('input', () => {
            trackOffsets[t] = parseInt(offsetSlider.value);
            offsetVal.textContent = trackOffsets[t] + 'MS';
        });
        offsetSlider.addEventListener('dblclick', () => {
            trackOffsets[t] = 0;
            offsetSlider.value = 0;
            offsetVal.textContent = '0MS';
        });

        const modeBtn = document.createElement('div');
        modeBtn.className = 'offset-mode mode-all';
        modeBtn.textContent = 'ALL';
        const modes = ['all', 'odd', 'even'];
        const modeLabels = ['ALL', 'ODD', 'EVN'];
        modeBtn.addEventListener('click', () => {
            const idx = modes.indexOf(trackOffsetModes[t]);
            const next = (idx + 1) % 3;
            trackOffsetModes[t] = modes[next];
            modeBtn.textContent = modeLabels[next];
            modeBtn.className = 'offset-mode mode-' + modes[next];
        });

        offsetDiv.appendChild(offsetSlider);
        offsetDiv.appendChild(offsetVal);
        offsetDiv.appendChild(modeBtn);
        row.appendChild(offsetDiv);

        grid.appendChild(row);
    }
}

function refreshGrid() {
    const pat = patterns()[currentPattern];
    document.querySelectorAll('.step').forEach(el => {
        const t = parseInt(el.dataset.track);
        const s = parseInt(el.dataset.step);
        const val = pat[t][s];
        el.classList.toggle('on', val > 0);
        el.classList.toggle('accent', val === 2);
    });
}

// ============================================
// SEQUENCER
// ============================================
function getSwingDelay(step) {
    // Swing affects even-numbered 16th notes (1-indexed: 2,4,6,8...)
    if (step % 2 === 1) {
        return (swing / 100) * (60 / bpm / 4);
    }
    return 0;
}

function nextStep() {
    const secondsPer16th = 60 / bpm / 4;

    while (nextStepTime < actx.currentTime + 0.1) {
        currentStep = (currentStep + 1) % STEPS;
        const swingDelay = getSwingDelay(currentStep);
        const time = nextStepTime + swingDelay;

        // Play all active tracks for this step
        const pat = patterns()[currentPattern];
        // Beat number (1-indexed, each beat = 4 steps)
        const beatNum = Math.floor(currentStep / 4) + 1;
        for (let t = 0; t < TRACKS.length; t++) {
            if (pat[t][currentStep] > 0) {
                let trackTime = time;
                // Apply per-track offset
                const mode = trackOffsetModes[t];
                const offset = trackOffsets[t];
                if (offset !== 0) {
                    const apply = mode === 'all' ||
                        (mode === 'odd' && beatNum % 2 === 1) ||
                        (mode === 'even' && beatNum % 2 === 0);
                    if (apply) trackTime += offset / 1000;
                }
                playSample(t, trackTime, pat[t][currentStep] === 2);
            }
        }

        // Schedule visual update
        const step = currentStep;
        setTimeout(() => updatePlayhead(step), (time - actx.currentTime) * 1000);

        nextStepTime += secondsPer16th;
    }

    timerID = setTimeout(nextStep, 25);
}

function updatePlayhead(step) {
    document.querySelectorAll('.ph-cell').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.step) === step);
    });
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('current'));
    document.getElementById('stepDisplay').textContent = 'STEP ' + (step + 1);
}

function startSequencer() {
    if (playing) return;
    if (actx.state === 'suspended') actx.resume();
    playing = true;
    currentStep = -1;
    nextStepTime = actx.currentTime;
    document.getElementById('btnPlay').classList.add('play-on');
    nextStep();
}

function stopSequencer() {
    playing = false;
    if (timerID) clearTimeout(timerID);
    timerID = null;
    document.getElementById('btnPlay').classList.remove('play-on');
    document.querySelectorAll('.ph-cell').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.getElementById('stepDisplay').textContent = 'STEP --';
}

document.getElementById('btnRandom').addEventListener('click', () => {
    const pat = patterns()[currentPattern];
    // Find kick/snare/hat indices by name
    let kickIdx = -1, snareIdx = -1, hatIdx = -1;
    for (let t = 0; t < TRACKS.length; t++) {
        const n = TRACKS[t].name.toLowerCase();
        if (kickIdx < 0 && n.includes('kick')) kickIdx = t;
        if (snareIdx < 0 && (n.includes('snare') || n.includes('clap'))) snareIdx = t;
        if (hatIdx < 0 && n.includes('hat')) hatIdx = t;
    }
    pat.forEach(t => t.fill(0));
    // Kick: beats 1 and 3
    if (kickIdx >= 0) {
        pat[kickIdx][0] = 1; pat[kickIdx][8] = 1;
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.15) pat[kickIdx][s] = 1; }
    }
    // Snare: beats 2 and 4
    if (snareIdx >= 0) {
        pat[snareIdx][4] = 1; pat[snareIdx][12] = 1;
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.1) pat[snareIdx][s] = 1; }
    }
    // Hat: frequent
    if (hatIdx >= 0) {
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.6) pat[hatIdx][s] = 1; }
    }
    // Others: sparse
    for (let t = 0; t < TRACKS.length; t++) {
        if (t === kickIdx || t === snareIdx || t === hatIdx) continue;
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.08) pat[t][s] = 1; }
    }
    refreshGrid();
    notifyActiveKits();
    syncPatternsToPianoRoll();
});

// Groove templates modify timing offsets and velocity patterns
const GROOVE_TEMPLATES = {
    // Humanize: random micro-timing offsets per track
    humanize: function(pat, amount) {
        const strength = amount / 100;
        for (let t = 0; t < pat.length; t++) {
            trackOffsets[t] = (Math.random() * 2 - 1) * 30 * strength;
        }
    },
    // Lazy: push everything slightly late, hats lazier than kick
    lazy: function(pat, amount) {
        const ms = 15 * (amount / 100);
        for (let t = 0; t < TRACKS.length; t++) {
            const n = TRACKS[t].name.toLowerCase();
            if (n.includes('kick')) { trackOffsets[t] = ms * 0.3; }
            else if (n.includes('snare') || n.includes('clap')) { trackOffsets[t] = ms * 0.6; }
            else if (n.includes('hat')) { trackOffsets[t] = ms * 1.0; trackOffsetModes[t] = 'odd'; }
            else { trackOffsets[t] = ms * 0.5; }
        }
    },
    // Push: everything slightly early, creates urgency
    push: function(pat, amount) {
        const ms = -12 * (amount / 100);
        for (let t = 0; t < TRACKS.length; t++) {
            const n = TRACKS[t].name.toLowerCase();
            if (n.includes('hat')) { trackOffsets[t] = ms * 1.2; }
            else if (n.includes('snare') || n.includes('clap')) { trackOffsets[t] = ms * 0.5; }
            else { trackOffsets[t] = ms * 0.8; }
        }
    },
    // Shuffle: set swing and add hat offsets
    shuffle: function(pat, amount) {
        swing = Math.round(40 * (amount / 100));
        document.getElementById('swingSlider').value = swing;
        document.getElementById('swingVal').textContent = swing + '%';
        for (let t = 0; t < TRACKS.length; t++) {
            const n = TRACKS[t].name.toLowerCase();
            if (n.includes('hat')) {
                trackOffsets[t] = 5 * (amount / 100);
                trackOffsetModes[t] = 'even';
            }
        }
    },
    // Drunken: large random offsets, everything loose
    drunken: function(pat, amount) {
        const strength = amount / 100;
        for (let t = 0; t < pat.length; t++) {
            trackOffsets[t] = (Math.random() * 2 - 1) * 45 * strength;
            trackOffsetModes[t] = Math.random() > 0.5 ? 'odd' : 'all';
        }
        swing = Math.round(20 * strength + Math.random() * 15 * strength);
        document.getElementById('swingSlider').value = swing;
        document.getElementById('swingVal').textContent = swing + '%';
    },
    // Accent 2+4: make snare hits on 2 and 4 accented
    accent24: function(pat, amount) {
        for (let t = 0; t < pat.length; t++) {
            const n = TRACKS[t].name.toLowerCase();
            if (n.includes('snare') || n.includes('clap')) {
                if (pat[t][4] > 0) pat[t][4] = 2;  // beat 2
                if (pat[t][12] > 0) pat[t][12] = 2; // beat 4
            }
            // Soften other hits
            if (n.includes('hat')) {
                for (let s = 0; s < STEPS; s++) {
                    if (s % 4 !== 0 && pat[t][s] > 0 && Math.random() < amount / 100) {
                        trackOffsets[t] = (Math.random() - 0.5) * 10;
                    }
                }
            }
        }
    },
    // Ghost notes: add low-velocity ghost hits between existing hits
    ghost: function(pat, amount) {
        const prob = 0.3 * (amount / 100);
        for (let t = 0; t < pat.length; t++) {
            const n = TRACKS[t].name.toLowerCase();
            if (!n.includes('snare') && !n.includes('hat') && !n.includes('rim')) continue;
            for (let s = 0; s < STEPS; s++) {
                if (pat[t][s] === 0) {
                    // Check if adjacent steps have hits
                    const prev = pat[t][(s - 1 + STEPS) % STEPS];
                    const next = pat[t][(s + 1) % STEPS];
                    if ((prev > 0 || next > 0) && Math.random() < prob) {
                        pat[t][s] = 1; // ghost hit (normal velocity, will sound softer via track volume)
                    }
                }
            }
        }
    },
    // Strip back: randomly remove hits for a sparser feel
    strip: function(pat, amount) {
        const removeProb = 0.4 * (amount / 100);
        for (let t = 0; t < pat.length; t++) {
            const n = TRACKS[t].name.toLowerCase();
            // Never strip kick on 1/3 or snare on 2/4
            for (let s = 0; s < STEPS; s++) {
                if (pat[t][s] === 0) continue;
                if (n.includes('kick') && (s === 0 || s === 8)) continue;
                if ((n.includes('snare') || n.includes('clap')) && (s === 4 || s === 12)) continue;
                if (Math.random() < removeProb) pat[t][s] = 0;
            }
        }
    }
};

// ==================== IFRAME MIDI/KB BRIDGE ====================
if (window !== window.parent) {
    window.addEventListener('message', (e) => {
        const d = e.data;
        if (d && d.type === 'midi') {
            const [status, note, vel] = d.data;
            const cmd = status & 0xf0;
            if (cmd === 0x90 && vel > 0) {
                if (actx.state === 'suspended') actx.resume();
                if (d.kit && KITS[d.kit]) {
                    // Multi-kit: play sample from specified kit
                    const kit = KITS[d.kit];
                    const trackIdx = note - 36;
                    if (trackIdx >= 0 && trackIdx < kit.tracks.length) {
                        const track = kit.tracks[trackIdx];
                        const bufKey = d.kit + '/' + track.file;
                        if (buffers[bufKey]) {
                            const src = actx.createBufferSource();
                            src.buffer = buffers[bufKey];
                            src.connect(actx.destination);
                            src.start(actx.currentTime);
                        } else {
                            // Load on demand
                            const url = SAMPLE_BASE + kit.path + track.file;
                            fetch(url).then(r => r.arrayBuffer()).then(ab => actx.decodeAudioData(ab)).then(buf => {
                                buffers[bufKey] = buf;
                                const src = actx.createBufferSource();
                                src.buffer = buf;
                                src.connect(actx.destination);
                                src.start(actx.currentTime);
                            }).catch(() => {});
                        }
                    }
                } else {
                    // Default: play from current kit
                    const trackIdx = note - 36;
                    if (trackIdx >= 0 && trackIdx < TRACKS.length) {
                        playSample(trackIdx, actx.currentTime, false);
                    }
                }
            }
            if (status === 0xfa) startSequencer();
            if (status === 0xfc) stopSequencer();
        }
        if (d && d.type === 'keyboard-focus') {
            window.__kbEnabled = d.enabled;
        }
        if (d && d.type === 'mixer') {
            if (actx.state === 'suspended') actx.resume();
            if (d.param === 'volume') mixerGain.gain.value = d.value;
            else if (d.param === 'mute') mixerGain.gain.value = d.value ? 0 : 1;
            else if (drumMixerSends) drumMixerSends.setParam(d.param, d.value);
        }
        if (d && d.type === 'mixer-fx' && drumMixerSends) {
            if (actx.state === 'suspended') actx.resume();
            if (d.fx === 'reverb') drumMixerSends.updateReverb(d.param, d.value);
            if (d.fx === 'delay') drumMixerSends.updateDelay(d.param, d.value);
        }
        if (d && d.type === 'pedals' && drumPedalFX) {
            drumPedalFX.update(d.pedals);
        }
        if (d && d.type === 'get-session') {
            const data = {};
            for (const kitId of Object.keys(allPatterns)) {
                data[kitId] = allPatterns[kitId].map(pat =>
                    pat.map(track => Array.from(track))
                );
            }
            _msgToParent({
                type: 'session-data', source: 'cr78',
                data: { patterns: data, currentKit, currentPattern, bpm }
            });
        }
        if (d && d.type === 'load-session' && d.data) {
            const sd = d.data;
            if (sd.patterns) {
                for (const kitId of Object.keys(sd.patterns)) {
                    initPatternsForKit(kitId);
                    const pats = sd.patterns[kitId];
                    for (let p = 0; p < pats.length; p++) {
                        for (let t = 0; t < pats[p].length; t++) {
                            allPatterns[kitId][p][t] = new Uint8Array(pats[p][t]);
                        }
                    }
                }
            }
            if (sd.bpm) { bpm = sd.bpm; document.getElementById('tempoInput').value = bpm; }
            if (sd.currentKit) switchKit(sd.currentKit);
            if (sd.currentPattern !== undefined) {
                currentPattern = sd.currentPattern;
                document.querySelectorAll('.pat-btn').forEach(b => b.classList.remove('active-pat'));
                const btn = document.querySelector(`.pat-btn[data-pat="${currentPattern}"]`);
                if (btn) btn.classList.add('active-pat');
            }
            refreshGrid();
            notifyActiveKits();
            syncPatternsToPianoRoll();
        }
    });
    window.__kbEnabled = _isPopout;
    if (_isIframe) {
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (!window.__kbEnabled) { e.stopImmediatePropagation(); e.preventDefault(); }
        }, true);
        document.addEventListener('keyup', (e) => {
            if (!window.__kbEnabled) { e.stopImmediatePropagation(); e.preventDefault(); }
        }, true);
        window.parent.postMessage({type: 'instrument-ready', name: 'cr78'}, '*');
    } else if (_isPopout) {
        window.dispatchEvent(new MessageEvent('message', {data: {type: 'instrument-ready', name: 'cr78'}}));
    }
}
</script>

</body>
</html>
