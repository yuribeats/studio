<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0a0a0a;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #ccc;
            user-select: none;
        }

        .studio {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ROUTING BAR */
        .routing-bar {
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
        }
        .routing-title {
            font-size: 12px;
            letter-spacing: 3px;
            color: #666;
        }
        .midi-devices {
            display: flex;
            gap: 8px;
            flex: 1;
            overflow-x: auto;
            align-items: center;
        }
        .midi-device {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .midi-device-name {
            font-size: 8px;
            letter-spacing: 1px;
            color: #888;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .midi-device-led {
            width: 5px;
            height: 5px;
            background: #333;
            flex-shrink: 0;
        }
        .midi-device-led.active {
            background: #33ff33;
            box-shadow: 0 0 4px #33ff33;
        }

        /* MIDI ROUTE DROPDOWN */
        .route-dropdown { position: relative; }
        .route-selected {
            background: #111;
            border: 1px solid #444;
            color: #aaa;
            font-family: Arial, sans-serif;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 6px;
            letter-spacing: 0.5px;
            min-width: 50px;
            text-align: center;
        }
        .route-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #111;
            border: 1px solid #444;
            border-top: none;
            z-index: 100;
        }
        .route-menu.open { display: block; }
        .route-opt {
            padding: 3px 6px;
            font-size: 8px;
            font-weight: 700;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
        }
        .route-opt:hover { background: #1a1a1a; color: #ccc; }
        .route-opt.active-route { color: #228B22; }

        /* KEYBOARD ROUTING */
        .kb-route {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .kb-label {
            font-size: 8px;
            color: #666;
            letter-spacing: 1px;
        }
        .kb-btn {
            padding: 5px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 8px;
            color: #666;
            letter-spacing: 1px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }
        .kb-btn.active {
            border-color: #228B22;
            color: #228B22;
            background: #0a1a0a;
        }
        .no-midi {
            font-size: 8px;
            color: #444;
            letter-spacing: 1px;
        }

        /* TOOLBAR BUTTONS */
        .bar-btn {
            padding: 5px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 8px;
            color: #888;
            letter-spacing: 1px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .bar-btn:hover { color: #ccc; border-color: #555; }
        .bar-btn.hidden-btn { display: none; }

        .bar-sep { width: 1px; height: 20px; background: #333; flex-shrink: 0; }

        /* INSTRUMENT FRAMES */
        .instruments {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .inst-wrapper {
            flex: 1;
            position: relative;
            border-bottom: 1px solid #222;
            min-height: 0;
            transition: flex 0.25s ease;
        }
        .inst-wrapper:last-child {
            border-bottom: none;
        }
        .inst-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .inst-focus-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
            z-index: 5;
            pointer-events: none;
            transition: background 0.15s;
        }
        .inst-wrapper.focused .inst-focus-indicator {
            background: #228B22;
            box-shadow: 0 0 8px rgba(34,139,34,0.4);
        }
        .inst-label {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 7px;
            letter-spacing: 2px;
            color: #333;
            z-index: 5;
            pointer-events: none;
        }
        .inst-wrapper.focused .inst-label {
            color: #228B22;
        }

        /* FULLSCREEN MODE */
        .inst-wrapper.fullscreen {
            flex: 1;
        }
        .inst-wrapper.hidden-inst {
            flex: 0;
            min-height: 0;
            overflow: hidden;
            border: none;
        }

        /* POPOUT BUTTONS ROW */
        .popout-row {
            display: flex;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="studio">
    <!-- ROUTING BAR -->
    <div class="routing-bar">
        <div class="bar-btn hidden-btn" id="backBtn">SPLIT VIEW</div>
        <div class="bar-sep"></div>
        <div class="popout-row">
            <div class="bar-btn" data-popout="kr106">KR-106 WINDOW</div>
            <div class="bar-btn" data-popout="mpc">MPC WINDOW</div>
            <div class="bar-btn" data-popout="cr78">808 WINDOW</div>
        </div>
        <div class="bar-sep"></div>
        <span class="routing-title">MIDI</span>
        <div class="midi-devices" id="midiDevices">
            <span class="no-midi" id="noMidi">NO MIDI DEVICES DETECTED</span>
        </div>
        <div class="kb-route">
            <span class="kb-label">KEYBOARD</span>
            <div class="kb-btn active" data-target="kr106">KR-106</div>
            <div class="kb-btn" data-target="mpc">MPC</div>
            <div class="kb-btn" data-target="cr78">808</div>
        </div>
    </div>

    <!-- INSTRUMENTS -->
    <div class="instruments" id="instruments">
        <div class="inst-wrapper focused" data-inst="kr106">
            <div class="inst-focus-indicator"></div>
            <div class="inst-label">ULTRAMASTER KR-106</div>
            <iframe id="frameKr106" src="kr106.html"></iframe>
        </div>
        <div class="inst-wrapper" data-inst="mpc">
            <div class="inst-focus-indicator"></div>
            <div class="inst-label">AKAI MPC 4000</div>
            <iframe id="frameMpc" src="mpc.html"></iframe>
        </div>
        <div class="inst-wrapper" data-inst="cr78">
            <div class="inst-focus-indicator"></div>
            <div class="inst-label">STEP SEQUENCER</div>
            <iframe id="frameCr78" src="808.html"></iframe>
        </div>
    </div>
</div>

<script>
// ============================================
// INSTRUMENT REGISTRY
// ============================================
const INSTRUMENTS = {
    kr106: { frame: 'frameKr106', label: 'KR-106', file: 'kr106.html', windowName: 'kr106win' },
    mpc:   { frame: 'frameMpc',   label: 'MPC 4000', file: 'mpc.html',   windowName: 'mpc4000' },
    cr78:  { frame: 'frameCr78',  label: '808',     file: '808.html',   windowName: 'cr78win' },
};
const instIds = Object.keys(INSTRUMENTS);

// ============================================
// STATE
// ============================================
let midiAccess = null;
const midiRouting = {}; // deviceId -> instId or 'all' or 'none'
let keyboardTarget = 'kr106';
let fullscreenInst = null;
const popoutWindows = {}; // instId -> Window

function getFrame(instId) {
    const inst = INSTRUMENTS[instId];
    return inst ? document.getElementById(inst.frame) : null;
}
function getWrap(instId) {
    return document.querySelector(`.inst-wrapper[data-inst="${instId}"]`);
}

// Send message to an instrument (iframe or popout)
function sendToInst(instId, msg) {
    const pop = popoutWindows[instId];
    if (pop && !pop.closed) {
        pop.postMessage(msg, '*');
    } else {
        const frame = getFrame(instId);
        if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage(msg, '*');
        }
    }
}

// ============================================
// FULLSCREEN / SPLIT VIEW
// ============================================
function goFullscreen(inst) {
    fullscreenInst = inst;
    instIds.forEach(id => {
        const wrap = getWrap(id);
        if (id === inst) {
            wrap.classList.add('fullscreen');
            wrap.classList.remove('hidden-inst');
        } else {
            wrap.classList.add('hidden-inst');
            wrap.classList.remove('fullscreen');
        }
    });
    document.getElementById('backBtn').classList.remove('hidden-btn');
    setKeyboardTarget(inst);
}

function goSplit() {
    fullscreenInst = null;
    instIds.forEach(id => {
        const wrap = getWrap(id);
        wrap.classList.remove('fullscreen', 'hidden-inst');
        // Re-hide if popped out
        if (popoutWindows[id] && !popoutWindows[id].closed) {
            wrap.style.display = 'none';
        }
    });
    document.getElementById('backBtn').classList.add('hidden-btn');
}

document.getElementById('backBtn').addEventListener('click', goSplit);

// Double-click on instrument to fullscreen/split toggle
document.querySelectorAll('.inst-wrapper').forEach(wrapper => {
    wrapper.addEventListener('dblclick', () => {
        if (fullscreenInst) goSplit();
        else goFullscreen(wrapper.dataset.inst);
    });
});

// ============================================
// POP-OUT WINDOWS (generic for all instruments)
// ============================================
document.querySelectorAll('[data-popout]').forEach(btn => {
    btn.addEventListener('click', () => {
        const instId = btn.dataset.popout;
        const inst = INSTRUMENTS[instId];

        // If already open, focus it
        if (popoutWindows[instId] && !popoutWindows[instId].closed) {
            popoutWindows[instId].focus();
            return;
        }

        popoutWindows[instId] = window.open(inst.file, inst.windowName, 'width=960,height=700');
        getWrap(instId).style.display = 'none';
        btn.textContent = 'CLOSE ' + inst.label;

        // Check remaining visible instruments
        const visible = instIds.filter(id => !(popoutWindows[id] && !popoutWindows[id].closed));
        if (visible.length === 1) {
            goFullscreen(visible[0]);
        } else if (visible.length === 0) {
            // All popped out, nothing to show
        } else {
            goSplit();
        }

        // Poll for window close
        const check = setInterval(() => {
            if (popoutWindows[instId] && popoutWindows[instId].closed) {
                clearInterval(check);
                popoutWindows[instId] = null;
                getWrap(instId).style.display = '';
                btn.textContent = inst.label + ' WINDOW';
                goSplit();
            }
        }, 500);
    });
});

// ============================================
// MIDI ROUTING
// ============================================
async function initMIDI() {
    if (!navigator.requestMIDIAccess) return;
    try {
        midiAccess = await navigator.requestMIDIAccess();
        midiAccess.addEventListener('statechange', refreshMIDI);
        refreshMIDI();
    } catch(e) {}
}

function refreshMIDI() {
    const container = document.getElementById('midiDevices');
    const noMidi = document.getElementById('noMidi');
    container.querySelectorAll('.midi-device').forEach(el => el.remove());

    let hasDevices = false;
    for (const [id, input] of midiAccess.inputs) {
        hasDevices = true;
        if (!(id in midiRouting)) {
            midiRouting[id] = instIds[Object.keys(midiRouting).length % instIds.length];
        }

        const dev = document.createElement('div');
        dev.className = 'midi-device';

        const led = document.createElement('div');
        led.className = 'midi-device-led';
        led.id = 'led-' + id;

        const name = document.createElement('span');
        name.className = 'midi-device-name';
        name.textContent = input.name;

        // Custom route dropdown
        const dropdown = document.createElement('div');
        dropdown.className = 'route-dropdown';
        const selected = document.createElement('div');
        selected.className = 'route-selected';
        selected.textContent = routeLabel(midiRouting[id]);
        const menu = document.createElement('div');
        menu.className = 'route-menu';

        const options = [
            {value: 'kr106', label: 'KR-106'},
            {value: 'mpc', label: 'MPC 4000'},
            {value: 'cr78', label: '808'},
            {value: 'all', label: 'ALL'},
            {value: 'none', label: 'NONE'},
        ];
        options.forEach(opt => {
            const el = document.createElement('div');
            el.className = 'route-opt' + (midiRouting[id] === opt.value ? ' active-route' : '');
            el.textContent = opt.label;
            el.addEventListener('click', () => {
                midiRouting[id] = opt.value;
                selected.textContent = opt.label;
                menu.classList.remove('open');
                menu.querySelectorAll('.route-opt').forEach(o => o.classList.remove('active-route'));
                el.classList.add('active-route');
            });
            menu.appendChild(el);
        });

        selected.addEventListener('click', () => {
            document.querySelectorAll('.route-menu.open').forEach(m => m.classList.remove('open'));
            menu.classList.toggle('open');
        });

        dropdown.appendChild(selected);
        dropdown.appendChild(menu);
        dev.appendChild(led);
        dev.appendChild(name);
        dev.appendChild(dropdown);
        container.appendChild(dev);

        input.onmidimessage = (msg) => {
            const route = midiRouting[id] || 'none';
            const ledEl = document.getElementById('led-' + id);
            if (ledEl) {
                ledEl.classList.add('active');
                setTimeout(() => ledEl.classList.remove('active'), 80);
            }

            const midiMsg = {type: 'midi', data: Array.from(msg.data)};
            if (route === 'all') {
                instIds.forEach(instId => sendToInst(instId, midiMsg));
            } else if (route !== 'none') {
                sendToInst(route, midiMsg);
            }
        };
    }

    noMidi.style.display = hasDevices ? 'none' : 'block';
}

function routeLabel(route) {
    if (route === 'kr106') return 'KR-106';
    if (route === 'mpc') return 'MPC 4000';
    if (route === 'cr78') return '808';
    if (route === 'all') return 'ALL';
    return 'NONE';
}

// Close route menus on outside click
document.addEventListener('click', (e) => {
    if (!e.target.closest('.route-dropdown')) {
        document.querySelectorAll('.route-menu.open').forEach(m => m.classList.remove('open'));
    }
});

// ============================================
// KEYBOARD ROUTING
// ============================================
function setKeyboardTarget(target) {
    keyboardTarget = target;
    document.querySelectorAll('.kb-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.kb-btn[data-target="${target}"]`);
    if (btn) btn.classList.add('active');

    document.querySelectorAll('.inst-wrapper').forEach(w => w.classList.remove('focused'));
    const wrap = getWrap(target);
    if (wrap) wrap.classList.add('focused');

    instIds.forEach(id => {
        sendToInst(id, {type: 'keyboard-focus', enabled: id === target});
    });
}

document.querySelectorAll('.kb-btn').forEach(btn => {
    btn.addEventListener('click', () => setKeyboardTarget(btn.dataset.target));
});

// Single click on instrument: focus keyboard
document.querySelectorAll('.inst-wrapper').forEach(wrapper => {
    wrapper.addEventListener('mousedown', () => {
        setKeyboardTarget(wrapper.dataset.inst);
    });
});

// Tab to cycle keyboard, Escape to return to split
document.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const idx = instIds.indexOf(keyboardTarget);
        setKeyboardTarget(instIds[(idx + 1) % instIds.length]);
    }
    if (e.key === 'Escape' && fullscreenInst) {
        goSplit();
    }
});

// ============================================
// IFRAME COMMUNICATION
// ============================================
window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.type === 'instrument-ready') {
        sendToInst(d.name, {type: 'keyboard-focus', enabled: d.name === keyboardTarget});
    }
});

// ============================================
// INIT
// ============================================
initMIDI();

instIds.forEach(id => {
    const frame = getFrame(id);
    if (frame) {
        frame.addEventListener('load', () => {
            sendToInst(id, {type: 'keyboard-focus', enabled: id === keyboardTarget});
        });
    }
});
</script>

</body>
</html>
