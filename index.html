<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0a0a0a;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #ccc;
            user-select: none;
        }

        .studio {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ROUTING BAR */
        .routing-bar {
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: wrap;
        }
        .routing-title {
            font-size: 12px;
            letter-spacing: 3px;
            color: #666;
        }
        .midi-devices {
            display: flex;
            gap: 8px;
            flex: 1;
            overflow-x: auto;
            align-items: center;
            min-width: 100px;
        }
        .midi-device {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .midi-device-name {
            font-size: 8px;
            letter-spacing: 1px;
            color: #888;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .midi-device-led {
            width: 5px;
            height: 5px;
            background: #333;
            flex-shrink: 0;
        }
        .midi-device-led.active {
            background: #33ff33;
            box-shadow: 0 0 4px #33ff33;
        }

        /* MIDI ROUTE DROPDOWN */
        .route-dropdown { position: relative; }
        .route-selected {
            background: #111;
            border: 1px solid #444;
            color: #aaa;
            font-family: Arial, sans-serif;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 6px;
            letter-spacing: 0.5px;
            min-width: 50px;
            text-align: center;
        }
        .route-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #111;
            border: 1px solid #444;
            border-top: none;
            z-index: 100;
        }
        .route-menu.open { display: block; }
        .route-opt {
            padding: 3px 6px;
            font-size: 8px;
            font-weight: 700;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
        }
        .route-opt:hover { background: #1a1a1a; color: #ccc; }
        .route-opt.active-route { color: #228B22; }

        /* KEYBOARD ROUTING */
        .kb-route {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .kb-label {
            font-size: 8px;
            color: #666;
            letter-spacing: 1px;
        }
        .kb-btn {
            padding: 4px 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 7px;
            color: #666;
            letter-spacing: 1px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }
        .kb-btn.active {
            border-color: #228B22;
            color: #228B22;
            background: #0a1a0a;
        }
        .no-midi {
            font-size: 8px;
            color: #444;
            letter-spacing: 1px;
        }

        /* TOOLBAR BUTTONS */
        .bar-btn {
            padding: 4px 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 7px;
            color: #888;
            letter-spacing: 1px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .bar-btn:hover { color: #ccc; border-color: #555; }
        .bar-btn.hidden-btn { display: none; }
        .bar-sep { width: 1px; height: 20px; background: #333; flex-shrink: 0; }
        .popout-row { display: flex; gap: 4px; flex-wrap: wrap; }

        /* INSTRUMENT AREA */
        .instruments {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .instruments::-webkit-scrollbar { width: 6px; }
        .instruments::-webkit-scrollbar-track { background: #0a0a0a; }
        .instruments::-webkit-scrollbar-thumb { background: #333; }
        .instruments::-webkit-scrollbar-thumb:hover { background: #444; }

        /* INSTRUMENT ROWS */
        .inst-row {
            display: flex;
            min-height: 90vh;
            border-bottom: 1px solid #222;
        }
        .inst-row:last-child { border-bottom: none; }
        .inst-row.tall { min-height: 90vh; }

        .inst-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        .inst-wrapper + .inst-wrapper {
            border-left: 1px solid #222;
        }
        .inst-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .inst-focus-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
            z-index: 5;
            pointer-events: none;
            transition: background 0.15s;
        }
        .inst-wrapper.focused .inst-focus-indicator {
            background: #228B22;
            box-shadow: 0 0 8px rgba(34,139,34,0.4);
        }
        .inst-label {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 7px;
            letter-spacing: 2px;
            color: #333;
            z-index: 5;
            pointer-events: none;
        }
        .inst-wrapper.focused .inst-label {
            color: #228B22;
        }

        /* FULLSCREEN MODE */
        .inst-row.hidden-row { display: none; }
        .inst-wrapper.hidden-inst { display: none; }
    </style>
</head>
<body>

<div class="studio">
    <!-- ROUTING BAR -->
    <div class="routing-bar">
        <div class="bar-btn hidden-btn" id="backBtn">SPLIT VIEW</div>
        <div class="bar-sep"></div>
        <div class="popout-row">
            <div class="bar-btn" data-popout="juno">JUNO</div>
            <div class="bar-btn" data-popout="mpc">MPC</div>
            <div class="bar-btn" data-popout="cr78">808</div>
            <div class="bar-btn" data-popout="dx7">DX7</div>
            <div class="bar-btn" data-popout="pianoroll">PIANO ROLL</div>
            <div class="bar-btn" id="togglePedals">SHOW PEDALS</div>
            <div class="bar-btn" data-popout="pedals">PEDALS</div>
            <div class="bar-btn" data-popout="mixer">MIXER</div>
            <div class="bar-btn" data-popout="tape">TAPE</div>
        </div>
        <div class="bar-sep"></div>
        <span class="routing-title">MIDI</span>
        <div class="midi-devices" id="midiDevices">
            <span class="no-midi" id="noMidi">NO MIDI DEVICES</span>
        </div>
        <div class="kb-route">
            <span class="kb-label">KB</span>
            <div class="kb-btn active" data-target="juno">JUNO</div>
            <div class="kb-btn" data-target="mpc">MPC</div>
            <div class="kb-btn" data-target="cr78">808</div>
            <div class="kb-btn" data-target="dx7">DX7</div>
        </div>
    </div>

    <!-- INSTRUMENTS -->
    <div class="instruments" id="instruments">
        <!-- ROW 1: JUNO SYNTH (full width) -->
        <div class="inst-row tall" data-row="0">
            <div class="inst-wrapper focused" data-inst="juno">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">JUNO SYNTH</div>
                <iframe id="frameJuno" src="kr106.html"></iframe>
            </div>
        </div>

        <!-- ROW 2: MPC (full width) -->
        <div class="inst-row tall" data-row="1">
            <div class="inst-wrapper" data-inst="mpc">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">AKAI MPC 4000</div>
                <iframe id="frameMpc" src="mpc.html"></iframe>
            </div>
        </div>

        <!-- ROW 3: 808 SEQUENCER (full width) -->
        <div class="inst-row tall" data-row="2">
            <div class="inst-wrapper" data-inst="cr78">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">STEP SEQUENCER</div>
                <iframe id="frameCr78" src="808.html"></iframe>
            </div>
        </div>

        <!-- ROW 4: DX7 (full width) -->
        <div class="inst-row tall" data-row="3">
            <div class="inst-wrapper" data-inst="dx7">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">YAMAHA DX7</div>
                <iframe id="frameDx7" src="dx7/index.html"></iframe>
            </div>
        </div>

        <!-- ROW 5: PEDALS (hidden by default) + MIXER + TAPE MACHINE -->
        <div class="inst-row tall" data-row="4">
            <div class="inst-wrapper hidden-inst" data-inst="pedals">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">PEDALBOARD</div>
                <iframe id="framePedals" src="pedals.html"></iframe>
            </div>
            <div class="inst-wrapper" data-inst="mixer">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">MIXING CONSOLE</div>
                <iframe id="frameMixer" src="mixer.html"></iframe>
            </div>
            <div class="inst-wrapper" data-inst="tape">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">TAPE MACHINE</div>
                <iframe id="frameTape" src="tape.html"></iframe>
            </div>
        </div>

        <!-- ROW 7: PIANO ROLL (always last) -->
        <div class="inst-row tall" data-row="6">
            <div class="inst-wrapper" data-inst="pianoroll">
                <div class="inst-focus-indicator"></div>
                <div class="inst-label">PIANO ROLL</div>
                <iframe id="framePianoroll" src="pianoroll.html"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// INSTRUMENT REGISTRY
// ============================================
const INSTRUMENTS = {
    juno:  { frame: 'frameJuno',  label: 'JUNO',    file: 'kr106.html',      windowName: 'junowin' },
    mpc:   { frame: 'frameMpc',   label: 'MPC',     file: 'mpc.html',        windowName: 'mpc4000' },
    cr78:  { frame: 'frameCr78',  label: '808',     file: '808.html',        windowName: 'cr78win' },
    dx7:   { frame: 'frameDx7',   label: 'DX7',     file: 'dx7/index.html',  windowName: 'dx7win' },
    pianoroll: { frame: 'framePianoroll', label: 'PIANO ROLL', file: 'pianoroll.html', windowName: 'pianorollwin' },
    pedals:{ frame: 'framePedals',label: 'PEDALS',  file: 'pedals.html',     windowName: 'pedalswin' },
    mixer: { frame: 'frameMixer', label: 'MIXER',   file: 'mixer.html',      windowName: 'mixerwin' },
    tape:  { frame: 'frameTape',  label: 'TAPE',    file: 'tape.html',       windowName: 'tapewin' },
};
const instIds = Object.keys(INSTRUMENTS);
const localInsts = ['juno', 'mpc', 'cr78', 'pianoroll', 'pedals', 'mixer', 'tape'];

// ============================================
// STATE
// ============================================
let midiAccess = null;
const midiRouting = {};
let keyboardTarget = 'juno';
let fullscreenInst = null;
const popoutWindows = {};

function getFrame(instId) {
    const inst = INSTRUMENTS[instId];
    return inst ? document.getElementById(inst.frame) : null;
}
function getWrap(instId) {
    return document.querySelector(`.inst-wrapper[data-inst="${instId}"]`);
}
function getRow(instId) {
    const wrap = getWrap(instId);
    return wrap ? wrap.closest('.inst-row') : null;
}

function sendToInst(instId, msg) {
    const pop = popoutWindows[instId];
    if (pop && !pop.closed) {
        try { pop.postMessage(msg, '*'); } catch(e) {}
    } else {
        const frame = getFrame(instId);
        if (frame && frame.contentWindow) {
            try { frame.contentWindow.postMessage(msg, '*'); } catch(e) {}
        }
    }
}

// ============================================
// FULLSCREEN / SPLIT VIEW
// ============================================
function goFullscreen(inst) {
    fullscreenInst = inst;
    const targetRow = getRow(inst);
    document.querySelectorAll('.inst-row').forEach(row => {
        if (row === targetRow) {
            row.classList.remove('hidden-row');
            row.style.flex = '1';
        } else {
            row.classList.add('hidden-row');
        }
    });
    // Hide siblings in same row
    if (targetRow) {
        targetRow.querySelectorAll('.inst-wrapper').forEach(w => {
            if (w.dataset.inst === inst) {
                w.classList.remove('hidden-inst');
                w.style.flex = '1';
            } else {
                w.classList.add('hidden-inst');
            }
        });
    }
    document.getElementById('backBtn').classList.remove('hidden-btn');
    setKeyboardTarget(inst);
}

function goSplit() {
    fullscreenInst = null;
    document.querySelectorAll('.inst-row').forEach(row => {
        row.classList.remove('hidden-row');
        row.style.flex = '';
    });
    document.querySelectorAll('.inst-wrapper').forEach(w => {
        w.classList.remove('hidden-inst');
        w.style.flex = '';
        const id = w.dataset.inst;
        // Re-hide if popped out
        if (popoutWindows[id] && !popoutWindows[id].closed) {
            w.classList.add('hidden-inst');
        }
        // Keep pedals hidden unless toggled on
        if (id === 'pedals' && !pedalsVisible) {
            w.classList.add('hidden-inst');
        }
    });
    document.getElementById('backBtn').classList.add('hidden-btn');
}

document.getElementById('backBtn').addEventListener('click', goSplit);

document.querySelectorAll('.inst-wrapper').forEach(wrapper => {
    wrapper.addEventListener('dblclick', () => {
        if (fullscreenInst) goSplit();
        else goFullscreen(wrapper.dataset.inst);
    });
});

// ============================================
// POP-OUT WINDOWS
// ============================================
document.querySelectorAll('[data-popout]').forEach(btn => {
    btn.addEventListener('click', () => {
        const instId = btn.dataset.popout;
        const inst = INSTRUMENTS[instId];

        if (popoutWindows[instId] && !popoutWindows[instId].closed) {
            popoutWindows[instId].focus();
            return;
        }

        popoutWindows[instId] = window.open(inst.file, inst.windowName, 'width=960,height=700');
        getWrap(instId).classList.add('hidden-inst');
        btn.textContent = 'X ' + inst.label;

        const check = setInterval(() => {
            if (popoutWindows[instId] && popoutWindows[instId].closed) {
                clearInterval(check);
                popoutWindows[instId] = null;
                getWrap(instId).classList.remove('hidden-inst');
                btn.textContent = inst.label;
            }
        }, 500);
    });
});

// ============================================
// PEDALS TOGGLE
// ============================================
let pedalsVisible = false;
document.getElementById('togglePedals').addEventListener('click', () => {
    pedalsVisible = !pedalsVisible;
    const wrap = getWrap('pedals');
    wrap.classList.toggle('hidden-inst', !pedalsVisible);
    document.getElementById('togglePedals').textContent = pedalsVisible ? 'HIDE PEDALS' : 'SHOW PEDALS';
});

// ============================================
// MIDI ROUTING
// ============================================
async function initMIDI() {
    if (!navigator.requestMIDIAccess) return;
    try {
        midiAccess = await navigator.requestMIDIAccess();
        midiAccess.addEventListener('statechange', refreshMIDI);
        refreshMIDI();
    } catch(e) {}
}

const ROUTE_OPTIONS = [
    {value: 'juno', label: 'JUNO'},
    {value: 'mpc', label: 'MPC'},
    {value: 'cr78', label: '808'},
    {value: 'dx7', label: 'DX7'},
    {value: 'all', label: 'ALL'},
    {value: 'none', label: 'NONE'},
];

function refreshMIDI() {
    const container = document.getElementById('midiDevices');
    const noMidi = document.getElementById('noMidi');
    container.querySelectorAll('.midi-device').forEach(el => el.remove());

    let hasDevices = false;
    for (const [id, input] of midiAccess.inputs) {
        hasDevices = true;
        if (!(id in midiRouting)) midiRouting[id] = 'juno';

        const dev = document.createElement('div');
        dev.className = 'midi-device';

        const led = document.createElement('div');
        led.className = 'midi-device-led';
        led.id = 'led-' + id;

        const name = document.createElement('span');
        name.className = 'midi-device-name';
        name.textContent = input.name;

        const dropdown = document.createElement('div');
        dropdown.className = 'route-dropdown';
        const selected = document.createElement('div');
        selected.className = 'route-selected';
        selected.textContent = routeLabel(midiRouting[id]);
        const menu = document.createElement('div');
        menu.className = 'route-menu';

        ROUTE_OPTIONS.forEach(opt => {
            const el = document.createElement('div');
            el.className = 'route-opt' + (midiRouting[id] === opt.value ? ' active-route' : '');
            el.textContent = opt.label;
            el.addEventListener('click', () => {
                midiRouting[id] = opt.value;
                selected.textContent = opt.label;
                menu.classList.remove('open');
                menu.querySelectorAll('.route-opt').forEach(o => o.classList.remove('active-route'));
                el.classList.add('active-route');
            });
            menu.appendChild(el);
        });

        selected.addEventListener('click', () => {
            document.querySelectorAll('.route-menu.open').forEach(m => m.classList.remove('open'));
            menu.classList.toggle('open');
        });

        dropdown.appendChild(selected);
        dropdown.appendChild(menu);
        dev.appendChild(led);
        dev.appendChild(name);
        dev.appendChild(dropdown);
        container.appendChild(dev);

        input.onmidimessage = (msg) => {
            const route = midiRouting[id] || 'none';
            const ledEl = document.getElementById('led-' + id);
            if (ledEl) {
                ledEl.classList.add('active');
                setTimeout(() => ledEl.classList.remove('active'), 80);
            }
            const midiMsg = {type: 'midi', data: Array.from(msg.data)};
            if (route === 'all') {
                instIds.forEach(instId => sendToInst(instId, midiMsg));
            } else if (route !== 'none') {
                sendToInst(route, midiMsg);
            }
            // Always forward MIDI to piano roll for recording
            sendToInst('pianoroll', midiMsg);
        };
    }
    noMidi.style.display = hasDevices ? 'none' : 'block';
}

function routeLabel(route) {
    const opt = ROUTE_OPTIONS.find(o => o.value === route);
    return opt ? opt.label : 'NONE';
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.route-dropdown')) {
        document.querySelectorAll('.route-menu.open').forEach(m => m.classList.remove('open'));
    }
});

// ============================================
// KEYBOARD ROUTING
// ============================================
function setKeyboardTarget(target) {
    keyboardTarget = target;
    document.querySelectorAll('.kb-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.kb-btn[data-target="${target}"]`);
    if (btn) btn.classList.add('active');

    document.querySelectorAll('.inst-wrapper').forEach(w => w.classList.remove('focused'));
    const wrap = getWrap(target);
    if (wrap) wrap.classList.add('focused');

    localInsts.forEach(id => {
        sendToInst(id, {type: 'keyboard-focus', enabled: id === target});
    });
}

document.querySelectorAll('.kb-btn').forEach(btn => {
    btn.addEventListener('click', () => setKeyboardTarget(btn.dataset.target));
});

document.querySelectorAll('.inst-wrapper').forEach(wrapper => {
    wrapper.addEventListener('mousedown', () => {
        setKeyboardTarget(wrapper.dataset.inst);
    });
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const idx = instIds.indexOf(keyboardTarget);
        setKeyboardTarget(instIds[(idx + 1) % instIds.length]);
    }
    if (e.key === 'Escape' && fullscreenInst) {
        goSplit();
    }
});

// ============================================
// IFRAME COMMUNICATION
// ============================================
window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.type === 'instrument-ready') {
        // Map old name 'kr106' to 'juno'
        const name = d.name === 'kr106' ? 'juno' : d.name;
        sendToInst(name, {type: 'keyboard-focus', enabled: name === keyboardTarget});
    }
    // Route pedal-control messages to target instruments
    if (d && d.type === 'pedal-control') {
        const idMap = {kr106: 'juno', mpc: 'mpc', cr78: 'cr78', juno: 'juno'};
        const instId = idMap[d.channel] || d.channel;
        if (INSTRUMENTS[instId]) {
            sendToInst(instId, {type: 'pedals', pedals: d.pedals});
        }
    }
    // Route piano roll notes to target instruments
    if (d && d.type === 'pianoroll-note') {
        const idMap = {kr106: 'juno', juno: 'juno', mpc: 'mpc', cr78: 'cr78', '808': 'cr78', dx7: 'dx7'};
        const instId = idMap[d.channel] || d.channel;
        if (INSTRUMENTS[instId]) {
            const midiData = d.on ? [0x90, d.note, d.velocity || 100] : [0x80, d.note, 0];
            const msg = {type: 'midi', data: midiData};
            if (d.kit) msg.kit = d.kit; // pass kit info for 808 multi-kit
            sendToInst(instId, msg);
        }
    }
    // Handle active 808 kits notification — forward to mixer and pedals
    if (d && d.type === 'active-808-kits') {
        sendToInst('mixer', d);
        sendToInst('pedals', d);
    }
    // Route transport messages to tape machine
    if (d && d.type === 'transport') {
        sendToInst('tape', d);
    }
    if (d && d.type === 'mixer-control') {
        const target = d.channel;
        if (target === 'master') {
            localInsts.forEach(id => {
                if (id !== 'mixer') sendToInst(id, {type: 'mixer', param: d.param, value: d.value, bus: 'master'});
            });
        } else {
            // Map mixer channel names to instrument IDs
            const idMap = {kr106: 'juno', mpc: 'mpc', cr78: 'cr78'};
            const instId = idMap[target] || target;
            if (INSTRUMENTS[instId]) sendToInst(instId, {type: 'mixer', param: d.param, value: d.value});
        }
    }
});

// ============================================
// INIT
// ============================================
initMIDI();

instIds.forEach(id => {
    const frame = getFrame(id);
    if (frame) {
        frame.addEventListener('load', () => {
            if (localInsts.includes(id)) {
                sendToInst(id, {type: 'keyboard-focus', enabled: id === keyboardTarget});
            }
        });
    }
});
</script>

</body>
</html>
