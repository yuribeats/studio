<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0a0a0a;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            user-select: none;
        }
        .studio {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* TOP BAR */
        .top-bar {
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: wrap;
        }
        .top-title { font-size: 14px; letter-spacing: 4px; }
        .bar-btn {
            padding: 6px 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 13px;
            color: #fff;
            letter-spacing: 1px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .bar-btn:hover { border-color: #555; }
        .bar-btn.active-tab { border-color: #228B22; color: #228B22; background: #0a1a0a; }
        .bar-sep { width: 1px; height: 20px; background: #333; flex-shrink: 0; }

        /* MIDI */
        .midi-devices { display: flex; gap: 8px; flex: 1; overflow-x: auto; align-items: center; min-width: 80px; }
        .midi-device { background: #1a1a1a; border: 1px solid #333; padding: 6px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .midi-device-name { font-size: 13px; letter-spacing: 1px; color: #fff; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .midi-device-led { width: 5px; height: 5px; background: #333; flex-shrink: 0; }
        .midi-device-led.active { background: #33ff33; box-shadow: 0 0 4px #33ff33; }
        .no-midi { font-size: 13px; color: #555; letter-spacing: 1px; }
        .route-dropdown { position: relative; }
        .route-selected { background: #111; border: 1px solid #444; color: #fff; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; padding: 3px 6px; letter-spacing: 0.5px; min-width: 50px; text-align: center; }
        .route-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #111; border: 1px solid #444; border-top: none; z-index: 100; }
        .route-menu.open { display: block; }
        .route-opt { padding: 3px 6px; font-size: 13px; font-weight: 700; font-family: Arial, sans-serif; text-transform: uppercase; color: #fff; letter-spacing: 0.5px; }
        .route-opt:hover { background: #1a1a1a; }
        .route-opt.active-route { color: #228B22; }

        /* KB ROUTING */
        .kb-route { display: flex; align-items: center; gap: 4px; margin-left: auto; flex-shrink: 0; }
        .kb-label { font-size: 13px; color: #fff; letter-spacing: 1px; }
        .kb-btn { padding: 6px 10px; background: #1a1a1a; border: 1px solid #333; font-size: 13px; color: #fff; letter-spacing: 1px; font-family: Arial, sans-serif; font-weight: 700; text-transform: uppercase; }
        .kb-btn.active { border-color: #228B22; color: #228B22; background: #0a1a0a; }

        /* MAIN AREA: top (panel/instrument) + bottom (utilities) */
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

        /* TOP SECTION: panel or instrument */
        .top-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

        /* CONTROL PANEL */
        .panel { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; overflow-y: auto; background: #0a0a0a; }
        .panel.hidden { display: none; }
        .panel-tile { background: #141414; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; transition: border-color 0.15s; }
        .panel-tile:hover { border-color: #444; }
        .panel-tile-name { font-size: 18px; letter-spacing: 4px; }
        .panel-tile-sub { font-size: 11px; letter-spacing: 2px; color: #555; margin-top: 6px; }

        /* BACK BAR */
        .back-bar { display: none; background: #141414; border-bottom: 1px solid #2a2a2a; padding: 6px 16px; align-items: center; gap: 12px; flex-shrink: 0; }
        .back-bar.visible { display: flex; }
        .inst-title { font-size: 16px; letter-spacing: 3px; color: #228B22; }

        /* INSTRUMENT FRAME */
        .inst-area { flex: 1; display: none; overflow: hidden; }
        .inst-area.visible { display: flex; }
        .inst-area iframe { width: 100%; height: 100%; border: none; }

        /* BOTTOM SECTION: persistent utilities */
        .bottom-section { height: 45%; min-height: 200px; display: flex; flex-direction: column; border-top: 2px solid #228B22; flex-shrink: 0; }
        .bottom-tabs { display: flex; background: #141414; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
        .bottom-tab { padding: 6px 14px; font-size: 13px; color: #555; letter-spacing: 1px; font-family: Arial, sans-serif; font-weight: 700; text-transform: uppercase; border-right: 1px solid #2a2a2a; }
        .bottom-tab.active { color: #228B22; background: #0a1a0a; }
        .bottom-pop { padding: 6px 10px; font-size: 11px; color: #555; letter-spacing: 1px; font-family: Arial, sans-serif; font-weight: 700; text-transform: uppercase; margin-left: auto; border-left: 1px solid #2a2a2a; }
        .bottom-pop.popped { color: #ff6600; }
        .bottom-frames { flex: 1; position: relative; overflow: hidden; }
        .bottom-frames iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .bottom-frames iframe.active { display: block; }
    </style>
</head>
<body>
<div class="studio">
    <!-- TOP BAR -->
    <div class="top-bar">
        <span class="top-title">STUDIO</span>
        <div class="bar-sep"></div>
        <div class="bar-btn" id="btnSave">SAVE</div>
        <div class="bar-btn" id="btnLoad">LOAD</div>
        <div class="bar-sep"></div>
        <span style="font-size:13px;letter-spacing:1px;">MIDI</span>
        <div class="midi-devices" id="midiDevices">
            <span class="no-midi" id="noMidi">NO MIDI DEVICES</span>
        </div>
        <div class="kb-route">
            <span class="kb-label">KB</span>
            <div class="kb-btn active" data-target="juno">JUNO</div>
            <div class="kb-btn" data-target="fm">FM</div>
            <div class="kb-btn" data-target="mpc">MPC</div>
            <div class="kb-btn" data-target="cr78">DRUMS</div>
            <div class="kb-btn" data-target="rhodes">RHODES</div>
            <div class="kb-btn" data-target="deck">DECK</div>
        </div>
    </div>

    <div class="main-area">
        <!-- TOP SECTION -->
        <div class="top-section">
            <!-- BACK BAR -->
            <div class="back-bar" id="backBar">
                <div class="bar-btn" id="backToPanel">BACK</div>
                <span class="inst-title" id="instTitle"></span>
                <div style="flex:1;"></div>
                <div class="bar-btn" id="popoutCurrent">POPOUT</div>
            </div>

            <!-- CONTROL PANEL -->
            <div class="panel" id="panel">
                <div class="panel-tile" data-open="juno">
                    <span class="panel-tile-name">JUNO</span>
                    <span class="panel-tile-sub">POLYSYNTH</span>
                </div>
                <div class="panel-tile" data-open="fm">
                    <span class="panel-tile-name">FM</span>
                    <span class="panel-tile-sub">6-OP SYNTH</span>
                </div>
                <div class="panel-tile" data-open="rhodes">
                    <span class="panel-tile-name">RHODES</span>
                    <span class="panel-tile-sub">ELECTRIC PIANO</span>
                </div>
                <div class="panel-tile" data-open="mpc">
                    <span class="panel-tile-name">MPC</span>
                    <span class="panel-tile-sub">SAMPLER</span>
                </div>
                <div class="panel-tile" data-open="cr78">
                    <span class="panel-tile-name">DRUMS</span>
                    <span class="panel-tile-sub">DRUM MACHINE</span>
                </div>
                <div class="panel-tile" data-open="deck">
                    <span class="panel-tile-name">DRIFT</span>
                    <span class="panel-tile-sub">DECK</span>
                </div>
            </div>

            <!-- INSTRUMENT FRAME -->
            <div class="inst-area" id="instArea"></div>
        </div>

        <!-- BOTTOM SECTION: always-on utilities -->
        <div class="bottom-section">
            <div class="bottom-tabs">
                <div class="bottom-tab active" data-btab="pianoroll">PIANO ROLL</div>
                <div class="bottom-tab" data-btab="mixer">MIXER</div>
                <div class="bottom-tab" data-btab="pedals">PEDALS</div>
                <div class="bottom-tab" data-btab="tape">TAPE</div>
                <div class="bottom-pop" id="bottomPopout">POPOUT</div>
            </div>
            <div class="bottom-frames" id="bottomFrames">
                <iframe id="framePianoroll" src="pianoroll.html" class="active" data-bframe="pianoroll"></iframe>
                <iframe id="frameMixer" data-bframe="mixer" data-src="mixer.html"></iframe>
                <iframe id="framePedals" data-bframe="pedals" data-src="pedals.html"></iframe>
                <iframe id="frameTape" data-bframe="tape" data-src="tape.html"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// INSTRUMENT REGISTRY
// ============================================
const INSTRUMENTS = {
    juno:  { label: 'JUNO',       file: 'kr106.html',      windowName: 'junowin' },
    fm:    { label: 'FM',         file: 'fm.html',         windowName: 'fmwin' },
    mpc:   { label: 'MPC',        file: 'mpc.html',        windowName: 'mpc4000' },
    cr78:  { label: 'DRUMS',      file: '808.html',        windowName: 'cr78win' },
    rhodes:{ label: 'RHODES',     file: 'rhodes.html',     windowName: 'rhodeswin' },
    deck:  { label: 'DECK',       file: 'deck.html',       windowName: 'deckwin' },
};

// Bottom-bar utilities (always loaded, not in panel)
const UTILITIES = {
    pianoroll: { label: 'PIANO ROLL', file: 'pianoroll.html', frame: 'framePianoroll', windowName: 'pianorollwin' },
    mixer:     { label: 'MIXER',      file: 'mixer.html',     frame: 'frameMixer',     windowName: 'mixerwin' },
    pedals:    { label: 'PEDALS',     file: 'pedals.html',    frame: 'framePedals',    windowName: 'pedalswin' },
    tape:      { label: 'TAPE',       file: 'tape.html',      frame: 'frameTape',      windowName: 'tapewin' },
};

const allInstIds = [...Object.keys(INSTRUMENTS), ...Object.keys(UTILITIES)];

// ============================================
// STATE
// ============================================
let midiAccess = null;
const midiRouting = {};
let keyboardTarget = 'juno';
let currentView = 'panel';
const popoutWindows = {};
const loadedFrames = {};

let instFrameId = null;

// Background iframes for instruments that need to stay alive
const bgContainer = document.createElement('div');
bgContainer.style.cssText = 'position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;pointer-events:none;';
document.body.appendChild(bgContainer);

function getOrCreateBgFrame(instId) {
    if (loadedFrames[instId]) return loadedFrames[instId];
    const inst = INSTRUMENTS[instId];
    if (!inst) return null;
    const iframe = document.createElement('iframe');
    iframe.id = 'bg-' + instId;
    iframe.style.cssText = 'width:1px;height:1px;border:none;';
    iframe.src = inst.file;
    bgContainer.appendChild(iframe);
    loadedFrames[instId] = iframe;
    iframe.addEventListener('load', () => {
        sendToFrame(iframe, {type: 'keyboard-focus', enabled: instId === keyboardTarget});
    });
    return iframe;
}

// BroadcastChannel for popout window communication
const studioBroadcast = new BroadcastChannel('studio-bus');
studioBroadcast.onmessage = (e) => {
    const d = e.data;
    if (!d) return;
    if (d._from) {
        window.dispatchEvent(new MessageEvent('message', {data: d}));
    }
};

function sendToFrame(frame, msg) {
    if (frame && frame.contentWindow) {
        try { frame.contentWindow.postMessage(msg, '*'); } catch(e) {}
    }
}

function sendToInst(instId, msg) {
    const pop = popoutWindows[instId];
    if (pop && !pop.closed) {
        msg._target = instId;
        studioBroadcast.postMessage(msg);
        return;
    }
    // Check bottom utility frames
    const util = UTILITIES[instId];
    if (util) {
        const frame = document.getElementById(util.frame);
        if (frame && frame.src && frame.contentWindow) {
            sendToFrame(frame, msg);
        }
        return;
    }
    // Check loaded instrument frames (active or background)
    if (loadedFrames[instId]) {
        sendToFrame(loadedFrames[instId], msg);
        return;
    }
    // Not loaded — create bg frame for important messages
    if (msg.type === 'midi' || msg.type === 'pedals' || msg.type === 'load-session') {
        const bgFrame = getOrCreateBgFrame(instId);
        if (bgFrame) {
            bgFrame.addEventListener('load', function once() {
                bgFrame.removeEventListener('load', once);
                sendToFrame(bgFrame, msg);
            });
        }
    }
}

// ============================================
// BOTTOM TABS (always-on utilities)
// ============================================
let activeBottomTab = 'pianoroll';

document.querySelectorAll('.bottom-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        const id = tab.dataset.btab;
        activeBottomTab = id;
        document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('#bottomFrames iframe').forEach(f => f.classList.remove('active'));
        const frame = document.querySelector(`iframe[data-bframe="${id}"]`);
        if (frame) {
            if (!frame.src && frame.dataset.src) frame.src = frame.dataset.src;
            frame.classList.add('active');
        }
        // Update popout button state
        const popBtn = document.getElementById('bottomPopout');
        popBtn.classList.toggle('popped', !!(popoutWindows[id] && !popoutWindows[id].closed));
    });
});

// ============================================
// UTILITY POPOUT
// ============================================
document.getElementById('bottomPopout').addEventListener('click', () => {
    const id = activeBottomTab;
    const util = UTILITIES[id];
    if (!util) return;

    if (popoutWindows[id] && !popoutWindows[id].closed) {
        popoutWindows[id].focus();
        return;
    }

    popoutWindows[id] = window.open(util.file, util.windowName, 'width=960,height=700');
    document.getElementById('bottomPopout').classList.add('popped');

    const check = setInterval(() => {
        if (!popoutWindows[id] || popoutWindows[id].closed) {
            clearInterval(check);
            popoutWindows[id] = null;
            if (activeBottomTab === id) document.getElementById('bottomPopout').classList.remove('popped');
        }
    }, 500);
});

// ============================================
// PANEL / INSTRUMENT NAVIGATION
// ============================================
function showPanel() {
    currentView = 'panel';
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('instArea').classList.remove('visible');
    document.getElementById('backBar').classList.remove('visible');
    if (instFrameId) hideInst(instFrameId);
}

function hideInst(instId) {
    if (loadedFrames[instId]) {
        loadedFrames[instId].style.cssText = 'width:1px;height:1px;border:none;position:absolute;pointer-events:none;';
    }
    instFrameId = null;
}

function openInstrument(instId) {
    currentView = instId;
    const inst = INSTRUMENTS[instId];
    if (!inst) return;
    document.getElementById('panel').classList.add('hidden');
    document.getElementById('instArea').classList.add('visible');
    document.getElementById('backBar').classList.add('visible');
    document.getElementById('instTitle').textContent = inst.label;
    if (instFrameId && instFrameId !== instId) hideInst(instFrameId);
    // Reuse existing bg frame or create one — never reload
    const frame = getOrCreateBgFrame(instId);
    if (frame) {
        // Position over instArea without moving in DOM (moving reloads iframes)
        frame.style.cssText = 'position:fixed;border:none;z-index:50;pointer-events:auto;';
        positionInstFrame(frame);
    }
    instFrameId = instId;
    setKeyboardTarget(instId);
    // Sync piano roll to show this instrument's channel
    const prChannelMap = {juno:'juno', fm:'fm', mpc:'mpc', cr78:'808', rhodes:'rhodes', deck:'deck'};
    const prCh = prChannelMap[instId];
    if (prCh) sendToInst('pianoroll', {type: 'set-channel', channel: prCh});
}

function positionInstFrame(frame) {
    const area = document.getElementById('instArea');
    const rect = area.getBoundingClientRect();
    frame.style.left = rect.left + 'px';
    frame.style.top = rect.top + 'px';
    frame.style.width = rect.width + 'px';
    frame.style.height = rect.height + 'px';
}

// Reposition active instrument iframe on resize
window.addEventListener('resize', () => {
    if (instFrameId && loadedFrames[instFrameId]) {
        positionInstFrame(loadedFrames[instFrameId]);
    }
});

document.querySelectorAll('.panel-tile[data-open]').forEach(tile => {
    tile.addEventListener('click', () => openInstrument(tile.dataset.open));
});
document.getElementById('backToPanel').addEventListener('click', showPanel);

document.getElementById('popoutCurrent').addEventListener('click', () => {
    if (currentView === 'panel') return;
    const instId = currentView;
    const inst = INSTRUMENTS[instId];
    if (!inst) return;
    if (popoutWindows[instId] && !popoutWindows[instId].closed) {
        popoutWindows[instId].focus();
        return;
    }
    popoutWindows[instId] = window.open(inst.file, inst.windowName, 'width=960,height=700');
    const check = setInterval(() => {
        if (popoutWindows[instId] && popoutWindows[instId].closed) {
            clearInterval(check);
            popoutWindows[instId] = null;
        }
    }, 500);
    showPanel();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && currentView !== 'panel') showPanel();
});

// ============================================
// MIDI ROUTING
// ============================================
async function initMIDI() {
    if (!navigator.requestMIDIAccess) return;
    try {
        midiAccess = await navigator.requestMIDIAccess();
        midiAccess.addEventListener('statechange', refreshMIDI);
        refreshMIDI();
    } catch(e) {}
}

const ROUTE_OPTIONS = [
    {value: 'juno', label: 'JUNO'},
    {value: 'fm', label: 'FM'},
    {value: 'mpc', label: 'MPC'},
    {value: 'cr78', label: 'DRUMS'},
    {value: 'rhodes', label: 'RHODES'},
    {value: 'deck', label: 'DECK'},
    {value: 'all', label: 'ALL'},
    {value: 'none', label: 'NONE'},
];

function refreshMIDI() {
    const container = document.getElementById('midiDevices');
    const noMidi = document.getElementById('noMidi');
    container.querySelectorAll('.midi-device').forEach(el => el.remove());
    let hasDevices = false;
    for (const [id, input] of midiAccess.inputs) {
        hasDevices = true;
        if (!(id in midiRouting)) midiRouting[id] = 'juno';
        const dev = document.createElement('div');
        dev.className = 'midi-device';
        const led = document.createElement('div');
        led.className = 'midi-device-led';
        led.id = 'led-' + id;
        const name = document.createElement('span');
        name.className = 'midi-device-name';
        name.textContent = input.name;
        const dropdown = document.createElement('div');
        dropdown.className = 'route-dropdown';
        const selected = document.createElement('div');
        selected.className = 'route-selected';
        selected.textContent = routeLabel(midiRouting[id]);
        const menu = document.createElement('div');
        menu.className = 'route-menu';
        ROUTE_OPTIONS.forEach(opt => {
            const el = document.createElement('div');
            el.className = 'route-opt' + (midiRouting[id] === opt.value ? ' active-route' : '');
            el.textContent = opt.label;
            el.addEventListener('click', () => {
                midiRouting[id] = opt.value;
                selected.textContent = opt.label;
                menu.classList.remove('open');
                menu.querySelectorAll('.route-opt').forEach(o => o.classList.remove('active-route'));
                el.classList.add('active-route');
            });
            menu.appendChild(el);
        });
        selected.addEventListener('click', () => {
            document.querySelectorAll('.route-menu.open').forEach(m => m.classList.remove('open'));
            menu.classList.toggle('open');
        });
        dropdown.appendChild(selected);
        dropdown.appendChild(menu);
        dev.appendChild(led);
        dev.appendChild(name);
        dev.appendChild(dropdown);
        container.appendChild(dev);
        input.onmidimessage = (msg) => {
            const route = midiRouting[id] || 'none';
            const ledEl = document.getElementById('led-' + id);
            if (ledEl) { ledEl.classList.add('active'); setTimeout(() => ledEl.classList.remove('active'), 80); }
            const midiMsg = {type: 'midi', data: Array.from(msg.data)};
            if (route === 'all') {
                allInstIds.forEach(iid => sendToInst(iid, midiMsg));
            } else if (route !== 'none') {
                sendToInst(route, midiMsg);
            }
            sendToInst('pianoroll', midiMsg);
        };
    }
    noMidi.style.display = hasDevices ? 'none' : 'block';
}

function routeLabel(route) {
    const opt = ROUTE_OPTIONS.find(o => o.value === route);
    return opt ? opt.label : 'NONE';
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.route-dropdown')) {
        document.querySelectorAll('.route-menu.open').forEach(m => m.classList.remove('open'));
    }
});

// ============================================
// KEYBOARD ROUTING
// ============================================
function setKeyboardTarget(target) {
    keyboardTarget = target;
    document.querySelectorAll('.kb-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.kb-btn[data-target="${target}"]`);
    if (btn) btn.classList.add('active');
    allInstIds.forEach(id => sendToInst(id, {type: 'keyboard-focus', enabled: id === target}));
}

document.querySelectorAll('.kb-btn').forEach(btn => {
    btn.addEventListener('click', () => setKeyboardTarget(btn.dataset.target));
});

// ============================================
// QWERTY KEYBOARD → MIDI
// ============================================
const QWERTY_MAP = {
    'a': 0, 'w': 1, 's': 2, 'e': 3, 'd': 4, 'f': 5,
    't': 6, 'g': 7, 'y': 8, 'h': 9, 'u': 10, 'j': 11,
    'k': 12, 'o': 13, 'l': 14, 'p': 15
};
let qwertyOctave = 4;
const qwertyHeld = new Set();

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (k === 'z') { qwertyOctave = Math.max(0, qwertyOctave - 1); return; }
    if (k === 'x') { qwertyOctave = Math.min(8, qwertyOctave + 1); return; }
    const semi = QWERTY_MAP[k];
    if (semi === undefined) return;
    const note = qwertyOctave * 12 + semi;
    if (note > 127 || qwertyHeld.has(note)) return;
    qwertyHeld.add(note);
    sendToInst(keyboardTarget, {type: 'midi', data: [0x90, note, 100]});
});

document.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    const semi = QWERTY_MAP[k];
    if (semi === undefined) return;
    const note = qwertyOctave * 12 + semi;
    if (!qwertyHeld.has(note)) return;
    qwertyHeld.delete(note);
    sendToInst(keyboardTarget, {type: 'midi', data: [0x80, note, 0]});
});

// ============================================
// IFRAME KEYBOARD FORWARDING
// ============================================
window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.type === 'iframe-key') {
        if (d.event === 'keydown') {
            if (d.repeat) return;
            const k = d.key.toLowerCase();
            if (k === 'z') { qwertyOctave = Math.max(0, qwertyOctave - 1); return; }
            if (k === 'x') { qwertyOctave = Math.min(8, qwertyOctave + 1); return; }
            if (k === 'escape' && currentView !== 'panel') { showPanel(); return; }
            const semi = QWERTY_MAP[k];
            if (semi === undefined) return;
            const note = qwertyOctave * 12 + semi;
            if (note > 127 || qwertyHeld.has(note)) return;
            qwertyHeld.add(note);
            sendToInst(keyboardTarget, {type: 'midi', data: [0x90, note, 100]});
        } else if (d.event === 'keyup') {
            const k = d.key.toLowerCase();
            const semi = QWERTY_MAP[k];
            if (semi === undefined) return;
            const note = qwertyOctave * 12 + semi;
            if (!qwertyHeld.has(note)) return;
            qwertyHeld.delete(note);
            sendToInst(keyboardTarget, {type: 'midi', data: [0x80, note, 0]});
        }
        return;
    }
});

// ============================================
// IFRAME COMMUNICATION
// ============================================
window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d) return;

    if (d.type === 'instrument-ready') {
        let name = d.name === 'kr106' ? 'juno' : d.name;
        for (const id of Object.keys(loadedFrames)) {
            if (loadedFrames[id].contentWindow === e.source) { name = id; break; }
        }
        for (const id of Object.keys(UTILITIES)) {
            const frame = document.getElementById(UTILITIES[id].frame);
            if (frame && frame.contentWindow === e.source) { name = id; break; }
        }
        sendToInst(name, {type: 'keyboard-focus', enabled: name === keyboardTarget});
    }
    if (d.type === 'request-kb-focus') setKeyboardTarget(d.target);
    if (d.type === 'pedal-control') {
        const idMap = {kr106: 'juno', mpc: 'mpc', cr78: 'cr78', juno: 'juno', '808': 'cr78', fm: 'fm', rhodes: 'rhodes', deck: 'deck'};
        var ch = d.channel;
        if (ch && ch.startsWith('808-')) ch = '808';
        const instId = idMap[ch] || ch;
        if (INSTRUMENTS[instId]) sendToInst(instId, {type: 'pedals', pedals: d.pedals});
    }
    if (d.type === 'pianoroll-note') {
        const idMap = {kr106: 'juno', juno: 'juno', mpc: 'mpc', cr78: 'cr78', '808': 'cr78', fm: 'fm', rhodes: 'rhodes', deck: 'deck'};
        const instId = idMap[d.channel] || d.channel;
        if (INSTRUMENTS[instId]) {
            const midiData = d.on ? [0x90, d.note, d.velocity || 100] : [0x80, d.note, 0];
            const msg = {type: 'midi', data: midiData};
            if (d.kit) msg.kit = d.kit;
            sendToInst(instId, msg);
        }
    }
    if (d.type === 'active-808-kits') { sendToInst('mixer', d); sendToInst('pedals', d); }
    if (d.type === 'session-data') { sessionParts[d.source] = d.data; checkSaveReady(); }
    if (d.type === '808-pattern-sync' || d.type === 'mpc-recording-sync') sendToInst('pianoroll', d);
    if (d.type === 'transport') sendToInst('tape', d);
    if (d.type === 'deck-export-mpc') sendToInst('mpc', d);

    if (d.type === 'mixer-control') {
        const target = d.channel;
        if (target === 'master') {
            allInstIds.forEach(id => { if (id !== 'mixer') sendToInst(id, {type: 'mixer', param: d.param, value: d.value, bus: 'master'}); });
        } else {
            const idMap = {kr106: 'juno', mpc: 'mpc', cr78: 'cr78'};
            const instId = idMap[target] || target;
            sendToInst(instId, {type: 'mixer', param: d.param, value: d.value});
        }
    }
});

// ============================================
// SESSION SAVE / LOAD
// ============================================
let pendingSave = null;
const sessionParts = {};
const SESSION_SOURCES = ['pianoroll', 'cr78', 'mpc', 'deck', 'rhodes'];

function requestSessionData() {
    SESSION_SOURCES.forEach(s => { sessionParts[s] = null; });
    pendingSave = true;
    setTimeout(() => {
        SESSION_SOURCES.forEach(s => sendToInst(s, {type: 'get-session'}));
    }, 500);
}

function checkSaveReady() {
    if (!pendingSave) return;
    if (SESSION_SOURCES.every(s => sessionParts[s])) {
        pendingSave = false;
        const session = {
            version: 2, timestamp: new Date().toISOString(),
            pianoroll: sessionParts.pianoroll, drumMachine: sessionParts.cr78,
            mpc: sessionParts.mpc, deck: sessionParts.deck,
            rhodes: sessionParts.rhodes
        };
        const blob = new Blob([JSON.stringify(session, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'studio-session-' + new Date().toISOString().slice(0,16).replace(/[T:]/g,'-') + '.json';
        a.click();
        URL.revokeObjectURL(url);
    }
}

function loadSession(session) {
    if (session.pianoroll) sendToInst('pianoroll', {type: 'load-session', data: session.pianoroll});
    if (session.drumMachine) sendToInst('cr78', {type: 'load-session', data: session.drumMachine});
    if (session.mpc) sendToInst('mpc', {type: 'load-session', data: session.mpc});
    if (session.deck) sendToInst('deck', {type: 'load-session', data: session.deck});
    if (session.rhodes) sendToInst('rhodes', {type: 'load-session', data: session.rhodes});
}

document.getElementById('btnSave').addEventListener('click', requestSessionData);
document.getElementById('btnLoad').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.addEventListener('change', async () => {
        if (!input.files[0]) return;
        try { const t = await input.files[0].text(); loadSession(JSON.parse(t)); } catch(e) {}
    });
    input.click();
});

// ============================================
// INIT
// ============================================
initMIDI();
</script>
</body>
