<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRUDEL LIVE CODER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: #111;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    user-select: none;
}
body { display: flex; justify-content: center; align-items: center; }
.scale-wrap { transform-origin: center center; }

.machine {
    width: 960px;
    background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
    border: 2px solid #333;
}

/* HEADER */
.machine-hdr {
    background: #1e1e1e;
    border-bottom: 1px solid #2a2a2a;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
}
.hdr-brand { font-size: 11px; color: #666; letter-spacing: 3px; }
.hdr-model { font-size: 14px; color: #fff; letter-spacing: 2px; }
.hdr-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
.hdr-bpm { font-size: 12px; color: #666; letter-spacing: 1px; }

/* PRESET BAR */
.preset-bar {
    display: flex;
    border-bottom: 1px solid #222;
    background: #151515;
    overflow-x: auto;
    gap: 0;
}
.preset-btn {
    padding: 6px 14px;
    font-size: 10px;
    color: #888;
    letter-spacing: 1px;
    white-space: nowrap;
    border-right: 1px solid #222;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
}
.preset-btn:hover { color: #fff; background: #1a1a1a; }
.preset-btn.active { color: #228B22; background: #1a1a1a; }

/* EDITOR */
.editor-wrap {
    position: relative;
    height: 320px;
    border-bottom: 1px solid #222;
}
.editor {
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    color: #ddd;
    border: none;
    outline: none;
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    resize: none;
    text-transform: none;
    letter-spacing: 0.5px;
    tab-size: 2;
}
.editor::selection { background: #228B22; color: #fff; }
.editor::placeholder { color: #333; text-transform: uppercase; }

/* LINE NUMBERS */
.line-nums {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 40px;
    background: #0d0d0d;
    border-right: 1px solid #1a1a1a;
    padding: 16px 8px 16px 0;
    text-align: right;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    color: #333;
    overflow: hidden;
    pointer-events: none;
    text-transform: none;
}

/* CONSOLE */
.console-wrap {
    height: 60px;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
    overflow-y: auto;
    padding: 6px 16px;
}
.console-line {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    font-weight: 400;
    color: #555;
    line-height: 1.5;
    text-transform: none;
}
.console-line.ok { color: #228B22; }
.console-line.err { color: #cc3333; }
.console-line.info { color: #666; }

/* TRANSPORT */
.transport {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 8px;
    background: #151515;
}
.t-btn {
    padding: 6px 20px;
    font-size: 12px;
    color: #fff;
    letter-spacing: 2px;
    border: 1px solid #333;
    background: #1a1a1a;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
}
.t-btn:hover { border-color: #555; }
.t-btn.active { border-color: #228B22; color: #228B22; }
.t-btn.play-active { border-color: #228B22; color: #228B22; background: #0a1a0a; }
.t-btn.stop-btn:hover { border-color: #cc3333; }

.t-sep { width: 1px; height: 24px; background: #222; }

.t-info {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    margin-left: auto;
}
.t-info .val { color: #888; }

/* SCOPE (visual feedback) */
.scope-bar {
    height: 4px;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
}
.scope-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: #228B22;
    transition: width 0.05s linear;
}

/* FOOTER */
.machine-ftr {
    display: flex;
    justify-content: space-between;
    padding: 6px 16px;
    background: #0d0d0d;
}
.ftr-text { font-size: 9px; color: #333; letter-spacing: 2px; }
</style>
<script src="studio-bus.js"></script>
</head>
<body>

<div class="scale-wrap" id="scaleWrap">
<div class="machine">
    <div class="machine-hdr">
        <span class="hdr-brand">STUDIO</span>
        <span class="hdr-model">STRUDEL LIVE CODER</span>
        <div class="hdr-right">
            <span class="hdr-bpm" id="bpmDisplay">120 BPM</span>
        </div>
    </div>

    <div class="preset-bar" id="presetBar"></div>

    <div class="scope-bar"><div class="scope-fill" id="scopeFill"></div></div>

    <div class="editor-wrap">
        <div class="line-nums" id="lineNums">1</div>
        <textarea class="editor" id="editor" spellcheck="false"
            style="padding-left: 52px;"
            placeholder="WRITE PATTERNS HERE... CTRL+ENTER TO PLAY"></textarea>
    </div>

    <div class="console-wrap" id="console"></div>

    <div class="transport">
        <div class="t-btn" id="btnPlay">PLAY</div>
        <div class="t-btn stop-btn" id="btnStop">STOP</div>
        <div class="t-sep"></div>
        <div class="t-btn" id="btnEval">EVAL</div>
        <div class="t-info">
            CYCLE <span class="val" id="cycleDisplay">0</span>
        </div>
    </div>

    <div class="machine-ftr">
        <span class="ftr-text">LIVE CODING PATTERN ENGINE</span>
        <span class="ftr-text">STRUDEL / TIDALCYCLES</span>
    </div>
</div>
</div>

<script src="https://unpkg.com/@strudel/web@1.0.3"></script>
<script>
// ============================================
// STATE
// ============================================
let strudelReady = false;
let isPlaying = false;
let bpm = 120;
let currentPreset = -1;
let cycleCount = 0;
let cycleRAF = null;

// ============================================
// PRESETS
// ============================================
const PRESETS = [
    {
        name: 'FOUR ON FLOOR',
        code: `s("bd sd:2 bd [sd:2 hh]")
  .bank("RolandTR808")
  .gain(.8)`
    },
    {
        name: 'BOOM BAP',
        code: `stack(
  s("bd ~ ~ bd ~ ~ bd ~"),
  s("~ ~ sd ~ ~ ~ sd ~"),
  s("hh*8").gain(.4)
).bank("RolandTR808")`
    },
    {
        name: 'ACID BASS',
        code: `note("<c2 [eb2 c2] f2 [ab2 f2]>*4")
  .s("sawtooth")
  .lpf(sine.range(200,4000).slow(4))
  .lpq(8)
  .decay(.1).sustain(0)`
    },
    {
        name: 'CHORDS + DRUMS',
        code: `stack(
  note("<[c3,eb3,g3] [f3,ab3,c4]>/2")
    .s("sawtooth")
    .lpf(2000).attack(.01).release(.3),
  s("bd sd:2 bd sd:2")
    .bank("RolandTR808"),
  s("hh*8").gain(.3)
    .bank("RolandTR808")
)`
    },
    {
        name: 'AMEN CHOP',
        code: `s("amencutup")
  .n(run(32))
  .chop(16)
  .speed("<1 1.5 0.75 2>")`
    },
    {
        name: 'MINIMAL',
        code: `s("hh*16")
  .gain(sine.range(.2,.8).fast(4))
  .pan(sine.range(0,1).fast(2))
  .bank("RolandTR808")`
    },
    {
        name: 'ARPEGGIOS',
        code: `note("<c4 e4 g4 b4>(3,8)")
  .s("triangle")
  .lpf(3000)
  .decay(.15).sustain(0)
  .delay(.25).room(.3)`
    },
    {
        name: 'EMPTY',
        code: `// START FROM SCRATCH
s("bd sd")`
    }
];

// ============================================
// INIT STRUDEL
// ============================================
async function initStrudelEngine() {
    try {
        await initStrudel();
        strudelReady = true;
        logConsole('STRUDEL ENGINE READY', 'ok');
    } catch(e) {
        logConsole('STRUDEL INIT ERROR: ' + e.message, 'err');
    }
}

// ============================================
// BUILD PRESETS
// ============================================
function buildPresets() {
    const bar = document.getElementById('presetBar');
    bar.innerHTML = '';
    PRESETS.forEach((p, i) => {
        const btn = document.createElement('div');
        btn.className = 'preset-btn';
        btn.textContent = p.name;
        btn.addEventListener('mousedown', () => loadPreset(i));
        bar.appendChild(btn);
    });
}

function loadPreset(idx) {
    currentPreset = idx;
    document.getElementById('editor').value = PRESETS[idx].code;
    updateLineNumbers();
    document.querySelectorAll('.preset-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
    });
    logConsole('LOADED: ' + PRESETS[idx].name, 'info');
}

// ============================================
// EDITOR
// ============================================
const editor = document.getElementById('editor');

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', () => {
    document.getElementById('lineNums').scrollTop = editor.scrollTop;
});

editor.addEventListener('keydown', (e) => {
    // TAB → insert 2 spaces
    if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = start + 2;
        return;
    }
    // CTRL+ENTER → evaluate and play
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        evalAndPlay();
        return;
    }
    // CTRL+. → stop
    if (e.key === '.' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        stopPlayback();
        return;
    }
});

function updateLineNumbers() {
    const lines = editor.value.split('\n').length;
    const nums = [];
    for (let i = 1; i <= Math.max(lines, 20); i++) nums.push(i);
    document.getElementById('lineNums').textContent = nums.join('\n');
}

// ============================================
// PLAYBACK
// ============================================
async function evalAndPlay() {
    if (!strudelReady) {
        await initStrudelEngine();
    }

    const code = editor.value.trim();
    if (!code) {
        logConsole('NO CODE TO EVALUATE', 'err');
        return;
    }

    try {
        // Stop any existing playback
        try { hush(); } catch(e) {}

        // Set tempo
        try { setcps(bpm / 60 / 4); } catch(e) {}

        // Evaluate the code
        const result = eval(code);

        // If result has .play(), call it
        if (result && typeof result.play === 'function') {
            result.play();
        }

        isPlaying = true;
        updateTransportUI();
        logConsole('PLAYING', 'ok');
        startCycleCounter();
    } catch(e) {
        logConsole('ERROR: ' + e.message, 'err');
    }
}

function stopPlayback() {
    try { hush(); } catch(e) {}
    isPlaying = false;
    updateTransportUI();
    stopCycleCounter();
    logConsole('STOPPED', 'info');
}

// ============================================
// CYCLE COUNTER / SCOPE
// ============================================
function startCycleCounter() {
    cycleCount = 0;
    const scopeFill = document.getElementById('scopeFill');
    const cycleDisplay = document.getElementById('cycleDisplay');

    function tick() {
        if (!isPlaying) return;
        cycleCount += 0.01;
        const phase = (cycleCount % 1);
        scopeFill.style.width = (phase * 100) + '%';
        cycleDisplay.textContent = Math.floor(cycleCount);
        cycleRAF = requestAnimationFrame(tick);
    }
    cycleRAF = requestAnimationFrame(tick);
}

function stopCycleCounter() {
    if (cycleRAF) cancelAnimationFrame(cycleRAF);
    cycleRAF = null;
    document.getElementById('scopeFill').style.width = '0';
}

// ============================================
// CONSOLE
// ============================================
function logConsole(msg, cls) {
    const wrap = document.getElementById('console');
    const line = document.createElement('div');
    line.className = 'console-line ' + (cls || '');
    const time = new Date().toLocaleTimeString('en', {hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
    line.textContent = '[' + time + '] ' + msg;
    wrap.appendChild(line);
    wrap.scrollTop = wrap.scrollHeight;
    // Keep last 50 lines
    while (wrap.children.length > 50) wrap.removeChild(wrap.firstChild);
}

// ============================================
// TRANSPORT UI
// ============================================
function updateTransportUI() {
    document.getElementById('btnPlay').className = 't-btn' + (isPlaying ? ' play-active' : '');
    document.getElementById('btnStop').className = 't-btn stop-btn' + (!isPlaying ? ' active' : '');
}

document.getElementById('btnPlay').addEventListener('mousedown', evalAndPlay);
document.getElementById('btnStop').addEventListener('mousedown', stopPlayback);
document.getElementById('btnEval').addEventListener('mousedown', evalAndPlay);

// ============================================
// BPM SYNC
// ============================================
function setBPM(newBpm) {
    bpm = newBpm;
    document.getElementById('bpmDisplay').textContent = bpm + ' BPM';
    try { setcps(bpm / 60 / 4); } catch(e) {}
}

// ============================================
// SCALE TO FIT
// ============================================
function scaleToFit() {
    const wrap = document.getElementById('scaleWrap');
    wrap.style.transform = 'none';
    const w = wrap.scrollWidth;
    const h = wrap.scrollHeight;
    const scale = Math.min(window.innerWidth / w, window.innerHeight / h, 1) * 0.96;
    wrap.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', scaleToFit);

// ============================================
// MESSAGE HANDLING
// ============================================
window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d) return;
    if (d.type === 'keyboard-focus') {
        window.__kbEnabled = d.enabled;
    }
    if (d.type === 'midi' && d.data) {
        // Could map MIDI to strudel in the future
    }
    if (d.type === 'mixer') {
        // Strudel manages its own audio — mixer control TBD
    }
    if (d.type === 'set-bpm' && d.bpm) {
        setBPM(d.bpm);
    }
});

// ============================================
// INIT
// ============================================
buildPresets();
loadPreset(0);
updateLineNumbers();
updateTransportUI();
logConsole('STRUDEL LIVE CODER LOADED', 'info');
logConsole('CTRL+ENTER TO PLAY / CTRL+. TO STOP', 'info');

requestAnimationFrame(() => { scaleToFit(); });

// ==================== IFRAME / POPOUT BRIDGE ====================
const _isIframe = window !== window.parent;
const _isPopout = window.opener && !_isIframe;
if (_isIframe || _isPopout) {
    window.__kbEnabled = _isPopout;
    if (_isIframe) {
        document.addEventListener('keydown', (e) => {
            if (e.target === editor) return; // always allow typing in editor
            if (!window.__kbEnabled) { e.stopImmediatePropagation(); e.preventDefault(); }
        }, true);
        document.addEventListener('keyup', (e) => {
            if (e.target === editor) return;
            if (!window.__kbEnabled) { e.stopImmediatePropagation(); e.preventDefault(); }
        }, true);
        window.parent.postMessage({type: 'instrument-ready', name: 'strudel'}, '*');
    } else {
        window.dispatchEvent(new MessageEvent('message', {data: {type: 'instrument-ready', name: 'strudel'}}));
    }
}
</script>

</body>
</html>
