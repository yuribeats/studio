<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLINA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .solina {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-bar {
            background: #000;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .brand { font-size: 11px; letter-spacing: 3px; color: #fff; }
        .model { font-size: 16px; letter-spacing: 3px; color: #228B22; }
        .controls {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: auto;
        }
        .ctrl-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .ctrl-label { font-size: 10px; letter-spacing: 1px; color: #fff; }
        .slider-wrap {
            width: 40px;
            height: 80px;
            background: #111;
            border: 1px solid #333;
            position: relative;
        }
        .slider-track {
            position: absolute;
            left: 50%;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #333;
            transform: translateX(-50%);
        }
        .slider-thumb {
            position: absolute;
            left: 50%;
            width: 30px;
            height: 8px;
            background: #fff;
            border: 1px solid #555;
            transform: translate(-50%, -50%);
            top: 50%;
        }
        .section-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #228B22;
            padding: 6px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .voice-section {
            display: flex;
            gap: 2px;
            padding: 8px 16px;
            background: #000;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .voice-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            background: #111;
            border: 1px solid #333;
        }
        .voice-btn.active {
            border-color: #228B22;
            color: #228B22;
            background: #0a1a0a;
        }
        .keyboard-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0 10px 10px 10px;
            overflow: hidden;
        }
        .keyboard {
            display: flex;
            position: relative;
            height: 100%;
            max-height: 180px;
        }
        .white-key {
            width: 22px;
            height: 100%;
            background: linear-gradient(180deg, #e8e4dc 0%, #faf9f5 90%, #e0dcd4 100%);
            border: 1px solid #999;
            border-top: none;
            position: absolute;
            z-index: 1;
        }
        .white-key.active { background: linear-gradient(180deg, #a8c8a8 0%, #c8e0c8 90%, #90b090 100%); }
        .black-key {
            width: 14px;
            height: 60%;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            border: 1px solid #000;
            position: absolute;
            z-index: 2;
            top: 0;
        }
        .black-key.active { background: linear-gradient(180deg, #2a4a2a 0%, #1a3a1a 100%); }
    </style>
</head>
<body>
<div class="solina">
    <div class="top-bar">
        <span class="brand">ARP / EMINENT</span>
        <span class="model">SOLINA STRING ENSEMBLE</span>
        <div class="controls">
            <div class="ctrl-group">
                <span class="ctrl-label">VOLUME</span>
                <div class="slider-wrap" data-param="volume" data-value="0.7">
                    <div class="slider-track"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">ENSEMBLE</span>
                <div class="slider-wrap" data-param="ensemble" data-value="0.6">
                    <div class="slider-track"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">ATTACK</span>
                <div class="slider-wrap" data-param="attack" data-value="0.3">
                    <div class="slider-track"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">RELEASE</span>
                <div class="slider-wrap" data-param="release" data-value="0.5">
                    <div class="slider-track"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">BRIGHTNESS</span>
                <div class="slider-wrap" data-param="brightness" data-value="0.5">
                    <div class="slider-track"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="voice-section">
        <div class="voice-btn active" data-voice="violin">VIOLIN</div>
        <div class="voice-btn active" data-voice="viola">VIOLA</div>
        <div class="voice-btn" data-voice="cello">CELLO</div>
        <div class="voice-btn" data-voice="bass">BASS</div>
        <div class="voice-btn" data-voice="trumpet">TRUMPET</div>
    </div>
    <div class="keyboard-area">
        <div class="keyboard" id="keyboard"></div>
    </div>
</div>

<script src="pedal-fx.js"></script>
<script>
(function() {
    var actx = null, masterGain = null, mixerGain = null, pedalFX = null, mixerSends = null;
    var params = { volume: 0.7, ensemble: 0.6, attack: 0.3, release: 0.5, brightness: 0.5 };
    var voices = { violin: true, viola: true, cello: false, bass: false, trumpet: false };
    var activeVoices = {};
    var muted = false;

    function ensureAudio() {
        if (actx) return;
        actx = new (window.AudioContext || window.webkitAudioContext)();
        if (window.loadAirwindowsWorklet) loadAirwindowsWorklet(actx);
        masterGain = actx.createGain();
        masterGain.gain.value = params.volume;
        mixerGain = actx.createGain();
        mixerGain.gain.value = 1.0;
        window._masterOut = actx.createGain();
        window._masterOut.connect(actx.destination);
        window._captureNode = actx.createMediaStreamDestination();
        window._masterOut.connect(window._captureNode);
        mixerSends = new MixerSends(actx, window._masterOut);
        pedalFX = new PedalFXChain(actx);
        masterGain.connect(pedalFX.getInput());
        pedalFX.getOutput().connect(mixerSends.getInput());
        mixerSends.getOutput().connect(mixerGain);
        mixerGain.connect(window._masterOut);
    }

    // Solina ensemble: multiple detuned saws per voice with chorus-like LFO detuning
    function noteOn(midi, vel) {
        if (!actx) ensureAudio();
        if (actx.state === 'suspended') actx.resume();
        if (activeVoices[midi]) noteOff(midi);

        var freq = 440 * Math.pow(2, (midi - 69) / 12);
        var amp = (vel / 127) * 0.25;
        var now = actx.currentTime;
        var atkTime = 0.01 + params.attack * 1.5;
        var voice = { oscs: [], gains: [], env: null };

        var envGain = actx.createGain();
        envGain.gain.setValueAtTime(0, now);
        envGain.gain.linearRampToValueAtTime(amp, now + atkTime);
        envGain.connect(masterGain);
        voice.env = envGain;

        // Lowpass for brightness
        var lpf = actx.createBiquadFilter();
        lpf.type = 'lowpass';
        lpf.frequency.value = 800 + params.brightness * 8000;
        lpf.Q.value = 0.7;
        lpf.connect(envGain);
        voice.lpf = lpf;

        var voiceDefs = [];
        if (voices.violin) voiceDefs.push({ detune: [0, 7, -7, 12, -5], octave: 0 });
        if (voices.viola) voiceDefs.push({ detune: [0, 8, -8, 5, -12], octave: -0.03 });
        if (voices.cello) voiceDefs.push({ detune: [0, 6, -6], octave: -1 });
        if (voices.bass) voiceDefs.push({ detune: [0, 5, -5], octave: -2 });
        if (voices.trumpet) voiceDefs.push({ detune: [0, 10, -10], octave: 0, type: 'square' });
        if (voiceDefs.length === 0) voiceDefs.push({ detune: [0, 7, -7], octave: 0 });

        var ensAmt = params.ensemble * 15;
        voiceDefs.forEach(function(vd) {
            var oscFreq = freq * Math.pow(2, vd.octave);
            vd.detune.forEach(function(dt) {
                var osc = actx.createOscillator();
                osc.type = vd.type || 'sawtooth';
                osc.frequency.value = oscFreq;
                osc.detune.value = dt * (1 + ensAmt * 0.3);
                var g = actx.createGain();
                g.gain.value = 1.0 / (voiceDefs.length * vd.detune.length);
                osc.connect(g);
                g.connect(lpf);
                osc.start(now);
                voice.oscs.push(osc);
                voice.gains.push(g);

                // Ensemble LFO modulation
                if (ensAmt > 0) {
                    var lfo = actx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.5 + Math.random() * 5;
                    var lfoGain = actx.createGain();
                    lfoGain.gain.value = ensAmt;
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.detune);
                    lfo.start(now);
                    voice.oscs.push(lfo);
                }
            });
        });

        activeVoices[midi] = voice;
        highlightKey(midi, true);
    }

    function noteOff(midi) {
        var voice = activeVoices[midi];
        if (!voice) return;
        var now = actx.currentTime;
        var relTime = 0.05 + params.release * 2.0;
        voice.env.gain.cancelScheduledValues(now);
        voice.env.gain.setValueAtTime(voice.env.gain.value, now);
        voice.env.gain.linearRampToValueAtTime(0, now + relTime);
        voice.oscs.forEach(function(o) { try { o.stop(now + relTime + 0.05); } catch(e) {} });
        delete activeVoices[midi];
        highlightKey(midi, false);
    }

    // Keyboard
    var FIRST_MIDI = 36, LAST_MIDI = 96;
    var BLACK_INDICES = [1, 3, 6, 8, 10];
    var keyElements = {};
    var mouseNoteDown = null;

    function isBlack(m) { return BLACK_INDICES.indexOf(m % 12) >= 0; }

    function buildKeyboard() {
        var kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        var whites = [];
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) { if (!isBlack(m)) whites.push(m); }
        var w = 22;
        kb.style.width = (whites.length * w) + 'px';
        whites.forEach(function(m, i) {
            var el = document.createElement('div');
            el.className = 'white-key';
            el.dataset.midi = m;
            el.style.left = (i * w) + 'px';
            el.style.width = w + 'px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', function(e) { e.preventDefault(); ensureAudio(); noteOn(m, 100); mouseNoteDown = m; });
            el.addEventListener('mouseenter', function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOff(mouseNoteDown); noteOn(m, 80); mouseNoteDown = m; } });
        });
        for (var m = FIRST_MIDI; m <= LAST_MIDI; m++) {
            if (!isBlack(m)) continue;
            var prevIdx = whites.indexOf(m - 1);
            if (prevIdx < 0) continue;
            var el = document.createElement('div');
            el.className = 'black-key';
            el.dataset.midi = m;
            el.style.left = ((prevIdx + 1) * w - 7) + 'px';
            el.style.width = '14px';
            kb.appendChild(el);
            keyElements[m] = el;
            el.addEventListener('mousedown', function(mm) { return function(e) { e.preventDefault(); ensureAudio(); noteOn(mm, 100); mouseNoteDown = mm; }; }(m));
            el.addEventListener('mouseenter', function(mm) { return function(e) { if (mouseNoteDown !== null && e.buttons === 1) { noteOff(mouseNoteDown); noteOn(mm, 80); mouseNoteDown = mm; } }; }(m));
        }
    }
    document.addEventListener('mouseup', function() { if (mouseNoteDown !== null) { noteOff(mouseNoteDown); mouseNoteDown = null; } });
    function highlightKey(midi, on) { var el = keyElements[midi]; if (el) { if (on) el.classList.add('active'); else el.classList.remove('active'); } }

    // Sliders
    document.querySelectorAll('.slider-wrap').forEach(function(wrap) {
        var param = wrap.dataset.param;
        var val = parseFloat(wrap.dataset.value);
        var thumb = wrap.querySelector('.slider-thumb');
        function setPos(v) {
            thumb.style.top = ((1 - v) * 100) + '%';
            wrap.dataset.value = v;
        }
        setPos(val);
        var dragging = false, startY = 0, startVal = 0;
        wrap.addEventListener('mousedown', function(e) {
            e.preventDefault(); dragging = true; startY = e.clientY; startVal = parseFloat(wrap.dataset.value);
            function onMove(e2) {
                if (!dragging) return;
                var dy = startY - e2.clientY;
                var nv = Math.max(0, Math.min(1, startVal + dy / 100));
                setPos(nv);
                params[param] = nv;
                if (param === 'volume' && masterGain) masterGain.gain.value = nv;
                if (param === 'brightness') {
                    Object.keys(activeVoices).forEach(function(k) {
                        var v = activeVoices[k];
                        if (v && v.lpf) v.lpf.frequency.value = 800 + nv * 8000;
                    });
                }
            }
            function onUp() { dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });
    });

    // Voice buttons
    document.querySelectorAll('.voice-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var v = btn.dataset.voice;
            voices[v] = !voices[v];
            btn.classList.toggle('active', voices[v]);
        });
    });

    // Keyboard input
    window.__kbEnabled = false;
    var kbOctave = 4;
    var KEY_MAP = { 'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,'k':12,'o':13,'l':14 };
    var kbNotesDown = {};
    document.addEventListener('keydown', function(e) {
        if (!window.__kbEnabled) return;
        if (e.repeat) return;
        var k = e.key.toLowerCase();
        if (k === 'z') { kbOctave = Math.max(1, kbOctave - 1); return; }
        if (k === 'x') { kbOctave = Math.min(7, kbOctave + 1); return; }
        var semi = KEY_MAP[k]; if (semi === undefined) return;
        var m = (kbOctave + 1) * 12 + semi;
        if (m >= 0 && !kbNotesDown[k]) { ensureAudio(); kbNotesDown[k] = m; noteOn(m, 100); }
    }, true);
    document.addEventListener('keyup', function(e) {
        if (!window.__kbEnabled) return;
        var k = e.key.toLowerCase();
        if (kbNotesDown[k]) { noteOff(kbNotesDown[k]); delete kbNotesDown[k]; }
    }, true);

    // Message bridge
    window.addEventListener('message', function(e) {
        var d = e.data; if (!d) return;
        if (d.type === 'midi') { ensureAudio(); var data = d.data || d; var cmd = data[0] & 0xF0; if (cmd === 0x90 && data[2] > 0) noteOn(data[1], data[2]); else if (cmd === 0x80 || (cmd === 0x90 && data[2] === 0)) noteOff(data[1]); }
        if (d.type === 'keyboard-focus') window.__kbEnabled = d.enabled;
        if (d.type === 'mixer') {
            ensureAudio();
            if (d.param === 'volume' && mixerGain) mixerGain.gain.value = d.value;
            else if (d.param === 'mute') { muted = d.value > 0; if (mixerGain) mixerGain.gain.value = muted ? 0 : 1; }
            else if (mixerSends) mixerSends.setParam(d.param, d.value);
        }
        if (d.type === 'mixer-fx' && mixerSends) {
            ensureAudio();
            if (d.fx === 'reverb') mixerSends.updateReverb(d.param, d.value);
            if (d.fx === 'delay') mixerSends.updateDelay(d.param, d.value);
        }
        if (d.type === 'pedals' && pedalFX) pedalFX.update(d.pedals);
        if (d.type === 'get-session') {
            window.parent.postMessage({ type: 'session-data', source: 'solina', data: { params: params, voices: voices, kbOctave: kbOctave } }, '*');
        }
        if (d.type === 'load-session' && d.data) {
            if (d.data.params) { for (var k in d.data.params) { params[k] = d.data.params[k]; } if (masterGain) masterGain.gain.value = params.volume; }
            if (d.data.voices) { for (var k in d.data.voices) { voices[k] = d.data.voices[k]; } document.querySelectorAll('.voice-btn').forEach(function(b) { b.classList.toggle('active', voices[b.dataset.voice]); }); }
            if (d.data.kbOctave !== undefined) kbOctave = d.data.kbOctave;
        }
    });

    buildKeyboard();
    window.parent.postMessage({ type: 'instrument-ready', name: 'solina' }, '*');
})();
</script>
</body>
</html>
